<div id="root"></div>
<script type="text/babel" data-type="module">
const { useState, useEffect, useMemo } = React;

const MAANDEN = {
  january:0,february:1,march:2,april:3,may:4,june:5,
  july:6,august:7,september:8,october:9,november:10,december:11,
  jan:0,feb:1,mar:2,apr:3,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,
  mrt:2,mei:4,okt:9
};

function parseDatum(str) {
  if (!str) return null;
  const s = str.toLowerCase().trim();
  const m1 = s.match(/^(\w+)\s+(\d{1,2})$/);
  if (m1) { const mnd=MAANDEN[m1[1]]; if(mnd!==undefined) return new Date(new Date().getFullYear(),mnd,parseInt(m1[2])); }
  const m2 = s.match(/^(\d{1,2})\s+(\w+)$/);
  if (m2) { const mnd=MAANDEN[m2[2]]; if(mnd!==undefined) return new Date(new Date().getFullYear(),mnd,parseInt(m2[1])); }
  const m3 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m3) return new Date(parseInt(m3[1]),parseInt(m3[2])-1,parseInt(m3[3]));
  return null;
}

function formatDatum(str) {
  if (!str) return "";
  const d = parseDatum(str);
  if (!d) return str;
  return d.toLocaleDateString("nl-NL",{day:"numeric",month:"short"});
}

function stripTeam(naam) {
  if (!naam) return "";
  return naam.replace(/\s+[HhDd]\d+$/,"").trim();
}

const VANDAAG = new Date(); VANDAAG.setHours(0,0,0,0);
const isKomend = w => { if(w.gespeeld===true) return false; if(w.gespeeld===false) return true; const d=parseDatum(w.datum||""); return !d||d>=VANDAAG; };
const isGespeeld = w => !isKomend(w);

const CSS = `

}

.gb.on{background:var(--accent);color:white}

.ws.k{color:var(--muted);font-size:12px}
.wa{color:var(--muted);font-size:12px;text-align:center}
.ph{padding:14px 18px 12px;border-bottom:1px solid var(--border)}

.nl{display:flex;flex-direction:column}
.nr{padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.nr:hover{background:var(--surface2)}

.nd{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.ntag{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:var(--accent-light);color:var(--accent)}
.ntt{font-size:12px;font-weight:500;line-height:1.4}

.zi{flex:1;min-width:180px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;padding:8px 12px;border-radius:7px;outline:none;transition:border-color .15s}
.zi:focus{border-color:var(--accent);background:var(--surface)}
.zi::placeholder{color:var(--muted)}

.sk:hover{border-color:var(--accent);background:var(--accent-light);transform:translateY(-1px)}

.sp-card:hover{border-color:var(--accent);background:var(--accent-light)}

.scnm{font-weight:500;font-size:13px}

.fade{animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
`;

function PosBadge({n, zone}) {
  // Bepaal zone op basis van zone-veld OF positienummer als fallback
  const z = zone || (n<=4?"playoff":n<=9?"":n<=11?"playout":"degradatie");
  const style = z==="playoff"
    ? {background:"#166534",color:"#ffffff",border:"none"}
    : z==="playout"
    ? {background:"#facc15",color:"#1a1a1a",border:"none"}
    : z==="degradatie"
    ? {background:"#991b1b",color:"#ffffff",border:"none"}
    : {background:"var(--surface2)",border:"1px solid var(--border)",color:"var(--muted)"};
  return <span className="pb" style={style}>{n}</span>;
}

function Breadcrumb({page,pageId,nav}) {
  const items=[{label:"Home",target:"dashboard"}];
  if(page==="spelers") items.push({label:"Spelers",target:null});
  if(page==="speler") { items.push({label:"Spelers",target:"spelers"}); items.push({label:pageId?.naam||"",target:null}); }
  if(page==="speler_via_club") { items.push({label:pageId?._vanClub||"Club",target:"club",targetId:pageId?._vanClub}); items.push({label:pageId?.naam||"",target:null}); }
  if(page==="club") items.push({label:pageId||"",target:null});
  if(page==="wedstrijd") items.push({label:`${pageId?.thuis} vs ${pageId?.uit}`,target:null});
  if(items.length<=1) return null;
  return (
    <div className="bc">
      {items.map((it,i)=>(
        <span key={i} style={{display:"flex",alignItems:"center",gap:8}}>
          {i>0&&<span className="bcs">/</span>}
          {it.target?<button className="bcb" onClick={()=>nav(it.target,it.targetId||null)}>{it.label}</button>:<span className="bcc">{it.label}</span>}
        </span>
      ))}
    </div>
  );
}

function Dashboard({geslacht,nav,stand,programma,nieuws,loading}) {
  if(loading) return <div className="loading">Data laden…</div>;
  const [clubFilter, setClubFilter] = React.useState(null); // {club, type} of null
  const bijgewerkt = stand[0]?._bw||"";
  const komend = programma.filter(isKomend);
  // Groepeer gespeelde wedstrijden per datum/ronde, nieuwste eerst
  const gespeeldGroepen = useMemo(() => {
    const gespeeldLijst = programma.filter(isGespeeld);
    // Groepeer op datum
    const groepen = {};
    gespeeldLijst.forEach(w => {
      const key = w.datum || "onbekend";
      if (!groepen[key]) groepen[key] = [];
      groepen[key].push(w);
    });
    // Sorteer groepen nieuwste eerst
    return Object.entries(groepen)
      .map(([datum, wedstrijden]) => ({datum, wedstrijden}))
      .sort((a,b) => {
        const da = parseDatum(a.datum)||new Date(0);
        const db = parseDatum(b.datum)||new Date(0);
        return db-da;
      });
  }, [programma]);

  return (
    <div className="fade">
      <div className="main-grid">
        <div className="col-l">
          <div className="sec">
            <div className="sec-hdr">
              <div className="sec-title">Stand</div>
              {bijgewerkt&&<div className="sec-sub">Bijgewerkt {bijgewerkt}</div>}
            </div>
            {stand.length>0?(
              <>
                <table className="stand-tbl">
                  <thead><tr>
                    <th>#</th><th className="cl">Club</th>
                    <th title="Wedstrijden gespeeld">W</th>
                    <th title="Punten">Pnt</th>
                    {["G","Gk","V"].map(type => (
                      <th key={type} title={type==="G"?"Gewonnen":type==="Gk"?"Gelijk":"Verloren"}
                        style={{cursor:"pointer",userSelect:"none"}}
                        onClick={()=>setClubFilter(f=>f?.type===type&&!f.club?null:{type,club:null})}>
                        {type}{clubFilter?.type===type&&!clubFilter.club?" ▾":""}
                      </th>
                    ))}
                    <th title="Doelpunten voor">DV</th>
                    <th title="Doelpunten tegen">DT</th>
                    <th title="Doelsaldo">Dsl</th>
                  </tr></thead>
                  <tbody>
                    {stand.map(r=>{
                      const dv = r.doelpunten_voor??r.dv??0;
                      const dt = r.doelpunten_tegen??r.dt??0;
                      const dsl = r.doelsaldo??r["+/−"]??(dv-dt);
                      const dslNum = typeof dsl==="string"?parseInt(dsl)||0:dsl;
                      const zone = r.zone||"";
                      const zClass = zone==="playoff"?"zpo":zone==="playout"?"zpl":zone==="degradatie"?"zde":"";
                      return (
                        <tr key={r.club} className={zClass}>
                          <td><PosBadge n={r.positie} zone={zone}/></td>
                          <td className="cl">
                            <button onClick={()=>nav("club",r.club)} style={{background:"none",border:"none",color:"var(--text)",fontWeight:500,fontSize:13,cursor:"pointer",padding:0,textAlign:"left",textDecoration:"underline",textDecorationColor:"var(--border)",textUnderlineOffset:3}}>
                              {r.club}
                            </button>
                          </td>
                          <td>{r.gespeeld}</td>
                          <td className="pnt">{r.punten??r.ptn??0}</td>
                          {[["G",r.gewonnen,"gewonnen"],["Gk",r.gelijk,"gelijk"],["V",r.verloren,"verloren"]].map(([type,val,label])=>(
                            <td key={type}
                              style={{cursor:"pointer",color:clubFilter?.club===r.club&&clubFilter?.type===type?"var(--accent)":"inherit",fontWeight:clubFilter?.club===r.club&&clubFilter?.type===type?700:"inherit"}}
                              onClick={e=>{e.stopPropagation();setClubFilter(f=>f?.club===r.club&&f?.type===type?null:{club:r.club,type,label});}}>
                              {val}
                            </td>
                          ))}
                          <td>{dv||"–"}</td>
                          <td>{dt||"–"}</td>
                          <td className={dslNum>0?"dp":dslNum<0?"dn":""}>{dslNum>0?`+${dslNum}`:dslNum}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <div className="legend">
                  <div className="li"><div className="ld" style={{background:"#4ade80"}}/> 1-4 Play-offs</div>
                  <div className="li"><div className="ld" style={{background:"#facc15"}}/> 10-11 Play-outs</div>
                  <div className="li"><div className="ld" style={{background:"#f87171"}}/> 12 Degradatie</div>
                </div>
                {clubFilter && (() => {
                  const gefilterd = programma.filter(w => {
                    // Alleen gespeelde wedstrijden
                    if (w.gespeeld !== true && w.score_thuis == null) return false;
                    const st = w.score_thuis ?? -1;
                    const su = w.score_uit   ?? -1;
                    const thuisMatch = (w.thuis||"").includes(clubFilter.club||"");
                    const uitMatch   = (w.uit||"").includes(clubFilter.club||"");
                    const inClub = clubFilter.club ? (thuisMatch || uitMatch) : true;
                    if (!inClub) return false;
                    if (clubFilter.type === "Gk") return st === su && st >= 0;
                    if (!clubFilter.club) {
                      // Geen specifieke club: alle gewonnen/verloren
                      if (clubFilter.type === "G") return st !== su;
                      if (clubFilter.type === "V") return st === su; // n.v.t. zonder club
                      return true;
                    }
                    if (clubFilter.type === "G") return (thuisMatch && st > su) || (uitMatch && su > st);
                    if (clubFilter.type === "V") return (thuisMatch && st < su) || (uitMatch && su < st);
                    return true;
                  });
                  const label = clubFilter.type==="G"?"Gewonnen":clubFilter.type==="Gk"?"Gelijk gespeeld":"Verloren";
                  return (
                    <div style={{marginTop:16,padding:16,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                        <div style={{fontSize:13,fontWeight:700}}>
                          {clubFilter.club ? `${clubFilter.club} — ${label}` : label} ({gefilterd.length})
                        </div>
                        <button onClick={()=>setClubFilter(null)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:18,cursor:"pointer",lineHeight:1}}>×</button>
                      </div>
                      <div className="wl">
                        {gefilterd.length > 0 ? gefilterd.reverse().map((w,i) => (
                          <div className="wr" key={i} onClick={()=>nav("wedstrijd",w)}>
                            <span className="wd">{w.datum}</span>
                            <div className="wh">{w.thuis}</div>
                            <div className="ws">{w.score_thuis??w.doelpunten_thuis??"–"} – {w.score_uit??w.doelpunten_uit??"–"}</div>
                            <div className="wu">{w.uit}</div>
                            <span className="wa">›</span>
                          </div>
                        )) : <div className="empty">Geen wedstrijden gevonden.</div>}
                      </div>
                    </div>
                  );
                })()}
              </>
            ):<div className="empty">Geen standdata beschikbaar.</div>}
          </div>

          <div className="twee-col">
            <div className="tc-links">
              <div className="sec">
                <div className="sec-hdr"><div className="sec-title">Uitslagen</div></div>
                {gespeeldGroepen.length>0?(
                  <div>
                    {gespeeldGroepen.map((groep,gi)=>(
                      <div key={gi} style={{marginBottom:16}}>
                        <div style={{fontSize:11,fontWeight:600,color:"var(--muted)",letterSpacing:".5px",textTransform:"uppercase",padding:"0 0 8px",fontFamily:"'JetBrains Mono',monospace"}}>
                          {formatDatum(groep.datum)}
                        </div>
                        <div className="wl">
                          {groep.wedstrijden.map((w,i)=>(
                            <div className="wr" key={i} onClick={()=>nav("wedstrijd",w)}>

    </div>

                <div className="wr" key={i} onClick={()=>nav("wedstrijd",w)}>

function SpelerDetail({speler,nav,nieuws}) {
  if(!speler) return <div className="loading">Speler niet gevonden.</div>;
  const delen=speler.naam.split(" ");
  const vn=delen[0];
  const an=delen[delen.length-1];
  // Zoek op voornaam, achternaam én volledige naam
  const volledigeNaam=speler.naam.toLowerCase();
  const relevant=nieuws.filter(n=>{
    const t=(n.titel||n.title||"").toLowerCase();
    const s=(n.samenvatting||n.summary||"").toLowerCase();
    const tekst=t+" "+s;
    return tekst.includes(volledigeNaam)
      || (vn.length>2 && an.length>3 && tekst.includes(vn.toLowerCase()) && tekst.includes(an.toLowerCase()))
      || (an.length>4 && tekst.includes(an.toLowerCase()));
  }).slice(0,10);

  return (
    <div className="fade">
      <div className="dh">
        <div className="dr">#{speler.rugnummer}</div>
        <div className="dn2">{speler.naam}</div>
        <div className="dm">
          <span className="dc ac">{speler.club}</span>
          <span className="dc">{speler.geslacht==="heren"?"Heren":"Dames"}</span>
          {speler.keeper&&<span className="dc ke">Keeper</span>}
          {speler.aanvoerder&&<span className="dc av">Aanvoerder</span>}
        </div>
      </div>
      <div className="db">
        {speler.doelpunten_seizoen>0&&(
          <div style={{marginBottom:20}}>
            <div className="ds">Statistieken 2025-2026</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {[
                ["Goals", speler.doelpunten_seizoen],
                ["Veld", speler.vd??0],
                ["SC", speler.sc??0],
                ["SB", speler.sb??0],
              ].map(([lbl,val])=>(
                <div key={lbl} style={{background:"var(--surface2)",border:"1px solid var(--border)",
                  borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:700,color:"var(--accent)",fontFamily:"'JetBrains Mono',monospace"}}>{val}</div>
                  <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",marginTop:2}}>{lbl}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div className="ds">Nieuws</div>
        {relevant.length>0?relevant.map((n,i)=>(
          <a className="ni" key={i} href={n.url||n.link||"#"} target="_blank" rel="noopener noreferrer">
            <div className="nid">{(n.datum||n.date||"").slice(0,10)}</div>
            <div className="nit">{n.titel||n.title||""}</div>
          </a>
        )):<div className="empty">Geen nieuws gevonden voor {speler.naam}.</div>}
      </div>
    </div>
  );
}

function InvoerPagina({geslacht, programma, spelers}) {
  const [tabbladen, setTabbladen] = React.useState([{id:1, tekst:"", titel:"Wedstrijd 1"}]);
  const [actief, setActief] = React.useState(1);
  const [resultaten, setResultaten] = React.useState({});
  const [laden, setLaden] = React.useState({});
  const [fout, setFout] = React.useState({});
  const [opgeslagen, setOpgeslagen] = React.useState({});

  const spelersLijst = React.useMemo(() => spelers.slice(0,150).map(s=>s.naam).join(", "), [spelers]);

  const SYSTEM = `Je analyseert hockey-invoer over de Tulp Hoofdklasse. Dit kan een artikel zijn OF een wedstrijdformulier/match center tekst.

Bij een wedstrijdformulier herken je dit formaat:
- Teamnaam, datum, tijd, score
- Events: "Doelpunt", "Groene kaart", "Gele kaart", "Rode kaart" + naam + minuut
- "start wedstrijd", "einde 1ste kwart" etc.

Bepaal de club van elke scorer op basis van de teamnamen en de spelerslijst.
Bekende spelers: ${spelersLijst}

Geef ALLEEN een geldig JSON-object terug, geen uitleg, geen markdown:
{
  "wedstrijden": [{
    "thuis": "Club", "uit": "Club",
    "score_thuis": 1, "score_uit": 3,
    "datum": "2026-03-22", "tijdstip": "15:00",
    "locatie": "Naam accommodatie",
    "wedstrijdnummer": "1891257",
    "scorers": [{"naam": "Naam", "club": "Club", "minuut": 25, "type": "veld"}],
    "kaarten": [{"naam": "Naam", "club": "Club", "minuut": 12, "type": "groen"}]
  }],
  "highlights": [], "spelers_vermeld": []
}`;

  const voegToe = () => {
    const nieuwId = Date.now();
    setTabbladen(t => [...t, {id:nieuwId, tekst:"", titel:`Wedstrijd ${t.length+1}`}]);
    setActief(nieuwId);
  };

  const verwijder = (id) => {
    if (tabbladen.length === 1) return;
    const nieuweTabbladen = tabbladen.filter(t => t.id !== id);
    setTabbladen(nieuweTabbladen);
    if (actief === id) setActief(nieuweTabbladen[0].id);
  };

  const updateTekst = (id, tekst) => {
    setTabbladen(t => t.map(tab => tab.id === id ? {...tab, tekst} : tab));
  };

  const analyseer = async (id) => {
    const tab = tabbladen.find(t => t.id === id);
    if (!tab?.tekst.trim()) return;
    setLaden(l => ({...l, [id]: true}));
    setFout(f => ({...f, [id]: ""}));
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          system: SYSTEM,
          messages: [{role: "user", content: tab.tekst}]
        })
      });
      const data = await resp.json();
      const tekst = (data.content?.[0]?.text || "").replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(tekst);
      setResultaten(r => ({...r, [id]: parsed}));
      // Update tabbladtitel met wedstrijdnaam
      if (parsed.wedstrijden?.[0]) {
        const w = parsed.wedstrijden[0];
        const titel = `${w.thuis} ${w.score_thuis??""}-${w.score_uit??""} ${w.uit}`;
        setTabbladen(t => t.map(tab => tab.id === id ? {...tab, titel} : tab));
      }
    } catch(e) {
      setFout(f => ({...f, [id]: "Analyse mislukt: " + e.message}));
    }
    setLaden(l => ({...l, [id]: false}));
  };

  const analyseerAlle = async () => {
    for (const tab of tabbladen) {
      if (tab.tekst.trim() && !resultaten[tab.id]) {
        await analyseer(tab.id);
      }
    }
  };

  const aantalMetTekst = tabbladen.filter(t => t.tekst.trim()).length;
  const aantalGeparseerd = Object.keys(resultaten).length;

  const S = {
    wrap: {maxWidth:960, margin:"0 auto", padding:24},
    tabs: {display:"flex", gap:4, marginBottom:0, flexWrap:"wrap", alignItems:"center"},
    tab: (actf) => ({
      padding:"7px 14px", borderRadius:"6px 6px 0 0",
      border:"1px solid var(--border)", borderBottom: actf ? "1px solid var(--surface)" : "1px solid var(--border)",
      background: actf ? "var(--surface)" : "var(--surface2)",
      color: actf ? "var(--text)" : "var(--muted)",
      fontSize:12, fontWeight: actf ? 600 : 400,
      cursor:"pointer", marginBottom: actf ? -1 : 0,
      maxWidth:160, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"
    }),
    content: {
      background:"var(--surface)", border:"1px solid var(--border)",
      borderRadius:"0 8px 8px 8px", padding:20
    },
    ta: {
      width:"100%", minHeight:180,
      background:"var(--surface2)", border:"1px solid var(--border)",
      color:"var(--text)", fontFamily:"'Inter',sans-serif",
      fontSize:13, padding:12, borderRadius:8, outline:"none",
      resize:"vertical", lineHeight:1.6
    },
    btn: (dis, variant="primary") => ({
      background: variant==="primary" ? "var(--accent)" : "none",
      color: variant==="primary" ? "white" : "var(--muted)",
      border: variant==="primary" ? "none" : "1px solid var(--border)",
      padding:"8px 18px", borderRadius:7, fontSize:13, fontWeight:600,
      opacity: dis ? 0.5 : 1, cursor: dis ? "not-allowed" : "pointer"
    }),
  };

  const actieveTab = tabbladen.find(t => t.id === actief);
  const actieveResultaat = resultaten[actief];
  const actiefLaden = laden[actief];
  const actiefFout = fout[actief];

  return (
    <div className="fade" style={S.wrap}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Wedstrijdinvoer</div>
          <div style={{fontSize:13,color:"var(--muted)"}}>
            Plak wedstrijdformulieren van het match center of artikelen van hockey.nl.
            {aantalGeparseerd > 0 && <span style={{color:"var(--green)",marginLeft:8}}>✓ {aantalGeparseerd} geparseerd</span>}
          </div>
        </div>
        {aantalMetTekst > 1 && !Object.keys(resultaten).length && (
          <button onClick={analyseerAlle} style={S.btn(false)}>
            Analyseer alle {aantalMetTekst} →
          </button>
        )}
      </div>

      {/* Tabbladen */}
      <div style={S.tabs}>
        {tabbladen.map(tab => (
          <div key={tab.id} style={{position:"relative", display:"flex", alignItems:"center"}}>
            <button style={S.tab(tab.id === actief)} onClick={() => setActief(tab.id)}>
              {resultaten[tab.id] ? "✓ " : ""}{tab.titel}
            </button>
            {tabbladen.length > 1 && (
              <button onClick={() => verwijder(tab.id)} style={{
                position:"absolute", top:2, right:2,
                background:"none", border:"none", color:"var(--muted)",
                fontSize:10, cursor:"pointer", padding:"0 2px", lineHeight:1
              }}>×</button>
            )}
          </div>
        ))}
        <button onClick={voegToe} style={{
          padding:"6px 12px", background:"none",
          border:"1px dashed var(--border)", borderRadius:"6px 6px 0 0",
          color:"var(--muted)", fontSize:12, cursor:"pointer"
        }}>+ Wedstrijd</button>
      </div>

      {/* Tab inhoud */}
      <div style={S.content}>
        {actieveTab && (
          <>
            <textarea style={S.ta}
              value={actieveTab.tekst}
              onChange={e => updateTekst(actief, e.target.value)}
              placeholder="Plak hier een wedstrijdformulier of artikel…&#10;&#10;Voorbeeld match center tekst:&#10;Laren H1&#10;22 maart&#10;15:00&#10;1 - 3&#10;Amsterdam H1&#10;start wedstrijd&#10;Doelpunt&#10;Ruben van Meer&#10;25'&#10;..."/>
            <div style={{display:"flex", gap:10, marginTop:12}}>
              <button onClick={() => analyseer(actief)}
                disabled={actiefLaden || !actieveTab.tekst.trim()}
                style={S.btn(actiefLaden || !actieveTab.tekst.trim())}>
                {actiefLaden ? "Analyseren…" : "Analyseer met Claude"}
              </button>
              {actieveTab.tekst && (
                <button onClick={() => {
                  updateTekst(actief, "");
                  setResultaten(r => {const n={...r}; delete n[actief]; return n;});
                }} style={S.btn(false,"secondary")}>Wissen</button>
              )}
            </div>
          </>
        )}

        {actiefFout && (
          <div style={{marginTop:12,padding:12,background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,color:"#991b1b",fontSize:13}}>
            {actiefFout}
          </div>
        )}

        {actieveResultaat && (
          <div style={{marginTop:20}}>
            {actieveResultaat.wedstrijden?.map((w,i) => (
              <div key={i} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,padding:16,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                  <div style={{flex:1,textAlign:"right",fontWeight:600,fontSize:16}}>{w.thuis}</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:28,fontWeight:700,color:"var(--accent)",minWidth:90,textAlign:"center"}}>
                    {w.score_thuis??"-"} – {w.score_uit??"-"}
                  </div>
                  <div style={{flex:1,fontWeight:600,fontSize:16}}>{w.uit}</div>
                </div>
                <div style={{textAlign:"center",fontSize:11,color:"var(--muted)",fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>
                  {w.datum}{w.tijdstip ? " · "+w.tijdstip : ""}{w.locatie ? " · "+w.locatie : ""}
                </div>
                {w.scorers?.length>0 && (
                  <div style={{borderTop:"1px solid var(--border)",paddingTop:10,marginTop:4}}>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>⚽ Doelpunten</div>
                    {w.scorers.map((s,j) => (
                      <div key={j} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",fontSize:13,borderBottom:"1px solid var(--border)"}}>
                        {s.minuut!=null && <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--accent)",minWidth:32}}>{s.minuut}&apos;</span>}
                        <span style={{fontWeight:500}}>{s.naam}</span>
                        <span style={{color:"var(--muted)",fontSize:11,marginLeft:4}}>{s.club}</span>
                        {s.type && <span style={{fontSize:10,padding:"2px 6px",background:"var(--accent-light)",color:"var(--accent)",borderRadius:4,marginLeft:"auto",textTransform:"uppercase"}}>{s.type}</span>}
                      </div>
                    ))}
                  </div>
                )}
                {w.kaarten?.length>0 && (
                  <div style={{borderTop:"1px solid var(--border)",paddingTop:10,marginTop:8}}>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>🟨 Kaarten</div>
                    {w.kaarten.map((k,j) => (
                      <div key={j} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",fontSize:13,borderBottom:"1px solid var(--border)"}}>
                        {k.minuut!=null && <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--muted)",minWidth:32}}>{k.minuut}&apos;</span>}
                        <span style={{fontSize:14}}>{k.type==="rood"?"🟥":k.type==="geel"?"🟨":"🟩"}</span>
                        <span style={{fontWeight:500,marginLeft:4}}>{k.naam}</span>
                        <span style={{color:"var(--muted)",fontSize:11,marginLeft:4}}>{k.club}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
            {actieveResultaat.highlights?.length>0 && (
              <div style={{marginTop:12}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>Highlights</div>
                {actieveResultaat.highlights.map((h,i) => (
                  <div key={i} style={{display:"flex",gap:10,padding:"8px 12px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,marginBottom:6,fontSize:13}}>
                    <span style={{color:"var(--accent)"}}>→</span><span>{h}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Overzicht onderaan als meerdere geparseerd */}
      {aantalGeparseerd > 0 && (
        <div style={{marginTop:20,padding:16,background:"var(--green-light)",border:"1px solid #bbf7d0",borderRadius:8,fontSize:13,color:"var(--green)"}}>
          ✅ {aantalGeparseerd} wedstrijd{aantalGeparseerd!==1?"en":""} geanalyseerd.
          Kopieer de JSON-data naar <code style={{fontSize:11}}>competities/{geslacht}/programma.json</code> via GitHub,
          of gebruik het <code style={{fontSize:11}}>fetch_ronde.py</code> script.
        </div>
      )}
    </div>
  );
}



// ── Club Pagina ───────────────────────────────────────────────
function ClubPagina({club, geslacht, spelers, nieuws, programma, nav}) {
  const clubSpelers = spelers
    .filter(s => s.club === club)
    .sort((a,b) => parseInt(a.rugnummer||99) - parseInt(b.rugnummer||99));

  const clubNieuws = nieuws.filter(n => {
    const t = (n.titel||n.title||"").toLowerCase();
    return t.includes(club.toLowerCase()) ||
           clubSpelers.some(s => {
             const delen = s.naam.split(" ");
             const vn = delen[0].toLowerCase();
             const an = delen[delen.length-1].toLowerCase();
             return an.length > 3 && t.includes(vn) && t.includes(an);
           });
  }).slice(0, 25);

  const clubWedstrijden = programma.filter(w =>
    (w.thuis||"").includes(club) || (w.uit||"").includes(club)
  );
  const gespeeld = clubWedstrijden.filter(w => w.gespeeld===true || w.score_thuis!=null).sort((a,b)=>new Date(b.datum||0)-new Date(a.datum||0));
  const komend   = clubWedstrijden.filter(w => w.gespeeld!==true && w.score_thuis==null).sort((a,b)=>new Date(a.datum||0)-new Date(b.datum||0));

  // Oranje badge
  // Vlaggetje op basis van land_code
  const Vlag = ({s}) => {
    if (!s.land_code || s.land_code.toLowerCase()==="nl") return null;
    const emoji = s.land_code.toUpperCase().replace(/./g, c =>
      String.fromCodePoint(c.charCodeAt(0)+127397));
    return <span style={{fontSize:12,flexShrink:0}}>{emoji}</span>;
  };

  const Td = ({children, right, mono, muted, accent, bold, w}) => (
    <td style={{
      padding:"6px 8px", textAlign:right?"right":"left",
      fontFamily:mono?"'JetBrains Mono',monospace":"inherit",
      fontSize:mono?12:13, fontWeight:bold?700:400,
      color:muted?"var(--muted)":accent?"var(--accent)":"var(--text)",
      whiteSpace:"nowrap", width:w||"1px",
      borderBottom:"1px solid var(--border)"
    }}>{children}</td>
  );

  return (
    <div className="fade">
      {/* Hero */}
      <div style={{padding:"20px 24px 16px",borderBottom:"1px solid var(--border)",
        background:"linear-gradient(to bottom,var(--surface2),var(--surface))"}}>
        <div style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",
          letterSpacing:1,marginBottom:4}}>
          {geslacht==="heren"?"Tulp Hoofdklasse Heren":"Tulp Hoofdklasse Dames"}
        </div>
        <div style={{fontSize:28,fontWeight:700,letterSpacing:"-.5px"}}>{club}</div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>
          {clubSpelers.length} spelers · seizoen 2025-2026
        </div>
      </div>

      {/* Twee kolommen */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",minHeight:"60vh"}}>

        {/* Links: spelers + wedstrijden */}
        <div style={{borderRight:"1px solid var(--border)",padding:"20px 24px"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Selectie</div>
          {/* Spelers tabel */}
          <table style={{width:"100%",borderCollapse:"collapse",marginBottom:20}}>
            <thead>
              <tr>
                {["#","Naam","","Goals","V","SC","SB"].map((h,i) => (
                  <th key={i} style={{
                    fontSize:10,fontWeight:600,textTransform:"uppercase",
                    letterSpacing:.5,color:"var(--muted)",
                    padding:"0 8px 8px",
                    textAlign:i===0||i>=3?"right":"left",
                    whiteSpace:"nowrap",
                    borderBottom:"1px solid var(--border2)"
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {clubSpelers.map((s,i) => (
                <tr key={i} style={{cursor:"pointer"}}
                  onClick={()=>nav("speler_via_club",{...s,_vanClub:club})}
                  onMouseEnter={e=>{for(let td of e.currentTarget.cells) td.style.background="var(--surface2)"}}
                  onMouseLeave={e=>{for(let td of e.currentTarget.cells) td.style.background=""}}>
                  <Td right mono accent bold>{s.rugnummer}</Td>
                  <td style={{padding:"6px 8px",whiteSpace:"nowrap",borderBottom:"1px solid var(--border)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:13,fontWeight:500,cursor:"pointer"}}>{s.naam}</span>
                      {s.keeper     && <span style={{fontSize:9,padding:"1px 4px",background:"#dbeafe",color:"#1e40af",borderRadius:3,fontWeight:700,flexShrink:0}}>K</span>}
                      {s.aanvoerder && <span style={{fontSize:9,padding:"1px 4px",background:"var(--orange-light)",color:"var(--orange)",borderRadius:3,fontWeight:700,flexShrink:0}}>A</span>}
                    </div>
                  </td>
                  <Td>
                    <Vlag s={s}/>
                  </Td>
                  <Td right mono bold accent>{s.doelpunten_seizoen>0?s.doelpunten_seizoen:""}</Td>
                  <Td right mono muted>{s.vd>0?s.vd:""}</Td>
                  <Td right mono muted>{s.sc>0?s.sc:""}</Td>
                  <Td right mono muted>{s.sb>0?s.sb:""}</Td>
                </tr>
              ))}
            </tbody>
          </table>

        </div>

        {/* Rechts: nieuws */}
        <div>
          <div style={{padding:"14px 18px 12px",borderBottom:"1px solid var(--border)"}}>
            <div style={{fontSize:13,fontWeight:700}}>Nieuws</div>
          </div>
          {clubNieuws.length > 0 ? clubNieuws.map((n,i) => (
            <a key={i} href={n.link||n.url||"#"} target="_blank" rel="noopener noreferrer"
              style={{display:"block",padding:"11px 18px",borderBottom:"1px solid var(--border)",
                textDecoration:"none",transition:"background .12s"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--surface2)"}
              onMouseLeave={e=>e.currentTarget.style.background=""}>
              <div style={{fontSize:10,color:"var(--muted)",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>
                {(n.datum||n.date||"").slice(0,10)}
              </div>
              <div style={{fontSize:12,fontWeight:600,lineHeight:1.4,color:"var(--text)",marginBottom:2}}>
                {n.titel||n.title||""}
              </div>
              {(n.samenvatting||n.beschrijving) && (
                <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.4,marginTop:2}}>
                  {(n.samenvatting||n.beschrijving||"").slice(0,100)}…
                </div>
              )}
            </a>
          )) : (
            <div style={{padding:"20px 18px",color:"var(--muted)",fontSize:12,fontStyle:"italic"}}>
              Geen nieuws gevonden.
            </div>
          )}
        </div>
      </div>

      {/* Wedstrijden: twee kolommen */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",borderTop:"1px solid var(--border)"}}>
        {/* Uitslagen */}
        <div style={{borderRight:"1px solid var(--border)",padding:"20px 24px"}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Uitslagen</div>
          {gespeeld.length > 0 ? (
            <div className="wl">
              {gespeeld.map((w,i) => (
                <div className="wr" key={i} onClick={()=>nav("wedstrijd",w)}>
                  <span className="wd">{formatDatum(w.datum)}</span>
                  <div className="wh" style={{fontWeight:(w.thuis||"").includes(club)?700:400}}>{w.thuis}</div>
                  <div className="ws">{w.score_thuis??w.doelpunten_thuis??"–"} – {w.score_uit??w.doelpunten_uit??"–"}</div>
                  <div className="wu" style={{fontWeight:(w.uit||"").includes(club)?700:400}}>{w.uit}</div>
                  <span className="wa">›</span>
                </div>
              ))}
            </div>
          ) : <div className="empty">Geen uitslagen beschikbaar.</div>}
        </div>
        {/* Komende wedstrijden */}
        <div style={{padding:"20px 24px"}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Programma</div>
          {komend.length > 0 ? (
            <div className="wl">
              {komend.map((w,i) => (
                <div className="wr" key={i} onClick={()=>nav("wedstrijd",w)}>
                  <span className="wd">{formatDatum(w.datum)}</span>
                  <div className="wh" style={{fontWeight:(w.thuis||"").includes(club)?700:400}}>{w.thuis}</div>
                  <div className="ws k">{w.tijdstip||"–"}</div>
                  <div className="wu" style={{fontWeight:(w.uit||"").includes(club)?700:400}}>{w.uit}</div>
                  <span className="wa">›</span>
                </div>
              ))}
            </div>
          ) : <div className="empty">Geen wedstrijden gepland.</div>}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [geslacht,setGeslacht]=useState("heren");
  const [page,setPage]=useState("dashboard");
  const [pageId,setPageId]=useState(null);
  const [stand,setStand]=useState([]);
  const [programma,setProgramma]=useState([]);
  const [nieuws,setNieuws]=useState([]);
  const [spelers,setSpelers]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    setLoading(true);
    const nieuwsBronnen = geslacht === "heren"
      ? ["nieuws/heren.json","nieuws/oranje-heren.json","nieuws/jong-oranje-heren.json"]
      : ["nieuws/dames.json","nieuws/oranje-dames.json","nieuws/jong-oranje-dames.json"];
    Promise.all([
      fetch(`competities/${geslacht}/standen.json`).then(r=>r.json()).catch(()=>null),
      fetch(`competities/${geslacht}/programma.json`).then(r=>r.json()).catch(()=>null),
      ...nieuwsBronnen.map(url=>fetch(url).then(r=>r.json()).catch(()=>null)),
    ]).then(([sd,pd,...nieuwsFeeds])=>{
      const sl=sd?.stand||[];
      if(sl.length>0&&sd?.bijgewerkt) sl[0]._bw=sd.bijgewerkt.slice(0,10);
      setStand(sl);
      setProgramma(pd?.wedstrijden||[]);
      const alleArtikelen=[];
      const gezieneTitels=new Set();
      for(const feed of nieuwsFeeds){
        const art=feed?.artikelen||feed?.items||[];
        for(const a of art){
          const titel=a.titel||a.title||"";
          if(titel&&!gezieneTitels.has(titel)){gezieneTitels.add(titel);alleArtikelen.push(a);}
        }
      }
      alleArtikelen.sort((a,b)=>new Date(b.datum||b.date||0)-new Date(a.datum||a.date||0));
      setNieuws(alleArtikelen);
      setLoading(false);
    });
  },[geslacht]);

  useEffect(()=>{
    fetch("spelers/index.json").then(r=>r.json())
      .then(d=>setSpelers((d?.spelers||[]).filter(s=>s.geslacht===geslacht)))
      .catch(()=>setSpelers([]));
  },[geslacht]);

  const nav=(p,id=null)=>{setPage(p);setPageId(id);window.scrollTo(0,0);};
  const isActive=id=>page===id||(page==="speler"&&id==="spelers");
  const showToggle=["dashboard","spelers"].includes(page);

  return (
    <>
      <style>{CSS}</style>
      <header className="hdr">
        <button className="logo" onClick={()=>nav("dashboard")}>🏑 Hockey DB</button>
        <nav className="nav">
          {[["dashboard","Stand"],["spelers","Spelers"],["invoer","+ Invoer"]].map(([id,lbl])=>(
            <button key={id} className={`nb ${isActive(id)?"on":""}`} onClick={()=>nav(id)}>{lbl}</button>
          ))}
        </nav>
        {showToggle
          ?<div className="gt">
            <button className={`gb ${geslacht==="heren"?"on":""}`} onClick={()=>setGeslacht("heren")}>Heren</button>
            <button className={`gb ${geslacht==="dames"?"on":""}`} onClick={()=>setGeslacht("dames")}>Dames</button>
          </div>
          :<div style={{width:120}}/>}
      </header>
      <Breadcrumb page={page} pageId={pageId} nav={nav}/>
      {page==="dashboard"&&<Dashboard geslacht={geslacht} nav={nav} stand={stand} programma={programma} nieuws={nieuws} loading={loading}/>}
      {page==="spelers"&&<SpelersOverzicht geslacht={geslacht} nav={nav} spelers={spelers}/>}
      {page==="speler"&&<SpelerDetail speler={pageId} nav={nav} nieuws={nieuws}/>}
      {page==="wedstrijd"&&<WedstrijdDetail wedstrijd={pageId} nav={nav}/>}
      {page==="invoer"&&<InvoerPagina geslacht={geslacht} programma={programma} spelers={spelers}/>}
      {page==="club"&&<ClubPagina club={pageId} geslacht={geslacht} spelers={spelers} nieuws={nieuws} programma={programma} nav={nav}/>}
      {page==="speler_via_club"&&<SpelerDetail speler={pageId} nav={nav} nieuws={nieuws}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
