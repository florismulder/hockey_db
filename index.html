        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",borderTop:"1px solid var(--border)"}}>
        <div style={{borderRight:"1px solid var(--border)",padding:"20px 24px"}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Uitslagen</div>
          {gespeeld.length > 0 ? (
            <div className="wl">
              {gespeeld.map((w,i) => (
                <div className="wr" key={i} onClick={()=>nav("wedstrijd",w)}>
                  <span className="wd">{formatDatum(w.datum)}</span>
                  <div className="wh" style={{fontWeight:(w.thuis||"").includes(club)?700:400}}><ClubKnop naam={w.thuis} nav={nav}/></div>
                  <div className="ws">{w.score_thuis??w.doelpunten_thuis??"–"} – {w.score_uit??w.doelpunten_uit??"–"}</div>
                  <div className="wu" style={{fontWeight:(w.uit||"").includes(club)?700:400}}><ClubKnop naam={w.uit} nav={nav}/></div>
                  <span className="wa">›</span>
                </div>
              ))}
            </div>
          ) : <div className="empty">Geen uitslagen beschikbaar.</div>}
        </div>
        <div style={{padding:"20px 24px"}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Programma</div>
          {komend.length > 0 ? (
            <div className="wl">
              {komend.map((w,i) => (
                <div className="wr" key={i} onClick={()=>nav("wedstrijd",w)}>
                  <span className="wd">{formatDatum(w.datum)}</span>
                  <div className="wh" style={{fontWeight:(w.thuis||"").includes(club)?700:400}}><ClubKnop naam={w.thuis} nav={nav}/></div>
                  <div className="ws k">{w.tijdstip||"–"}</div>
                  <div className="wu" style={{fontWeight:(w.uit||"").includes(club)?700:400}}><ClubKnop naam={w.uit} nav={nav}/></div>
                  <span className="wa">›</span>
                </div>
              ))}
            </div>
          ) : <div className="empty">Geen wedstrijden gepland.</div>}
        </div>
      </div>
    </div>
  );
}

function SpelersOverzicht({geslacht,nav,spelers,oranje}) {
  const [zoek,setZoek]=useState("");
  const [filterClub,setFilterClub]=useState("alle");
  const clubs=useMemo(()=>{const s=new Set(spelers.map(x=>x.club));return["alle",...Array.from(s).sort()];},[spelers]);
  const gefilterd=useMemo(()=>spelers.filter(s=>{
    const mz=!zoek||s.naam.toLowerCase().includes(zoek.toLowerCase());
    const mc=filterClub==="alle"||s.club===filterClub;
    return mz&&mc;
  }),[spelers,zoek,filterClub]);

  return (
    <div className="fade">
      <div className="sec">
        <div className="sec-hdr"><div className="sec-title">Spelers</div></div>
        <div className="zw">
          <input className="zi" placeholder="Zoek op naam…" value={zoek} onChange={e=>setZoek(e.target.value)}/>
          <select className="zs" value={filterClub} onChange={e=>setFilterClub(e.target.value)}>
            {clubs.map(c=><option key={c} value={c}>{c==="alle"?"Alle clubs":c}</option>)}
          </select>
        </div>
        <div className="sc">{gefilterd.length} spelers</div>
        <div className="sg">
          {gefilterd.map((s,i)=>(
            <div className="sk" key={i} onClick={()=>nav("speler",s)}>
              <div className="skt">
                <div><div className="sn"><Vlag s={s}/>{s.naam}</div><div className="scl">{s.club}</div></div>
                <div style={{textAlign:"right"}}><div className="sr">#{s.rugnummer}</div></div>
              </div>
              <div style={{display:"flex",gap:5,marginTop:8}}>
                {s.keeper&&<span className="sba sbk">K</span>}
                {s.aanvoerder&&<span className="sba sbv">A</span>}
                {oranje&&oranje.senior&&oranje.senior.includes(s.naam) && <span style={{fontSize:10,fontWeight:600,padding:"2px 6px",background:"var(--oranje-bg)",color:"var(--oranje-text)",borderRadius:4}}>🦁 Oranje</span>}
                {oranje&&oranje.senior&&oranje.jong&&!oranje.senior.includes(s.naam)&&oranje.jong.includes(s.naam) && <span style={{fontSize:10,fontWeight:600,padding:"2px 6px",background:"var(--oranje-bg)",color:"var(--oranje-text)",borderRadius:4}}>🦁 Jong Oranje</span>}
                {oranje&&oranje.senior&&oranje.jong&&oranje.u18&&!oranje.senior.includes(s.naam)&&!oranje.jong.includes(s.naam)&&oranje.u18.includes(s.naam) && <span style={{fontSize:10,fontWeight:600,padding:"2px 6px",background:"#fef9c3",color:"#854d0e",borderRadius:4}}>U18</span>}
                {oranje&&oranje.senior&&oranje.jong&&oranje.u18&&oranje.u16&&!oranje.senior.includes(s.naam)&&!oranje.jong.includes(s.naam)&&!oranje.u18.includes(s.naam)&&oranje.u16.includes(s.naam) && <span style={{fontSize:10,fontWeight:600,padding:"2px 6px",background:"#fef9c3",color:"#854d0e",borderRadius:4}}>U16</span>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SpelerDetail({speler,nav,nieuws,programma,oranje}) {
  if(!speler) return <div className="loading">Speler niet gevonden.</div>;
  const volledigeNaam=speler.naam.toLowerCase();
  const delen=speler.naam.split(" ");
  const vn=delen[0]; const an=delen[delen.length-1];
  const [toontDoelpunten,setToontDoelpunten]=useState(false);
  const [spelersNieuws,setSpelersNieuws]=useState([]);

  // Laad bullets uit nieuws/spelersnieuws.json
  useEffect(()=>{
    const spelerId = speler.id || slugify(speler.naam);
    if(!spelerId) return;
    fetch("nieuws/spelersnieuws.json")
      .then(r=>r.json())
      .then(d=>{
        const items = d[spelerId] || [];
        setSpelersNieuws(items);
      })
      .catch(()=>{});
  },[speler.id, speler.naam]);

  const groeneKaarten=useMemo(()=>{
    let tel=0;
    (programma||[]).forEach(w=>{(w.kaarten||[]).forEach(k=>{if(k.type==="groen"&&k.naam&&k.naam.toLowerCase()===volledigeNaam) tel++;});});
    return tel;
  },[programma,volledigeNaam]);

  // Wedstrijden waarin speler scoorde
  const gescoordIn=useMemo(()=>{
    return (programma||[]).filter(w=>
      (w.scorers||[]).some(s=>s.naam&&s.naam.toLowerCase()===volledigeNaam)
    ).sort((a,b)=>(parseDatum(b.datum)||new Date(0))-(parseDatum(a.datum)||new Date(0)));
  },[programma,volledigeNaam]);

  const relevant=(nieuws||[]).filter(n=>{
    const t=(n.titel||n.title||"").toLowerCase();
    const s=(n.samenvatting||n.summary||"").toLowerCase();
    const tekst=t+" "+s;
    return tekst.includes(volledigeNaam)
      ||(vn.length>2&&an.length>3&&tekst.includes(vn.toLowerCase())&&tekst.includes(an.toLowerCase()))
      ||(an.length>4&&tekst.includes(an.toLowerCase()));
  }).slice(0,10);

  const aantalStats=(speler.doelpunten_seizoen>0?4:0)+(groeneKaarten>0?1:0);

  return (
    <div className="fade">
      <div className="dh">
        <div className="dr">#{speler.rugnummer}</div>
        <div className="dn2"><Vlag s={speler}/>{speler.naam}</div>
        <div className="dm">
          <span className="dc ac">{speler.club}</span>
          <span className="dc">{speler.geslacht==="heren"?"Heren":"Dames"}</span>
          {speler.keeper&&<span className="dc ke">Keeper</span>}
          {speler.aanvoerder&&<span className="dc av">Aanvoerder</span>}
          {oranje&&oranje.senior&&oranje.senior.includes(speler.naam)&&<span style={{fontSize:12,fontWeight:600,padding:"4px 10px",background:"var(--oranje-bg)",color:"var(--oranje-text)",borderRadius:5,border:"1px solid var(--oranje-border)"}}>🦁 Oranje</span>}
          {oranje&&oranje.jong&&!oranje.senior?.includes(speler.naam)&&oranje.jong.includes(speler.naam)&&<span style={{fontSize:12,fontWeight:600,padding:"4px 10px",background:"var(--oranje-bg)",color:"var(--oranje-text)",borderRadius:5,border:"1px solid var(--oranje-border)"}}>🦁 Jong Oranje</span>}
          {oranje&&oranje.u18&&!oranje.senior?.includes(speler.naam)&&!oranje.jong?.includes(speler.naam)&&oranje.u18.includes(speler.naam)&&<span style={{fontSize:12,fontWeight:600,padding:"4px 10px",background:"#fef9c3",color:"#854d0e",borderRadius:5}}>U18</span>}
          {oranje&&oranje.u16&&!oranje.senior?.includes(speler.naam)&&!oranje.jong?.includes(speler.naam)&&!oranje.u18?.includes(speler.naam)&&oranje.u16.includes(speler.naam)&&<span style={{fontSize:12,fontWeight:600,padding:"4px 10px",background:"#fef9c3",color:"#854d0e",borderRadius:5}}>U16</span>}
        </div>
      </div>
      <div className="db">
        {/* Statistieken */}
        {aantalStats>0&&(
          <div style={{marginBottom:20}}>
            <div className="ds" style={{marginTop:0}}>Statistieken 2025-2026</div>
            <div style={{display:"grid",gridTemplateColumns:`repeat(${aantalStats},1fr)`,gap:8}}>
              {speler.doelpunten_seizoen>0&&[
                ["Goals",speler.doelpunten_seizoen,"var(--accent)",true],
                ["Veld",speler.vd??0,"var(--muted)",false],
                ["SC",speler.sc??0,"var(--muted)",false],
                ["SB",speler.sb??0,"var(--muted)",false],
              ].map(([lbl,val,kleur,klikbaar])=>(
                <div key={lbl}
                  onClick={klikbaar&&gescoordIn.length>0?()=>setToontDoelpunten(t=>!t):undefined}
                  style={{background:"var(--surface2)",border:`1px solid ${klikbaar&&gescoordIn.length>0?toontDoelpunten?"var(--accent)":"var(--border2)":"var(--border)"}`,
                    borderRadius:8,padding:"10px 12px",textAlign:"center",
                    cursor:klikbaar&&gescoordIn.length>0?"pointer":"default",
                    transition:"border-color .15s"}}>
                  <div style={{fontSize:20,fontWeight:700,color:kleur,fontFamily:"'JetBrains Mono',monospace"}}>{val}</div>
                  <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",marginTop:2}}>
                    {lbl}{klikbaar&&gescoordIn.length>0?" ›":""}
                  </div>
                </div>
              ))}
              {groeneKaarten>0&&(
                <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:700,color:"#16a34a",fontFamily:"'JetBrains Mono',monospace"}}>{groeneKaarten}</div>
                  <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",marginTop:2}}>🟩 Groen</div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Doelpunten detail */}
        {toontDoelpunten&&gescoordIn.length>0&&(
          <div style={{marginBottom:20,background:"var(--surface2)",borderRadius:8,padding:"14px",border:"1px solid var(--border)"}}>
            <div style={{fontSize:12,fontWeight:700,marginBottom:10,display:"flex",justifyContent:"space-between"}}>
              <span>Doelpunten per wedstrijd</span>
              <button onClick={()=>setToontDoelpunten(false)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:16}}>×</button>
            </div>
            {gescoordIn.map((w,i)=>{
              const goals=(w.scorers||[]).filter(s=>s.naam&&s.naam.toLowerCase()===volledigeNaam);
              return (
                <div key={i} onClick={()=>nav("wedstrijd",w)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",
                    borderBottom:"1px solid var(--border)",cursor:"pointer",fontSize:12}}
                  onMouseEnter={e=>e.currentTarget.style.opacity=".7"}
                  onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                  <span style={{fontFamily:"monospace",color:"var(--muted)",width:82,flexShrink:0,whiteSpace:"nowrap"}}>{formatDatum(w.datum)}</span>
                  <span style={{flex:1,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <span>{w.thuis} – {w.uit}</span>
                    <span style={{fontFamily:"monospace",fontWeight:700,color:"var(--accent)"}}>
                      {goals.map((g,j)=>(
                        <span key={j} style={{marginLeft:j>0?6:0}}>
                          ⚽{g.minuut!=null?` ${g.minuut}'`:""}
                          {g.type&&g.type!=="veld"?` (${g.type})` :""}
                        </span>
                      ))}
                    </span>
                  </span>
                </div>
              );
            })}
          </div>
        )}

        {/* Nieuws twee kolommen */}
        <div className="ds">Nieuws</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
          {/* Links: AI bullets */}
          <div>
            {spelersNieuws.length>0?(
              <div>
                {Object.entries(
                  spelersNieuws.reduce((acc,item)=>{
                    // Support zowel 'titel' als 'artikel_titel', en 'link' als 'artikel_link'
                    const titel = item.titel || item.artikel_titel || "";
                    const link  = item.link  || item.artikel_link  || "";
                    const bullet= item.bullet|| "";
                    const key   = titel || link || item.datum || "";
                    if(!acc[key]) acc[key]={datum:item.datum, titel:titel.replace(/_/g," "), link, bullets:[]};
                    if(bullet && !acc[key].bullets.includes(bullet)) acc[key].bullets.push(bullet);
                    return acc;
                  },{}
                )).sort((a,b)=>{
                  const pd = s => new Date(s[1].datum||0).getTime();
                  return pd(b)-pd(a);
                }).map(([key,item],i)=>(
                  <div key={i} style={{marginBottom:12,background:"var(--surface2)",borderRadius:7,padding:"10px 12px",border:"1px solid var(--border)"}}>
                    <div style={{fontSize:10,color:"var(--muted)",marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}>{formatNieuwsDatum(item.datum.slice(0,10))}</div>
                    {item.titel&&item.link?(
                      <a href={item.link} target="_blank" rel="noopener noreferrer"
                        style={{fontSize:12,fontWeight:600,marginBottom:6,display:"block",color:"var(--accent)",textDecoration:"none"}}
                        onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"}
                        onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>
                        {item.titel} ›
                      </a>
                    ):item.titel?(
                      <div style={{fontSize:12,fontWeight:600,marginBottom:6}}>{item.titel}</div>
                    ):null}
                    <ul style={{paddingLeft:14,margin:0}}>
                      {item.bullets.map((b,j)=>(
                        <li key={j} style={{fontSize:12,color:"var(--text)",marginBottom:3}}>{b}</li>
                      ))}
                    </ul>
                  </div>
                ))}
              </div>
            ):<div className="empty">Nog geen nieuwsbullets beschikbaar.</div>}
          </div>
          {/* Rechts: artikelen */}
          <div>
            {relevant.length>0?relevant.map((n,i)=>(
              <a className="ni" key={i} href={n.url||n.link||"#"} target="_blank" rel="noopener noreferrer">
                <div className="nid">{formatNieuwsDatum(n.datum||n.date||"")}</div>
                <div className="nit">{n.titel||n.title||""}</div>
              </a>
            )):<div className="empty">Geen nieuws gevonden.</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function WedstrijdDetail({wedstrijd, nav, spelers}) {
  if(!wedstrijd) return <div className="loading">Wedstrijd niet gevonden.</div>;
  const w=wedstrijd;
  const score=(w.gespeeld===true||w.score_thuis!=null)?`${w.score_thuis??w.doelpunten_thuis??"–"} – ${w.score_uit??w.doelpunten_uit??"–"}`:null;
  const vindSpeler = (naam) => { const nl=(naam||"").toLowerCase(); return (spelers||[]).find(s=>s.naam&&s.naam.toLowerCase().includes(nl)); };
  const SpelerLink = ({naam}) => {
    const speler = vindSpeler(naam);
    return speler
      ? <button onClick={()=>nav("speler",{...speler,_vanPagina:"wedstrijd",_vanWedstrijd:w})}
          style={{background:"none",border:"none",padding:0,fontSize:"inherit",fontWeight:"inherit",color:"var(--accent)",cursor:"pointer",textDecoration:"underline",textDecorationColor:"var(--accent-light)",textUnderlineOffset:2,fontFamily:"inherit"}}>{naam}</button>
      : <span>{naam}</span>;
  };

  return (
    <div className="fade">
      <div className="wdh">
        <div className="wdt">
          <div className="wdtm t" style={{cursor:"pointer"}} onClick={()=>nav("club",stripTeam(w.thuis))}>{w.thuis}</div>
          {score?<div className="wdsc">{score}</div>:<div className="wdsc k">vs</div>}
          <div className="wdtm" style={{cursor:"pointer"}} onClick={()=>nav("club",stripTeam(w.uit))}>{w.uit}</div>
        </div>
        <div className="wdi">{formatDatum(w.datum)}{(w.tijdstip||w.tijd)?` · ${w.tijdstip||w.tijd}`:""} {w.locatie?` · ${w.locatie}`:""}</div>
      </div>
      <div className="db">
        {(!w.scorers||w.scorers.length===0)&&(!w.kaarten||w.kaarten.length===0)?(
          <div className="empty">{score?"Geen scorersinformatie beschikbaar.":"Deze wedstrijd is nog niet gespeeld."}</div>
        ):(
          <>
          {w.scorers&&w.scorers.length>0&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{width:"100%",maxWidth:560}}>
              <div className="ds">Doelpunten</div>
              <table style={{borderCollapse:"collapse",width:"100%"}}>
                <thead><tr>{["'","Stand","Naam","Club","Type"].map((h,i)=><th key={i} style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:"var(--muted)",padding:"0 10px 8px",textAlign:i<=1?"center":"left",borderBottom:"1px solid var(--border2)"}}>{h}</th>)}</tr></thead>
                <tbody>
                  {(()=>{
                    let st=0, su=0;
                    return w.scorers.map((s,i)=>{
                      const isThuis = s.club && w.thuis && (w.thuis.toLowerCase().includes(s.club.toLowerCase()) || s.club.toLowerCase().includes(w.thuis.replace(/\s+[HhDd]\d+$/,"").trim().toLowerCase()));
                      if(isThuis) st++; else su++;
                      const standTekst = `${st}-${su}`;
                      return (
                        <tr key={i} style={{borderBottom:"1px solid var(--border)"}}>
                          <td style={{padding:"7px 10px",textAlign:"center",fontFamily:"monospace",fontSize:12,color:"var(--accent)",fontWeight:700}}>{s.minuut!=null?s.minuut+"'":"–"}</td>
                          <td style={{padding:"7px 10px",textAlign:"center",fontFamily:"monospace",fontSize:12,fontWeight:700,color:"var(--text)"}}>{standTekst}</td>
                          <td style={{padding:"7px 10px",fontSize:13,fontWeight:500}}><SpelerLink naam={s.naam}/></td>
                          <td style={{padding:"7px 10px",fontSize:12,color:"var(--muted)"}}>{s.club}</td>
                          <td style={{padding:"7px 10px"}}>{s.type&&s.type!=="veld"&&<span style={{fontSize:10,padding:"2px 6px",background:"var(--accent-light)",color:"var(--accent)",borderRadius:4,fontWeight:600}}>{s.type.toUpperCase()}</span>}</td>
                        </tr>
                      );
                    });
                  })()}
                </tbody>
              </table>
            </div>
          </div>
          )}
          {w.kaarten&&w.kaarten.length>0&&(
          <div style={{marginTop:20,display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{width:"100%",maxWidth:480}}>
              <div className="ds">Kaarten</div>
              <table style={{borderCollapse:"collapse",width:"100%"}}>
                <thead><tr>{["'","","Naam","Club"].map((h,i)=><th key={i} style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:"var(--muted)",padding:"0 10px 8px",textAlign:i===0?"center":"left",borderBottom:"1px solid var(--border2)"}}>{h}</th>)}</tr></thead>
                <tbody>
                  {w.kaarten.map((k,i)=>(
                    <tr key={i} style={{borderBottom:"1px solid var(--border)"}}>
                      <td style={{padding:"6px 10px",textAlign:"center",fontFamily:"monospace",fontSize:12,color:"var(--muted)"}}>{k.minuut!=null?k.minuut+"'":"–"}</td>
                      <td style={{padding:"6px 10px",fontSize:14}}>{k.type==="rood"?"🟥":k.type==="geel"?"🟨":"🟩"}</td>
                      <td style={{padding:"6px 10px",fontSize:13,fontWeight:500}}><SpelerLink naam={k.naam}/></td>
                      <td style={{padding:"6px 10px",fontSize:12,color:"var(--muted)"}}>{k.club}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          )}
          </>
        )}
      </div>
    </div>
  );
}

function HistoriePagina({nav}) {
  const [seizoenen, setSeizoen] = useState([]);
  const [geselecteerd, setGeselecteerd] = useState(null);
  const [detail, setDetail] = useState(null);
  const [loadingDetail, setLoadingDetail] = useState(false);

  useEffect(()=>{
    fetch("seizoenen/index.json").then(r=>r.json())
      .then(d=>setSeizoen(d.seizoenen||[]))
      .catch(()=>{});
  },[]);

  useEffect(()=>{
    if(!geselecteerd) return;
    setLoadingDetail(true);
    setDetail(null);
    fetch(`seizoenen/${geselecteerd.slug}/${geselecteerd.geslacht}.json`)
      .then(r=>r.json())
      .then(d=>{
        setDetail(d);
        setLoadingDetail(false);
        setTimeout(()=>{
          document.getElementById("historie-detail")?.scrollIntoView({behavior:"smooth",block:"start"});
        },100);
      })
      .catch(()=>setLoadingDetail(false));
  },[geselecteerd]);

  const blok = (s, g) => {
    const actief = geselecteerd?.slug===s.slug && geselecteerd?.geslacht===g;
    const kampioen = s[`kampioen_${g}`]||"";
    const heeftData = !!s[`clubs_${g}`];
    return (
      <div key={s.slug+g} onClick={()=>heeftData&&setGeselecteerd({slug:s.slug,geslacht:g})}
        style={{
          background: actief?"var(--accent-light)":"var(--surface2)",
          border:`1px solid ${actief?"var(--accent)":"var(--border)"}`,
          borderRadius:6, padding:"5px 8px",
          cursor:heeftData?"pointer":"default",
          opacity:heeftData?1:0.35, transition:"all .12s",
        }}>
        <div style={{fontSize:10,fontWeight:700,color:actief?"var(--accent)":"var(--text)",
          fontFamily:"'JetBrains Mono',monospace",letterSpacing:.3}}>{s.seizoen.slice(0,9)}</div>
        <div style={{fontSize:9,color:actief?"var(--accent)":"var(--muted)",marginTop:1,
          whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:70}}>
          {kampioen==="Geen (COVID)"?"⚠️ COVID":kampioen?`🏆 ${kampioen}`:"—"}
        </div>
      </div>
    );
  };

  const StandTabel = ({stand}) => (
    <table className="stand-tbl" style={{fontSize:12}}>
      <thead><tr>
        <th>#</th><th className="cl">Club</th>
        <th title="Gespeeld">W</th><th title="Punten">Pnt</th>
        <th title="Gewonnen">G</th><th title="Gelijk">Gk</th>
        <th title="Verloren">V</th><th title="Doelsaldo">Dsl</th>
      </tr></thead>
      <tbody>
        {stand.map(r=>{
          const zone=r.zone||"";
          const zClass=zone==="playoff"?"zpo":zone==="playout"?"zpl":zone==="degradatie"?"zde":"";
          const dsl=r.doelsaldo??0;
          return (
            <tr key={r.club} className={zClass}>
              <td><PosBadge n={r.positie} zone={zone}/></td>
              <td className="cl">{r.club}</td>
              <td>{r.gespeeld}</td>
              <td className="pnt">{r.punten}</td>
              <td>{r.gewonnen}</td><td>{r.gelijk}</td><td>{r.verloren}</td>
              <td className={dsl>0?"dp":dsl<0?"dn":""}>{dsl>0?`+${dsl}`:dsl}</td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );

  const parseScore = (score) => {
    if(!score) return {thuis:null, uit:null, soThuis:null, soUit:null};
    // Reguliere score
    const m = score.match(/^(\d+)\s*[-–]\s*(\d+)/);
    if(!m) return {thuis:null, uit:null, soThuis:null, soUit:null};
    const thuis = parseInt(m[1]), uit = parseInt(m[2]);
    // Shoot-out score (SO X-Y)
    const so = score.match(/SO\s*(\d+)\s*[-–]\s*(\d+)/i);
    const soThuis = so ? parseInt(so[1]) : null;
    const soUit   = so ? parseInt(so[2]) : null;
    return {thuis, uit, soThuis, soUit};
  };

  // Verwijder ruststanden zoals (2-0) maar behoud shoot-out notatie (SO 4-3)
  const formatScore = (score) => {
    if(!score) return "–";
    return score.replace(/\s*\(\d+[-–]\d+\)/g, '').trim();
  };

  const bepaalWinnaar = (m) => {
    const {thuis:st, uit:su, soThuis, soUit} = parseScore(m.score);
    if(st==null) return null;
    if(st > su) return "thuis";
    if(su > st) return "uit";
    // Gelijkspel — kijk naar shoot-out
    if(soThuis!=null && soUit!=null) return soThuis > soUit ? "thuis" : soUit > soThuis ? "uit" : null;
    // Kijk in notitie: "shoot-out X-Y" of "wins shoot-out"
    const n = (m.notitie||"").toLowerCase();
    const soN = n.match(/shoot.out[:\s]+(\d+)\s*[-–]\s*(\d+)/i) || n.match(/(\d+)\s*[-–]\s*(\d+)/);
    if(soN) return parseInt(soN[1]) > parseInt(soN[2]) ? "thuis" : "uit";
    return null;
  };

  const berekenAggregaat = (wedstrijden) => {
    // Bepaal de twee teams (normaliseer: team A is alfabetisch eerste)
    if(!wedstrijden.length) return null;
    const teams = [wedstrijden[0].thuis, wedstrijden[0].uit];
    let score = {[teams[0]]:0, [teams[1]]:0};
    wedstrijden.forEach(w => {
      const winnaar = bepaalWinnaar(w);
      if(winnaar==="thuis") score[w.thuis]++;
      else if(winnaar==="uit") score[w.uit]++;
    });
    const t0 = teams[0], t1 = teams[1];
    if(score[t0]>score[t1]) return {winnaar:t0, score:`${score[t0]}-${score[t1]}`};
    if(score[t1]>score[t0]) return {winnaar:t1, score:`${score[t1]}-${score[t0]}`};
    return {winnaar:null, score:`${score[t0]}-${score[t1]}`};
  };

  const WedstrijdRij = ({m, isFinale}) => {
    const winnaar = bepaalWinnaar(m);
    const thuisWint = winnaar==="thuis";
    const uitWint   = winnaar==="uit";

    // Sorteer scorers op minuut (chronologisch), nulls achteraan
    const scorersGesorteerd = m.scorers
      ? [...m.scorers].sort((a,b) => {
          if(a.minuut==null && b.minuut==null) return 0;
          if(a.minuut==null) return 1;
          if(b.minuut==null) return -1;
          return a.minuut - b.minuut;
        })
      : [];

    // Groepeer per club (thuis eerst, dan uit)
    const scorersThuis = scorersGesorteerd.filter(s => s.club && m.thuis && s.club.toLowerCase()===m.thuis.toLowerCase());
    const scorersUit   = scorersGesorteerd.filter(s => s.club && m.uit && s.club.toLowerCase()===m.uit.toLowerCase());
    const scorersOnbekend = scorersGesorteerd.filter(s => !s.club ||
      (s.club.toLowerCase()!==m.thuis?.toLowerCase() && s.club.toLowerCase()!==m.uit?.toLowerCase()));
    const heeftClubInfo = scorersThuis.length > 0 || scorersUit.length > 0;

    const ScorerLijst = ({scorers, club}) => scorers.length === 0 ? null : (
      <div style={{marginTop:4}}>
        <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:.3,marginBottom:2}}>{club}</div>
        {scorers.map((s,i)=>(
          <div key={i} style={{fontSize:11,color:"var(--muted)",paddingLeft:6}}>
            ⚽ <span style={{color:"var(--text)",fontWeight:500}}>{s.naam}</span>{s.minuut!=null?` ${s.minuut}'`:""}{s.type&&s.type!=="veld"?` (${s.type})`:""}
          </div>
        ))}
      </div>
    );

    return (
    <div style={{padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12}}>
        <span style={{flex:1,fontWeight:thuisWint?700:400}}>{m.thuis}</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:13,
          color:isFinale?"#166534":"var(--accent)",
          background:isFinale?"var(--playoff-bg)":"var(--surface2)",
          padding:"2px 10px",borderRadius:4,minWidth:52,textAlign:"center",
          border:`1px solid ${isFinale?"#86efac":"var(--border)"}`}}>
          {formatScore(m.score)}
        </span>
        <span style={{flex:1,fontWeight:uitWint?700:400}}>{m.uit}</span>
        {m.datum&&<span style={{fontSize:10,color:"var(--muted)",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>{m.datum}</span>}
      </div>
      {scorersGesorteerd.length>0&&(
        <div style={{marginTop:5,paddingLeft:4}}>
          {heeftClubInfo ? (
            <>
              <ScorerLijst scorers={scorersThuis} club={m.thuis}/>
              <ScorerLijst scorers={scorersUit} club={m.uit}/>
              <ScorerLijst scorers={scorersOnbekend} club="Onbekend"/>
            </>
          ) : (
            scorersGesorteerd.map((s,i)=>(
              <div key={i} style={{fontSize:11,color:"var(--muted)"}}>
                ⚽ <span style={{color:"var(--text)",fontWeight:500}}>{s.naam}</span>{s.minuut!=null?` ${s.minuut}'`:""}{s.type&&s.type!=="veld"?` (${s.type})`:""}
              </div>
            ))
          )}
        </div>
      )}
      {m.notitie&&<div style={{fontSize:11,color:"var(--muted)",marginTop:3,fontStyle:"italic"}}>{m.notitie}</div>}
    </div>
    );
  };

  const MatchupBlok = ({groep, isFinale}) => {
    const agg = groep.wedstrijden.length > 1 ? berekenAggregaat(groep.wedstrijden) : null;
    return (
      <div style={{background:isFinale?"var(--playoff-bg)":"var(--surface2)",borderRadius:7,padding:"10px 14px",border:`1px solid ${isFinale?"#86efac":"var(--border)"}`}}>
        <div style={{fontSize:11,fontWeight:700,color:isFinale?"#166534":"var(--muted)",marginBottom:6,textTransform:"uppercase",letterSpacing:.3}}>{groep.label}</div>
        {groep.wedstrijden.map((m,mi)=>(
          <WedstrijdRij key={mi} m={m} isFinale={isFinale}/>
        ))}
        {agg&&(
          <div style={{marginTop:8,paddingTop:6,borderTop:`1px solid ${isFinale?"#86efac":"var(--border)"}`,display:"flex",justifyContent:"flex-end",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:"var(--muted)"}}>Totaal:</span>
            <span style={{fontSize:12,fontWeight:700,color:isFinale?"#166534":"var(--accent)"}}>{agg.score}</span>
            {agg.winnaar&&<span style={{fontSize:12,fontWeight:700,color:isFinale?"#166534":"var(--text)"}}>→ {agg.winnaar}</span>}
          </div>
        )}
      </div>
    );
  };

  const groeperPerMatchup = (wedstrijden) => {
    const groepen = [];
    const gezien = {};
    wedstrijden.forEach(m => {
      const key = [m.thuis,m.uit].sort().join("__");
      if(!gezien[key]) {
        const teams = [m.thuis,m.uit].sort();
        gezien[key] = {label:`${teams[0]} – ${teams[1]}`, wedstrijden:[]};
        groepen.push(gezien[key]);
      }
      gezien[key].wedstrijden.push(m);
    });
    return groepen;
  };

  const PlayoffBlok = ({playoffs}) => {
    if(!playoffs) return null;
    const hf = playoffs.halve_finales||[];
    const fin = playoffs.finale;
    const kamp = playoffs.kampioen||"";
    if(!kamp && !fin && !hf.length) return null;

    const hfGroepen = groeperPerMatchup(hf);
    // finale kan een array zijn (meerduels) of een enkel object
    const finaleWedstrijden = playoffs.finale_wedstrijden
      ? (Array.isArray(playoffs.finale_wedstrijden) ? playoffs.finale_wedstrijden : [playoffs.finale_wedstrijden])
      : fin ? [fin] : [];
    const finGroep = finaleWedstrijden.length > 0
      ? groeperPerMatchup(finaleWedstrijden)[0] || {label:`${finaleWedstrijden[0].thuis} – ${finaleWedstrijden[0].uit}`, wedstrijden:finaleWedstrijden}
      : null;

    return (
      <div>
        <div className="ds" style={{marginTop:0}}>Play-offs</div>
        {kamp&&kamp!=="Geen (COVID)"&&(
          <div style={{background:"var(--playoff-bg)",border:"1px solid #86efac",
            borderRadius:8,padding:"10px 14px",marginBottom:14}}>
            <div style={{fontSize:10,color:"var(--green)",textTransform:"uppercase",letterSpacing:.5,marginBottom:4,fontWeight:600}}>Kampioen</div>
            <div style={{fontSize:18,fontWeight:700,color:"#166534"}}>🏆 {kamp}</div>
          </div>
        )}
        {hfGroepen.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Halve finales</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {hfGroepen.map((groep,gi)=>(
                <MatchupBlok key={gi} groep={groep} isFinale={false}/>
              ))}
            </div>
          </div>
        )}
        {finGroep&&(
          <div>
            <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Finale</div>
            <MatchupBlok groep={finGroep} isFinale={true}/>
          </div>
        )}
      </div>
    );
  };

  const PlayoutBlok = ({playoffs}) => {
    const po = playoffs?.playout||playoffs?.play_outs||null;
    if(!po||!Array.isArray(po)||!po.length) return null;
    const groepen = groeperPerMatchup(po);
    return (
      <div>
        <div className="ds" style={{marginTop:0}}>Play-outs</div>
        <div style={{fontSize:10,color:"var(--muted)",marginBottom:10,lineHeight:1.5,
          background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:5,padding:"6px 10px"}}>
          <span style={{fontWeight:600}}>#10 Hoofdklasse</span> speelt tegen <span style={{fontWeight:600}}>#3 Promotieklasse</span><br/>
          <span style={{fontWeight:600}}>#11 Hoofdklasse</span> speelt tegen <span style={{fontWeight:600}}>#2 Promotieklasse</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {groepen.map((groep,gi)=>(
            <MatchupBlok key={gi} groep={groep} isFinale={false}/>
          ))}
        </div>
      </div>
    );
  };

  return (
    <div className="fade">
      {/* Header */}
      <div style={{padding:"16px 24px 12px",borderBottom:"1px solid var(--border)",
        background:"linear-gradient(to bottom,var(--surface2),var(--surface))"}}>
        <div style={{fontSize:20,fontWeight:700,letterSpacing:"-.5px"}}>Historie</div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>Tulp Hoofdklasse — klik op een seizoen voor details</div>
      </div>

      {/* Seizoensblokjes: 4 kolommen (2 heren + 2 dames) */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",borderBottom:"1px solid var(--border)"}}>
        {["heren","dames"].map(g=>(
          <div key={g} style={{borderRight:g==="heren"?"1px solid var(--border)":"none",padding:"14px 16px"}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,
              color:"var(--muted)",marginBottom:10}}>{g}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}}>
              {seizoenen
                .filter(s => g==="heren" || s.seizoen>="1981-1982")
                .map(s=>blok(s,g))}
            </div>
          </div>
        ))}
      </div>

      {/* Detail sectie */}
      {geselecteerd&&(
        <div id="historie-detail">
          {loadingDetail&&<div className="loading">Laden…</div>}
          {detail&&!loadingDetail&&(
            <>
              {/* Titel */}
              <div style={{padding:"16px 24px 12px",borderBottom:"1px solid var(--border)",
                display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <div style={{fontSize:18,fontWeight:700}}>{detail.seizoen}</div>
                <div style={{fontSize:12,color:"var(--muted)",textTransform:"capitalize",
                  background:"var(--surface2)",padding:"2px 8px",borderRadius:4,border:"1px solid var(--border)"}}>{detail.geslacht}</div>
                {detail.kampioen&&detail.kampioen!=="Geen (COVID)"&&(
                  <div style={{fontSize:14,fontWeight:700,color:"#166534"}}>🏆 {detail.kampioen}</div>
                )}
                {detail.kampioen==="Geen (COVID)"&&(
                  <div style={{fontSize:12,color:"var(--muted)"}}>⚠️ Seizoen afgebroken door COVID-19</div>
                )}
              </div>

              {/* Twee kolommen: links stand, rechts playoffs */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
                <div style={{borderRight:"1px solid var(--border)",borderBottom:"1px solid var(--border)",padding:"20px 24px"}}>
                  {detail.stand?.length>0?(
                    <>
                      <div className="ds" style={{marginTop:0}}>Eindstand reguliere competitie</div>
                      <StandTabel stand={detail.stand}/>
                      <div className="legend" style={{marginTop:8}}>
                        <div className="li"><div className="ld" style={{background:"#4ade80"}}/> 1-4 Play-offs</div>
                        <div className="li"><div className="ld" style={{background:"#facc15"}}/> Play-outs</div>
                        <div className="li"><div className="ld" style={{background:"#f87171"}}/> Degradatie</div>
                      </div>
                    </>
                  ):<div className="empty">Standdata niet beschikbaar voor dit seizoen.</div>}
                  {detail.topscorers?.length>0&&(
                    <div style={{marginTop:16,borderTop:"1px solid var(--border)",paddingTop:12}}>
                      <div className="ds" style={{marginTop:0}}>Topscorers</div>
                      <table className="stand-tbl" style={{fontSize:11}}>
                        <thead><tr>
                          <th style={{textAlign:"left",width:20,paddingRight:4}}>#</th>
                          <th style={{textAlign:"left"}}>Naam</th>
                          <th style={{textAlign:"left",color:"var(--muted)"}}>Club</th>
                          <th title="Totaal" style={{width:28}}>Tot</th>
                        </tr></thead>
                        <tbody>
                          {detail.topscorers.map((t,i)=>(
                            <tr key={i}>
                              <td style={{textAlign:"left",color:"var(--muted)",paddingRight:4}}>{t.rang||i+1}</td>
                              <td style={{textAlign:"left",fontWeight:600}}>{t.naam}</td>
                              <td style={{textAlign:"left",color:"var(--muted)",fontSize:10}}>{t.club}</td>
                              <td className="pnt">{t.doelpunten}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                  {detail.coaches?.length>0&&(
                    <div style={{marginTop:16,borderTop:"1px solid var(--border)",paddingTop:12}}>
                      <div className="ds" style={{marginTop:0}}>Coaches</div>
                      {detail.coaches.map((c,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid var(--border)",fontSize:12}}>
                          <span style={{fontWeight:600}}>{c.naam}</span>
                          <span style={{color:"var(--muted)",fontSize:11}}>{c.club}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{borderBottom:"1px solid var(--border)",padding:"20px 24px"}}>
                  <PlayoffBlok playoffs={detail.playoffs}/>
                  {(!detail.playoffs?.kampioen&&!detail.playoffs?.finale&&!(detail.playoffs?.halve_finales?.length))&&(
                    <div>
                      <div className="ds" style={{marginTop:0}}>Play-offs</div>
                      {detail.kampioen==="Geen (COVID)"?(
                        <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:"14px"}}>
                          <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>⚠️ COVID-19</div>
                          <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.6}}>Seizoen vroegtijdig beëindigd. Geen play-offs gespeeld.</div>
                        </div>
                      ):(
                        <div className="empty">Play-offdata wordt later toegevoegd.</div>
                      )}
                    </div>
                  )}
                </div>
              </div>

              {/* Tweede rij: uitslagen links, play-outs rechts */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
                <div style={{borderRight:"1px solid var(--border)",padding:"20px 24px"}}>
                  {detail.uitslagen?.length>0?(
                    <>
                      <div className="ds" style={{marginTop:0}}>Uitslagen</div>
                      <div>{detail.uitslagen.map((u,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid var(--border)",fontSize:12}}>
                        <span style={{fontFamily:"monospace",fontSize:10,color:"var(--muted)",width:52,flexShrink:0}}>{u.datum||""}</span>
                        <span style={{flex:1,fontWeight:500,textAlign:"right"}}>{u.thuis}</span>
                        <span style={{fontFamily:"monospace",fontWeight:700,color:"var(--accent)"}}>{u.score_thuis??""} – {u.score_uit??""}</span>
                        <span style={{flex:1,color:"var(--muted)"}}>{u.uit}</span>
                      </div>
                    ))}</div>
                  </>
                  ):null}
                </div>
                <div style={{padding:"20px 24px"}}>
                  <PlayoutBlok playoffs={detail.playoffs}/>
                </div>
              </div>
              {/* Terugknop */}
              <div style={{padding:"16px 24px",borderTop:"1px solid var(--border)",textAlign:"center"}}>
                <button onClick={()=>document.querySelector(".fade").scrollIntoView({behavior:"smooth",block:"start"})}
                  style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,
                    padding:"7px 20px",fontSize:12,fontWeight:600,color:"var(--muted)",cursor:"pointer"}}>
                  ↑ Terug naar overzicht
                </button>
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

function ClubHistoriePagina({club, geslacht, nav}) {
  const [clubHistorie, setClubHistorie] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    setLoading(true);
    setClubHistorie([]);
    (async ()=>{
      try {
        const idx = await fetch("seizoenen/index.json").then(r=>r.json()).catch(()=>({seizoenen:[]}));
        const seizoenLijst = (idx.seizoenen||[]).filter(s=>s[`clubs_${geslacht}`]||s.slug);
        const details = await Promise.all(
          seizoenLijst.map(s=>fetch(`seizoenen/${s.slug}/${geslacht}.json`).then(r=>r.json()).catch(()=>null))
        );
        const resultaat = [];
        seizoenLijst.forEach((s,i)=>{
          const d = details[i];
          if(!d?.stand) return;
          const rij = d.stand.find(r=>(r.club||"").toLowerCase()===club.toLowerCase());
          if(!rij) return;
          const dsl = rij.doelsaldo??(rij.doelpunten_voor-rij.doelpunten_tegen)??0;
          resultaat.push({
            seizoen: s.seizoen||s.slug,
            slug: s.slug,
            positie: rij.positie,
            gespeeld: rij.gespeeld||0,
            punten: rij.punten||0,
            dv: rij.doelpunten_voor||0,
            dt: rij.doelpunten_tegen||0,
            dsl,
            kampioen: (d.kampioen||"").toLowerCase()===club.toLowerCase(),
            zone: rij.zone||"",
          });
        });
        resultaat.sort((a,b)=>b.seizoen.localeCompare(a.seizoen));
        setClubHistorie(resultaat);
      } catch(e){}
      setLoading(false);
    })();
  },[club,geslacht]);

  const zoneKleur = z => z==="playoff"?"#166534":z==="playout"?"#92400e":z==="degradatie"?"#991b1b":"var(--muted)";
  const zoneBg   = z => z==="playoff"?"#dcfce7":z==="playout"?"#fef9c3":z==="degradatie"?"#fee2e2":"var(--surface2)";

  return (
    <div className="fade">
      <div style={{padding:"20px 24px 16px",borderBottom:"1px solid var(--border)",background:"linear-gradient(to bottom,var(--surface2),var(--surface))"}}>
        <div style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{geslacht==="heren"?"Tulp Hoofdklasse Heren":"Tulp Hoofdklasse Dames"}</div>
        <div style={{display:"flex",alignItems:"baseline",gap:16}}>
          <div style={{fontSize:28,fontWeight:700,letterSpacing:"-.5px"}}>{club}</div>
          <span style={{fontSize:13,color:"var(--muted)"}}>Historie</span>
        </div>
        {!loading&&<div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{clubHistorie.length} seizoen{clubHistorie.length!==1?"en":""} met data</div>}
      </div>
      <div style={{padding:"20px 24px"}}>
        {loading&&<div className="loading">Laden…</div>}
        {!loading&&clubHistorie.length===0&&<div className="empty">Geen historische data beschikbaar voor {club}.</div>}
        {!loading&&clubHistorie.length>0&&(
          <table className="stand-tbl">
            <thead><tr>
              <th style={{textAlign:"left"}}>Seizoen</th>
              <th>#</th>
              <th>W</th>
              <th>Pnt</th>
              <th>DV</th>
              <th>DT</th>
              <th>Dsl</th>
              <th style={{textAlign:"left"}}>Bijzonderheden</th>
            </tr></thead>
            <tbody>
              {clubHistorie.map((r,i)=>{
                const dslNum = typeof r.dsl==="string"?parseInt(r.dsl)||0:r.dsl;
                return (
                  <tr key={i} style={{cursor:"pointer"}}
                    onClick={()=>nav("historie",{_seizoenSlug:r.slug,_geslacht:geslacht})}
                    onMouseEnter={e=>{for(let td of e.currentTarget.cells) td.style.background="var(--surface2)"}}
                    onMouseLeave={e=>{for(let td of e.currentTarget.cells) td.style.background=""}}>
                    <td style={{textAlign:"left",fontWeight:600,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{r.seizoen}</td>
                    <td><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:22,height:22,borderRadius:5,fontSize:12,fontWeight:700,background:zoneBg(r.zone),color:zoneKleur(r.zone)}}>{r.positie}</span></td>
                    <td>{r.gespeeld}</td>
                    <td className="pnt">{r.punten}</td>
                    <td>{r.dv}</td>
                    <td>{r.dt}</td>
                    <td className={dslNum>0?"dp":dslNum<0?"dn":""}>{dslNum>0?`+${dslNum}`:dslNum}</td>
                    <td style={{textAlign:"left"}}>
                      {r.kampioen&&<span style={{fontSize:11,fontWeight:700,color:"#166534"}}>🏆 Kampioen</span>}
                      {!r.kampioen&&r.zone==="playoff"&&<span style={{fontSize:11,color:"#166534"}}>Play-offs</span>}
                      {r.zone==="playout"&&<span style={{fontSize:11,color:"#92400e"}}>Play-outs</span>}
                      {r.zone==="degradatie"&&<span style={{fontSize:11,color:"#991b1b"}}>⬇️ Degradatie</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
        <div style={{marginTop:20,fontSize:12,color:"var(--muted)"}}>Klik op een seizoen voor de volledige details.</div>
      </div>
    </div>
  );
}

function App() {
  const [geslacht,setGeslacht]=useState("heren");
  const [page,setPage]=useState("dashboard");
  const [pageId,setPageId]=useState(null);
  const [stand,setStand]=useState([]);
  const [programma,setProgramma]=useState([]);
  const [topscorers,setTopscorers]=useState([]);
  const [oranje,setOranje]=useState({senior:[],jong:[],u18:[],u16:[]});
  const [nieuws,setNieuws]=useState([]);
  const [spelers,setSpelers]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    setLoading(true);
    const nieuwsBronnen = geslacht === "heren"
      ? ["nieuws/heren.json","nieuws/oranje-heren.json","nieuws/jong-oranje-heren.json"]
      : ["nieuws/dames.json","nieuws/oranje-dames.json","nieuws/jong-oranje-dames.json"];
    Promise.all([
      fetch(`competities/${geslacht}/standen.json`).then(r=>r.json()).catch(()=>null),
      fetch(`competities/${geslacht}/programma.json`).then(r=>r.json()).catch(()=>null),
      fetch(`competities/${geslacht}/topscorers.json`).then(r=>r.json()).catch(()=>null),
      fetch(`spelers/oranje/oranje-${geslacht}.json`).then(r=>r.json()).catch(()=>null),
      fetch(`spelers/oranje/jong-oranje-${geslacht}.json`).then(r=>r.json()).catch(()=>null),
      fetch(`spelers/oranje/u18-${geslacht}.json`).then(r=>r.json()).catch(()=>null),
      fetch(`spelers/oranje/u16-${geslacht}.json`).then(r=>r.json()).catch(()=>null),
      ...nieuwsBronnen.map(url=>fetch(url).then(r=>r.json()).catch(()=>null)),
    ]).then(([sd,pd,td,od,jod,u18d,u16d,...nieuwsFeeds])=>{
      const sl=sd?.stand||[];
      if(sl.length>0&&sd?.bijgewerkt) {
        const bw = sd.bijgewerkt.slice(0,10);
        const [y,m,d] = bw.split("-");
        sl[0]._bw = d && m && y ? `${d}-${m}-${y}` : bw;
      }
      setStand(sl);
      setProgramma(pd?.wedstrijden||[]);
      setTopscorers(td?.topscorers||[]);
      if(td?.bijgewerkt) setTopscorers(prev => { const arr = td.topscorers||[]; if(arr.length>0) arr[0]._bw=td.bijgewerkt.slice(0,10); return arr; });
      setOranje({
        senior: od?.alle_namen||[],
        jong:   jod?.alle_namen||[],
        u18:    u18d?.alle_namen||[],
        u16:    u16d?.alle_namen||[],
      });
      
      const alleArtikelen=[]; const gezieneTitels=new Set();
      for(const feed of nieuwsFeeds){
        for(const a of (feed?.artikelen||feed?.items||[])){
          const titel=a.titel||a.title||"";
          if(titel&&!gezieneTitels.has(titel)){gezieneTitels.add(titel);alleArtikelen.push(a);}
        }
      }
      alleArtikelen.sort((a,b)=>{
        const parseer = d => {
          if(!d) return 0;
          // dd-mm-yyyy formaat
          const m = String(d).match(/^(\d{2})-(\d{2})-(\d{4})/);
          if(m) return new Date(m[3],m[2]-1,m[1]).getTime();
          return new Date(d).getTime()||0;
        };
        return parseer(b.datum||b.date) - parseer(a.datum||a.date);
      });
      setNieuws(alleArtikelen); setLoading(false);
    });
  },[geslacht]);

  useEffect(()=>{
    fetch("spelers/index.json").then(r=>r.json()).then(d=>setSpelers((d?.spelers||[]).filter(s=>s.geslacht===geslacht))).catch(()=>setSpelers([]));
  },[geslacht]);

  const nav=(p,id=null)=>{setPage(p);setPageId(id);window.scrollTo(0,0);};
  const isActive=id=>page===id||(page==="speler"&&id==="spelers");

  return (
    <>
      <style>{CSS}</style>
      <header className="hdr">
        <button className="logo" onClick={()=>nav("dashboard")}>🏑 Hockey DB</button>
        <nav className="nav">
          {[["dashboard","Stand"],["spelers","Spelers"],["oranje","Oranje"],["historie","Historie"]].map(([id,lbl])=>(
            <button key={id} className={`nb ${isActive(id)?"on":""}`} onClick={()=>nav(id)}>{lbl}</button>
          ))}
        </nav>
        <div className="gt">
          <button className={`gb ${geslacht==="heren"?"on":""}`} onClick={()=>setGeslacht("heren")}>Heren</button>
          <button className={`gb ${geslacht==="dames"?"on":""}`} onClick={()=>setGeslacht("dames")}>Dames</button>
        </div>
      </header>
      <Breadcrumb page={page} pageId={pageId} nav={nav}/>
      {page==="dashboard"&&<Dashboard geslacht={geslacht} nav={nav} stand={stand} programma={programma} nieuws={nieuws} loading={loading}/>}
      {page==="spelers"&&<SpelersOverzicht geslacht={geslacht} nav={nav} spelers={spelers} oranje={oranje}/>}
      {page==="topscorers"&&<TopscorersOverzicht topscorers={topscorers} spelers={spelers} nav={nav}/>}
      {page==="oranje"&&<OranjePagina oranje={oranje} nav={nav} geslacht={geslacht} spelers={spelers}/>}
      {page==="historie"&&<HistoriePagina nav={nav}/>}
      {page==="speler"&&<SpelerDetail speler={pageId} nav={nav} nieuws={nieuws} programma={programma} oranje={oranje}/>}
      {page==="wedstrijd"&&<WedstrijdDetail wedstrijd={pageId} nav={nav} spelers={spelers}/>}
      {page==="invoer"&&<InvoerPagina />}
      {page==="club"&&<ClubPagina club={pageId} geslacht={geslacht} spelers={spelers} nieuws={nieuws} programma={programma} nav={nav} oranje={oranje}/>}
      {page==="club_historie"&&<ClubHistoriePagina club={pageId?.club||pageId} geslacht={pageId?.geslacht||geslacht} nav={nav}/>}
      {page==="speler_via_club"&&<SpelerDetail speler={pageId} nav={nav} nieuws={nieuws} programma={programma} oranje={oranje}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
