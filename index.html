const MAANDEN = {
  january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11,
  jan:0,feb:1,mar:2,apr:3,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,mrt:2,mei:4,okt:9
};

function parseDatum(str) {
  if (!str) return null;
  const s = str.toLowerCase().trim();
  const m1 = s.match(/^(\w+)\s+(\d{1,2})$/);
  if (m1) { const mnd=MAANDEN[m1[1]]; if(mnd!==undefined) return new Date(new Date().getFullYear(),mnd,parseInt(m1[2])); }
  const m2 = s.match(/^(\d{1,2})\s+(\w+)$/);
  if (m2) { const mnd=MAANDEN[m2[2]]; if(mnd!==undefined) return new Date(new Date().getFullYear(),mnd,parseInt(m2[1])); }
  const m3 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m3) return new Date(parseInt(m3[1]),parseInt(m3[2])-1,parseInt(m3[3]));
  return null;
}

function formatDatum(str) {
  if (!str) return "";
  const d = parseDatum(str);
  if (!d) return str;
  return `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
}

function formatNieuwsDatum(str) {
  if (!str) return "";
  const s = String(str).trim();
  // dd-mm-yyyy → toon als dd-mm-yyyy
  if (/^\d{2}-\d{2}-\d{4}$/.test(s)) return s;
  // yyyy-mm-dd → zet om naar dd-mm-yyyy
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[3]}-${m[2]}-${m[1]}`;
  return s.slice(0,10);
}

function stripTeam(naam) { return naam ? naam.replace(/\s+[HhDd]\d+$/,"").trim() : ""; }

function ClubKnop({naam, nav, style, children}) {

}

function slugify(naam) {
  return (naam||"").toLowerCase()
    .replace(/[àáâä]/g,"a").replace(/[èéêë]/g,"e").replace(/[ìíîï]/g,"i")
    .replace(/[òóôö]/g,"o").replace(/[ùúûü]/g,"u").replace(/ñ/g,"n").replace(/ç/g,"c")
    .replace(/['']/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");
}

function Vlag({s}) {
  if (!s || !s.land_code || s.land_code.toLowerCase()==="nl") return null;
  const code = s.land_code.toUpperCase();
  // Speciale regio-vlaggen via tag sequences
  const regio = {
    "GB-SCT": "\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC73\uDB40\uDC63\uDB40\uDC74\uDB40\uDC7F",
    "GB-ENG": "\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F",
    "GB-WLS": "\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC77\uDB40\uDC6C\uDB40\uDC73\uDB40\uDC7F",
  };
  const emoji = regio[code] || code.replace(/./g, c => String.fromCodePoint(c.charCodeAt(0)+127397));
  return <span style={{fontSize:14,marginRight:6,verticalAlign:"middle"}}>{emoji}</span>;
}

function PosBadge({n, zone}) {
  // Overschrijf zone altijd op basis van positie voor een 12-teams competitie
  const z = n<=4?"playoff":n>=10&&n<=11?"playout":n>=12?"degradatie":"";
  const style = z==="playoff" ? {background:"#166534",color:"#ffffff",border:"none"} : z==="playout" ? {background:"#facc15",color:"#1a1a1a",border:"none"} : z==="degradatie" ? {background:"#991b1b",color:"#ffffff",border:"none"} : {background:"var(--surface2)",border:"1px solid var(--border)",color:"var(--muted)"};
  return <span className="pb" style={style}>{n}</span>;
}

function Breadcrumb({page,pageId,nav}) {
  const items=[{label:"Home",target:"dashboard"}];
  if(page==="spelers") items.push({label:"Spelers",target:null});
  if(page==="topscorers") items.push({label:"Topscorers",target:null});
  if(page==="oranje") items.push({label:"Oranje",target:null});
  if(page==="historie") items.push({label:"Historie",target:null});
  if(page==="speler") {
    if(pageId?._vanPagina==="topscorers") {
      items.push({label:"Topscorers",target:"topscorers"});
    } else if(pageId?._vanPagina==="wedstrijd" && pageId?._vanWedstrijd) {
      items.push({label:`${pageId._vanWedstrijd.thuis} vs ${pageId._vanWedstrijd.uit}`,target:"wedstrijd",targetId:pageId._vanWedstrijd});
    } else {
      items.push({label:"Spelers",target:"spelers"});
    }
    items.push({label:pageId?.naam||"",target:null});
  }
  if(page==="speler_via_club") { items.push({label:pageId?._vanClub||"Club",target:"club",targetId:pageId?._vanClub}); items.push({label:pageId?.naam||"",target:null}); }
  if(page==="club") items.push({label:pageId||"",target:null});
  if(page==="club_historie") { items.push({label:pageId?.club||pageId,target:"club",targetId:pageId?.club||pageId}); items.push({label:"Historie",target:null}); }
  if(page==="wedstrijd") items.push({label:`${pageId?.thuis} vs ${pageId?.uit}`,target:null});
  if(items.length<=1) return null;
  return (
    <div className="bc">

      ))}

  );
}

function TopscorersOverzicht({topscorers, spelers, nav}) {
  const vindSpeler = (naam, naamSlug) => {
    if(!spelers?.length) return null;
    // Eerst op slug matchen (meest betrouwbaar bij speciale tekens)
    if(naamSlug) {
      const opSlug = spelers.find(s => s.id === naamSlug);
      if(opSlug) return opSlug;
    }
    if(!naam) return null;
    const nl = naam.toLowerCase();
    return spelers.find(s=>s.naam&&s.naam.toLowerCase()===nl)
      || spelers.find(s=>s.naam&&(s.naam.toLowerCase().includes(nl)||nl.includes(s.naam.toLowerCase())));
  };
  return (
    <div className="fade">
      <div className="sec">
        <div className="sec-hdr">
          <div style={{display:"flex",alignItems:"baseline",gap:10}}>
            <div className="sec-title">Topscorers Seizoen 25/26</div>
            {topscorers[0]?._bw&&<div className="sec-sub">Bijgewerkt {topscorers[0]._bw.split("-").reverse().join("-")}</div>}
          </div>
        </div>
        {topscorers.length > 0 ? (
          <table className="stand-tbl">

                <th style={{textAlign:'left', width: 30}}>#</th>

                <th style={{textAlign:'right'}}>Goals</th>
                <th style={{textAlign:'right'}} title="Veld">V</th>
                <th style={{textAlign:'right'}} title="Strafcorner">SC</th>
                <th style={{textAlign:'right'}} title="Strafbal">SB</th>
              </tr>
            </thead>
            <tbody>
              {topscorers.map((t, i) => {
                const speler = vindSpeler(t.naam, t.naam_slug);
                return (
                <tr key={i}>
                  <td style={{textAlign:'left'}}>{i + 1}</td>

                      : t.naam}

                  <td style={{color:'var(--accent)', fontWeight:700, textAlign:'right'}}>{t.doelpunten}</td>
                  <td style={{textAlign:'right'}}>{t.vd}</td>
                  <td style={{textAlign:'right'}}>{t.sc}</td>
                  <td style={{textAlign:'right'}}>{t.sb}</td>
                </tr>

              })}
            </tbody>
          </table>
        ) : <div className="empty">Geen topscorers beschikbaar.</div>}
      </div>
    </div>
  );
}

    const bestanden = {
      senior:    `spelers/oranje/oranje-${geslacht}.json`,
      jong:      `spelers/oranje/jong-oranje-${geslacht}.json`,
      u18:       `spelers/oranje/u18-${geslacht}.json`,
      u16:       `spelers/oranje/u16-${geslacht}.json`,
    };
    const promises = Object.entries(bestanden).map(([key,url])=>
      fetch(url).then(r=>r.json()).then(d=>({key,data:d})).catch(()=>({key,data:null}))
    );
    Promise.all(promises).then(results=>{
      const s = {};
      results.forEach(({key,data})=>{ if(data) s[key]=data; });
      setSelecties(s);
    });
  },[geslacht]);

  const normaliseer = s => s ? s.toLowerCase()
    .replace(/[àáâä]/g,"a").replace(/[èéêë]/g,"e").replace(/[ìíîï]/g,"i")
    .replace(/[òóôö]/g,"o").replace(/[ùúûü]/g,"u") : "";

  const vindSpeler = (naam) => {
    if(!naam||!spelers||!spelers.length) return null;
    const nl = normaliseer(naam);
    return spelers.find(s=>s.naam&&normaliseer(s.naam)===nl)
      || spelers.find(s=>s.naam&&(normaliseer(s.naam).includes(nl)||nl.includes(normaliseer(s.naam))));

    {id:"u18",    label:"U18"},

  ];

  const namen = huidig?.alle_namen || huidig?.spelers || huidig?.namen || [];

  return (
    <div className="fade">

        <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>Nationale selecties — {geslacht}</div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,padding:"12px 24px",borderBottom:"1px solid var(--border)"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}

                    <div key={i} className="sk"

            ):<div className="empty">Geen spelers in deze selectie.</div>}

        )}
      </div>
    </div>
  );
}

function InvoerPagina() {
  const {useState} = React;
  const [popup, setPopup] = useState(null);
  const [bestanden, setBestanden] = useState([]);
  const [tekst, setTekst] = useState("");
  const [status, setStatus] = useState("idle");

  const openPopup = (type) => { setPopup(type); setBestanden([]); setTekst(""); setStatus("idle"); };
  const sluitPopup = () => setPopup(null);

  const stuurNaarDrive = async () => {
    setStatus("busy");
    try {
      // Lees eerst alle geselecteerde bestanden in
      const bestandenData = await Promise.all(bestanden.map(bestand => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(bestand);
          reader.onload = () => resolve({
            naam: bestand.name,
            type: bestand.type,
            base64: reader.result.split(',')[1]
          });
          reader.onerror = reject;
        });
      }));

      // Bouw 1 pakket met alles erin
      const payload = {
        map: popup,
        tekst: tekst,
        bestanden: bestandenData
      };

   // Stuur alles in één keer
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
      });

      setStatus("done");
      setTimeout(sluitPopup, 2000);
    } catch(e) {
      setStatus("error");
    }
  };

  const opties = [
    { id: "Matchstatistieken", label: "Wedstrijden", icon: "🏑" },
    { id: "Topscorers", label: "Topscorers", icon: "🏆" },
    { id: "Hockeynieuws", label: "Nieuws", icon: "📰" },
    { id: "Oranje", label: "Oranje", icon: "🦁" },
    { id: "Actuele_Stand", label: "Actuele Stand", icon: "📊" }
  ];

  return (
    <div className="fade" style={{maxWidth: 800, margin: "0 auto", padding: "40px 24px"}}>
      <div style={{fontSize: 22, fontWeight: 700, marginBottom: 8}}>Data Invoer</div>
      <div style={{fontSize: 14, color: "var(--muted)", marginBottom: 30}}>Selecteer een categorie om bestanden of links direct naar de Drive mappen te sturen.</div>
      
      <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 16}}>
        {opties.map(o => (
          <button key={o.id} onClick={() => openPopup(o.id)} style={{
            background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: 12, padding: "30px 20px",
            fontSize: 15, fontWeight: 600, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 12, transition: "0.2s"
          }} onMouseEnter={e => e.currentTarget.style.borderColor = "var(--accent)"} onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}>
            <span style={{fontSize: 32}}>{o.icon}</span>{o.label}
          </button>
        ))}
      </div>

      {popup && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.6)", display: "flex", justifyContent: "center", alignItems: "center", zIndex: 1000 }}>
          <div className="fade" style={{background: "var(--surface)", padding: 30, borderRadius: 12, width: "100%", maxWidth: 500, boxShadow: "0 10px 40px rgba(0,0,0,0.2)"}}>
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20}}>
              <div style={{fontSize: 18, fontWeight: 700}}>Invoer: {opties.find(o => o.id === popup).label}</div>
              <button onClick={sluitPopup} style={{background: "none", border: "none", fontSize: 24, cursor: "pointer", color: "var(--muted)", lineHeight: 1}}>×</button>
            </div>
            <div style={{marginBottom: 20}}>
              <label style={{display: "block", marginBottom: 8, fontWeight: 600, fontSize: 13}}>Bestanden (Meerdere mogelijk)</label>
              <input type="file" multiple onChange={e => setBestanden(Array.from(e.target.files))} style={{width: "100%", padding: "10px", border: "1px solid var(--border)", borderRadius: 6, fontSize: 13}} />
              {bestanden.length > 0 && (
                <ul style={{fontSize: 12, marginTop: 10, color: "var(--text)", listStyle: "none", padding: 0}}>
                  {bestanden.map((b, i) => <li key={i} style={{marginBottom: 4}}>📄 {b.name}</li>)}
                </ul>
              )}
            </div>
            <div style={{marginBottom: 24}}>
              <label style={{display: "block", marginBottom: 8, fontWeight: 600, fontSize: 13}}>Tekst of URL</label>
              <textarea rows="4" value={tekst} onChange={e => setTekst(e.target.value)} style={{width: "100%", padding: "12px", border: "1px solid var(--border)", borderRadius: 6, fontFamily: "inherit", fontSize: 13, resize: "vertical"}} placeholder="Plak hier een URL of ruwe tekst..."></textarea>
            </div>
            <div style={{display: "flex", justifyContent: "flex-end", gap: 10}}>
              <button onClick={sluitPopup} style={{padding: "10px 16px", background: "var(--surface2)", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 600, color: "var(--text)"}}>Annuleren</button>
              <button onClick={stuurNaarDrive} disabled={status === "busy" || (bestanden.length === 0 && !tekst.trim())} style={{padding: "10px 16px", background: "var(--accent)", color: "white", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 600, opacity: (status === "busy" || (bestanden.length === 0 && !tekst.trim())) ? 0.5 : 1}}>
                {status === "busy" ? "Verzenden..." : "Verzenden"}
              </button>
            </div>
            {status === "done" && <div style={{marginTop: 15, padding: 10, background: "var(--green-light)", color: "var(--green)", fontWeight: 600, fontSize: 13, borderRadius: 6}}>✓ Succesvol verstuurd.</div>}

          </div>
        </div>
      )}
    </div>
  );
}

function Dashboard({geslacht,nav,stand,programma,nieuws,loading}) {
  if(loading) return <div className="loading">Data laden…</div>;
  const [clubFilter, setClubFilter] = React.useState(null);
  const bijgewerkt = stand[0]?._bw||"";
  const komend = programma.filter(isKomend);

  // Gefilterde wedstrijden op basis van clubFilter
  const gefilterdWedstrijden = useMemo(()=>{
    if(!clubFilter?.club || !clubFilter?.type) return null;
    const {club, type} = clubFilter;
    const clubSchoon = club.replace(/\s+[HhDd]\d+$/,"").trim();
    return programma.filter(w=>{
      if(!isGespeeld(w)) return false;
      const st = w.score_thuis??w.doelpunten_thuis??null;
      const su = w.score_uit??w.doelpunten_uit??null;
      if(st===null||su===null) return false;
      const isThuis = (w.thuis||"").toLowerCase().includes(clubSchoon.toLowerCase());
      const isUit   = (w.uit||"").toLowerCase().includes(clubSchoon.toLowerCase());
      if(!isThuis && !isUit) return false;
      const th = parseInt(st), tu = parseInt(su);
      if(type==="G")  return isThuis ? th>tu : tu>th;
      if(type==="Gk") return th===tu;
      if(type==="V")  return isThuis ? th<tu : tu<th;
      return false;
    }).sort((a,b)=>(parseDatum(b.datum)||new Date(0))-(parseDatum(a.datum)||new Date(0)));
  },[clubFilter, programma]);

  const gespeeldGroepen = useMemo(() => {
    const gespeeldLijst = programma.filter(isGespeeld);
    const groepen = {};
    gespeeldLijst.forEach(w => {
      const key = w.datum || "onbekend";
      if (!groepen[key]) groepen[key] = [];
      groepen[key].push(w);
    });
    return Object.entries(groepen)
      .map(([datum, wedstrijden]) => ({datum, wedstrijden}))
      .sort((a,b) => (parseDatum(b.datum)||new Date(0)) - (parseDatum(a.datum)||new Date(0)));
  }, [programma]);

  return (
    <div className="fade">
      <div className="main-grid">
        <div className="col-l">
          <div className="sec">
            <div className="sec-hdr" style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                <div className="sec-title">Stand</div>
                {bijgewerkt&&<div className="sec-sub">Bijgewerkt {bijgewerkt}</div>}
              </div>
              <button onClick={()=>nav("topscorers")} style={{background:"none",border:"none",color:"var(--accent)",fontWeight:600,fontSize:13,cursor:"pointer",padding:0}}>Topscorers ›</button>
            </div>
            {stand.length>0?(
              <>
                <table className="stand-tbl">
                  <thead><tr>
                    <th>#</th><th className="cl">Club</th><th title="Wedstrijden gespeeld">W</th><th title="Punten">Pnt</th>
                    {["G","Gk","V"].map(type => (
                      <th key={type} title={type==="G"?"Gewonnen":type==="Gk"?"Gelijk":"Verloren"}
                        style={{cursor:"pointer",userSelect:"none"}}
                        onClick={()=>setClubFilter(f=>f?.type===type&&!f.club?null:{type,club:null})}>
                        {type}{clubFilter?.type===type&&!clubFilter.club?" ▾":""}
                      </th>
                    ))}
                    <th title="Doelpunten voor">DV</th><th title="Doelpunten tegen">DT</th><th title="Doelsaldo">Dsl</th>
                  </tr></thead>
                  <tbody>
                    {stand.map(r=>{
                      const dv = r.doelpunten_voor??r.dv??0;
                      const dt = r.doelpunten_tegen??r.dt??0;
                      const dsl = r.doelsaldo??r["+/−"]??(dv-dt);
                      const dslNum = typeof dsl==="string"?parseInt(dsl)||0:dsl;
                      const pos = r.positie;
                      // Zone altijd op basis van positie, niet op data
                      const zone = pos<=4?"playoff":pos>=10&&pos<=11?"playout":pos>=12?"degradatie":"";
                      const zClass = zone==="playoff"?"zpo":zone==="playout"?"zpl":zone==="degradatie"?"zde":"";
                      return (
                        <tr key={r.club} className={zClass}>
                          <td><PosBadge n={r.positie} zone={zone}/></td>
                          <td className="cl">
                            <button onClick={()=>nav("club",r.club)} style={{background:"none",border:"none",color:"var(--text)",fontWeight:500,fontSize:13,cursor:"pointer",padding:0,textAlign:"left",textDecoration:"underline",textDecorationColor:"var(--border)",textUnderlineOffset:3}}>{stripTeam(r.club)}</button>
                          </td>
                          <td>{r.gespeeld}</td><td className="pnt">{r.punten??r.ptn??0}</td>
                          {[["G",r.gewonnen],["Gk",r.gelijk],["V",r.verloren]].map(([type,val])=>(
                            <td key={type}
                              style={{cursor:"pointer",color:clubFilter?.club===r.club&&clubFilter?.type===type?"var(--accent)":"inherit",fontWeight:clubFilter?.club===r.club&&clubFilter?.type===type?700:"inherit"}}

                              {val}
                            </td>
                          ))}
                          <td>{dv||"–"}</td><td>{dt||"–"}</td><td className={dslNum>0?"dp":dslNum<0?"dn":""}>{dslNum>0?`+${dslNum}`:dslNum}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <div className="legend">
                  <div className="li"><div className="ld" style={{background:"#4ade80"}}/> 1-4 Play-offs</div>
                  <div className="li"><div className="ld" style={{background:"#facc15"}}/> 10-11 Play-outs</div>
                  <div className="li"><div className="ld" style={{background:"#f87171"}}/> 12 Degradatie</div>
                </div>
              </>
            ):<div className="empty">Geen standdata beschikbaar.</div>}
            {/* Gefilterd wedstrijdenpaneel */}
            {clubFilter?.club&&gefilterdWedstrijden&&(
              <div style={{marginTop:16,borderTop:"2px solid var(--accent-light)",paddingTop:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:700}}>
                    {clubFilter.club.replace(/\s+[HhDd]\d+$/,"").trim()} — {clubFilter.type==="G"?"Gewonnen":clubFilter.type==="Gk"?"Gelijk gespeeld":"Verloren"}
                    <span style={{fontSize:12,fontWeight:400,color:"var(--muted)",marginLeft:8}}>({gefilterdWedstrijden.length} wedstrijden)</span>
                  </div>
                  <button onClick={()=>setClubFilter(null)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                </div>
                {gefilterdWedstrijden.length>0?(
                  <div className="wl">
                    {gefilterdWedstrijden.map((w,i)=>(
                      <div className="wr" key={i} onClick={()=>nav("wedstrijd",w)}>
                        <span className="wd">{formatDatum(w.datum)}</span>
                        <div className="wh" style={{fontWeight:(w.thuis||"").includes(clubFilter.club)?700:400}}><ClubKnop naam={w.thuis} nav={nav}/></div>
                        <div className="ws">{w.score_thuis??w.doelpunten_thuis??""} – {w.score_uit??w.doelpunten_uit??""}</div>
                        <div className="wu" style={{fontWeight:(w.uit||"").includes(clubFilter.club)?700:400}}><ClubKnop naam={w.uit} nav={nav}/></div>
                        <span className="wa">›</span>
                      </div>
                    ))}
                  </div>
                ):<div className="empty">Geen wedstrijden gevonden.</div>}
              </div>
            )}
          </div>
          <div className="twee-col">
            <div className="tc-links">
              <div className="sec">
                <div className="sec-hdr"><div className="sec-title">Uitslagen</div></div>
                {gespeeldGroepen.length>0?(
                  <div>
                    {gespeeldGroepen.map((groep,gi)=>(
                      <div key={gi} style={{marginBottom:16}}>
                        <div style={{fontSize:11,fontWeight:600,color:"var(--muted)",letterSpacing:".5px",textTransform:"uppercase",padding:"0 0 8px",fontFamily:"'JetBrains Mono',monospace"}}>{formatDatum(groep.datum)}</div>
                        <div className="wl">
                          {groep.wedstrijden.map((w,i)=>(
                            <div className="wr" key={i} onClick={()=>nav("wedstrijd",w)}>

                              <div className="wu"><ClubKnop naam={w.uit} nav={nav}/></div>
                              <span className="wa">›</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                ):<div className="empty">Geen uitslagen beschikbaar.</div>}
              </div>
            </div>
            <div className="tc-rechts">
              <div className="sec">
                <div className="sec-hdr"><div className="sec-title">Programma</div><div className="sec-sub">Komend</div></div>
                {komend.length>0?(()=>{
                  const groepen={};
                  komend.forEach(w=>{ const k=w.datum||"onbekend"; if(!groepen[k]) groepen[k]=[]; groepen[k].push(w); });
                  const gesorteerd=Object.entries(groepen).sort((a,b)=>(parseDatum(a[0])||new Date(9999,0)) - (parseDatum(b[0])||new Date(9999,0)));
                  return (
                    <div>
                      {gesorteerd.map(([datum,wedstrijden],gi)=>(
                        <div key={gi} style={{marginBottom:16}}>

                          <div className="wl">
                            {wedstrijden.map((w,i)=>(

function ClubPagina({club, geslacht, spelers, nieuws, programma, nav, oranje}) {
  const [clubTeamNieuws, setClubTeamNieuws] = useState([]);
  const [nieuwsPagina, setNieuwsPagina] = useState(0);
  const [coach, setCoach] = useState(null);
  const ITEMS_PER_PAGE = 5;

  const oranjeCheck = (naam) => {
    if (!oranje) return null;
    if (oranje.senior && oranje.senior.includes(naam)) return "🦁 Oranje";
    if (oranje.jong && oranje.jong.includes(naam)) return "🦁 Jong Oranje";
    if (oranje.u18 && oranje.u18.includes(naam)) return "U18";
    if (oranje.u16 && oranje.u16.includes(naam)) return "U16";
    return null;
  };
  const clubSpelers = spelers.filter(s => s.club === club).sort((a,b) => parseInt(a.rugnummer||99) - parseInt(b.rugnummer||99));

  useEffect(()=>{
    setNieuwsPagina(0);
    fetch("nieuws/teamnieuws.json")
      .then(r=>r.json())
      .then(d=>{ setClubTeamNieuws(d[club] || []); })
      .catch(()=>{ setClubTeamNieuws([]); });
  }, [club]);

  useEffect(()=>{
    fetch(`competities/${geslacht}/coaches.json`)
      .then(r=>r.json())
      .then(d=>{
        const coaches = d.coaches || [];
        // Huidige coach = tot===null of geen tot veld, voor deze club
        const huidig = coaches.filter(c =>
          c.club === club && (c.tot === null || c.tot === undefined || c.tot === "")
        );
        setCoach(huidig.length > 0 ? huidig[huidig.length - 1] : null);
      })
      .catch(()=>setCoach(null));
  }, [club, geslacht]);

  const clubWedstrijden = programma.filter(w => (w.thuis||"").includes(club) || (w.uit||"").includes(club));
  const gespeeld = clubWedstrijden.filter(w => w.gespeeld===true || w.score_thuis!=null).sort((a,b) => new Date(b.datum||0) - new Date(a.datum||0));
  const komend = clubWedstrijden.filter(w => w.gespeeld!==true && w.score_thuis==null).sort((a,b) => new Date(a.datum||0) - new Date(b.datum||0));

  const totaalPaginas = Math.ceil(clubTeamNieuws.length / ITEMS_PER_PAGE);
  const paginaItems = clubTeamNieuws.slice(nieuwsPagina * ITEMS_PER_PAGE, (nieuwsPagina + 1) * ITEMS_PER_PAGE);
  const btnStyle = (disabled) => ({background:"none",border:"1px solid var(--border)",borderRadius:5,padding:"3px 10px",fontSize:11,fontWeight:600,color:disabled?"var(--border)":"var(--accent)",cursor:disabled?"default":"pointer",fontFamily:"inherit"});

  return (
    <div className="fade">
      <div style={{padding:"20px 24px 16px",borderBottom:"1px solid var(--border)",background:"linear-gradient(to bottom,var(--surface2),var(--surface))"}}>
        <div style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{geslacht==="heren"?"Tulp Hoofdklasse Heren":"Tulp Hoofdklasse Dames"}</div>
        <div style={{display:"flex",alignItems:"baseline",gap:16}}>
          <div style={{fontSize:28,fontWeight:700,letterSpacing:"-.5px"}}>{club}</div>
          <button onClick={()=>nav("club_historie",{club,geslacht})} style={{background:"none",border:"none",padding:0,color:"var(--accent)",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Historie ›</button>
        </div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:4,display:"flex",gap:12,flexWrap:"wrap"}}>
          <span>{clubSpelers.length} spelers · seizoen 2025-2026</span>
          {coach&&<span>🎽 Coach: <span style={{color:"var(--text)",fontWeight:600}}>{coach.naam}</span>{coach.sinds?` (vanaf ${coach.sinds})`:""}</span>}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",minHeight:"60vh"}}>
        <div style={{borderRight:"1px solid var(--border)",padding:"20px 24px"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Selectie</div>
          <table style={{width:"100%",borderCollapse:"collapse",marginBottom:20}}>

                  <td style={{textAlign:"right",color:"var(--accent)",fontWeight:700,padding:"6px 8px"}}>{s.doelpunten_seizoen>0?s.doelpunten_seizoen:""}</td>

            <div style={{fontSize:13,fontWeight:700}}>Nieuws</div>

                <button style={btnStyle(nieuwsPagina===0)} disabled={nieuwsPagina===0} onClick={()=>setNieuwsPagina(p=>p-1)}>← Nieuwer</button>
                <span style={{fontSize:11,color:"var(--muted)"}}>{nieuwsPagina+1}/{totaalPaginas}</span>
                <button style={btnStyle(nieuwsPagina>=totaalPaginas-1)} disabled={nieuwsPagina>=totaalPaginas-1} onClick={()=>setNieuwsPagina(p=>p+1)}>Ouder →</button>
              </div>
            )}
          </div>
          {paginaItems.length > 0 ? paginaItems.map((item,i) => (
            <div key={i} style={{padding:"12px 18px",borderBottom:"1px solid var(--border)"}}>
              <div style={{fontSize:10,color:"var(--muted)",marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}>{formatNieuwsDatum(item.datum)}</div>
              {item.titel && item.link ? (
                <a href={item.link} target="_blank" rel="noopener noreferrer"
                  style={{fontSize:12,fontWeight:600,marginBottom:6,display:"block",color:"var(--accent)",textDecoration:"none"}}
                  onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"}
                  onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>

                <ul style={{paddingLeft:14,margin:0}}>

                  ))}

              )}

          )) : <div style={{padding:"20px 18px",color:"var(--muted)",fontSize:12,fontStyle:"italic"}}>Geen nieuws beschikbaar.</div>}
          {totaalPaginas > 1 && (
            <div style={{padding:"10px 18px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"auto"}}>

              <button style={btnStyle(nieuwsPagina>=totaalPaginas-1)} disabled={nieuwsPagina>=totaalPaginas-1} onClick={()=>setNieuwsPagina(p=>p+1)}>Ouder →</button>
            </div>
