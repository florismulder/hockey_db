<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hockey DB — Tulp Hoofdklasse</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const { useState, useEffect, useMemo } = React;

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYsMM_O-w8X0HsjZhDrB8OmnGwIep9yrlBFRXBqo6Y5uYpCakDtZw0CL4DdcrbIXgx/exec";

const MAANDEN = {
  january:0,february:1,march:2,april:3,may:4,june:5,
  july:6,august:7,september:8,october:9,november:10,december:11,
  jan:0,feb:1,mar:2,apr:3,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,
  mrt:2,mei:4,okt:9
};

function parseDatum(str) {
  if (!str) return null;
  const s = str.toLowerCase().trim();
  const m1 = s.match(/^(\w+)\s+(\d{1,2})$/);
  if (m1) { const mnd=MAANDEN[m1[1]]; if(mnd!==undefined) return new Date(new Date().getFullYear(),mnd,parseInt(m1[2])); }
  const m2 = s.match(/^(\d{1,2})\s+(\w+)$/);
  if (m2) { const mnd=MAANDEN[m2[2]]; if(mnd!==undefined) return new Date(new Date().getFullYear(),mnd,parseInt(m2[1])); }
  const m3 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m3) return new Date(parseInt(m3[1]),parseInt(m3[2])-1,parseInt(m3[3]));
  return null;
}

function formatDatum(str) {
  if (!str) return "";
  const d = parseDatum(str);
  if (!d) return str;
  return d.toLocaleDateString("nl-NL",{day:"numeric",month:"short"});
}

function stripTeam(naam) {
  if (!naam) return "";
  return naam.replace(/\s+[HhDd]\d+$/,"").trim();
}

const VANDAAG = new Date(); VANDAAG.setHours(0,0,0,0);
const isKomend = w => { if(w.gespeeld===true) return false; if(w.gespeeld===false) return true; const d=parseDatum(w.datum||""); return !d||d>=VANDAAG; };
const isGespeeld = w => !isKomend(w);

const CSS = `
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f8f5;--surface:#ffffff;--surface2:#f1f0ed;--border:#e5e3de;--border2:#d0cdc6;
  --text:#1a1916;--muted:#7a7672;--accent:#c4621a;--accent-light:#fdf0e8;
  --green:#1a6b3a;--green-light:#e8f5ed;--red:#c0392b;--orange:#c4621a;--orange-light:#fdf0e8;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;
  justify-content:center;
}
#root{
  width:100%;
  max-width:1100px; /* Gecentreerde container */
  background:var(--surface);
  min-height:100vh;
  box-shadow:0 0 40px rgba(0,0,0,0.05);
}
.hdr{
  position:sticky;
  top:0;
  z-index:200;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.logo{font-size:16px;font-weight:700;color:var(--accent);background:none;border:none;cursor:pointer}
.nav{display:flex;gap:2px}
.nb{padding:6px 14px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;border-radius:6px;transition:all .15s}
.nb.on{background:var(--accent-light);color:var(--accent);font-weight:600}
.gt{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.gb{padding:6px 16px;background:none;border:none;color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase}
.gb.on{background:var(--accent);color:white}
.main-grid{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 56px)}
.col-l{border-right:1px solid var(--border);background:var(--surface)}
.col-r{background:var(--surface)}
.sec{padding:20px 24px}
.stand-tbl{width:100%;border-collapse:collapse}
.stand-tbl td{padding:9px 8px;border-top:1px solid var(--border);font-size:13px}
.wr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:4px}
.upload-box{border:2px dashed var(--border);padding:20px;text-align:center;border-radius:8px;margin-bottom:20px}
.btn-up{background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:6px;font-weight:600;cursor:pointer}
`;

function PosBadge({n, zone}) {
  const z = zone || (n<=4?"playoff":n<=9?"":n<=11?"playout":"degradatie");
  const style = z==="playoff" ? {background:"#166534",color:"#ffffff"} : z==="playout" ? {background:"#facc15",color:"#1a1a1a"} : z==="degradatie" ? {background:"#991b1b",color:"#ffffff"} : {background:"var(--surface2)",color:"var(--muted)"};
  return <span style={{...style, display:"inline-flex", width:22, height:22, borderRadius:5, fontSize:12, fontWeight:700, alignItems:"center", justifyContent:"center"}}>{n}</span>;
}

function Vlag({code}) {
  if (!code || code.toLowerCase() === 'nl') return null;
  const emoji = code.toUpperCase().replace(/./g, char => String.fromCodePoint(char.charCodeAt(0) + 127397));
  return <span style={{marginRight:6}}>{emoji}</span>;
}

function Dashboard({geslacht,nav,stand,programma,nieuws,loading}) {
  if(loading) return <div style={{padding:40, textAlign:"center"}}>Data laden…</div>;
  const komend = programma.filter(isKomend);
  return (
    <div className="main-grid">
      <div className="col-l">
        <div className="sec">
          <div style={{fontSize:15, fontWeight:700, marginBottom:14}}>Stand</div>
          <table className="stand-tbl">
            <tbody>
              {stand.map(r => (
                <tr key={r.club}>
                  <td><PosBadge n={r.positie} zone={r.zone}/></td>
                  <td onClick={()=>nav("club",r.club)} style={{cursor:"pointer", fontWeight:500}}>{r.club}</td>
                  <td style={{textAlign:"right", fontWeight:700, color:"var(--accent)"}}>{r.punten??r.ptn}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      <div className="col-r">
        <div style={{padding:"14px 18px", borderBottom:"1px solid var(--border)", fontWeight:700}}>Programma</div>
        <div style={{padding:12}}>
          {komend.slice(0,10).map((w,i) => (
            <div className="wr" key={i} onClick={()=>nav("wedstrijd",w)}>
              <div style={{fontSize:11, color:"var(--muted)", width:40}}>{formatDatum(w.datum)}</div>
              <div style={{fontSize:13, flex:1}}>{stripTeam(w.thuis)} - {stripTeam(w.uit)}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SpelersOverzicht({spelers, nav}) {
  const [zoek, setZoek] = useState("");
  const gefilterd = spelers.filter(s => s.naam.toLowerCase().includes(zoek.toLowerCase()));
  return (
    <div className="sec">
      <input 
        style={{width:"100%", padding:10, borderRadius:8, border:"1px solid var(--border)", marginBottom:20}}
        placeholder="Zoek speler..." 
        value={zoek} 
        onChange={e=>setZoek(e.target.value)} 
      />
      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))", gap:10}}>
        {gefilterd.map((s,i) => (
          <div key={i} className="wr" onClick={()=>nav("speler",s)}>
            <div style={{fontWeight:600}}><Vlag code={s.land_code}/>{s.naam}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function InvoerPagina() {
  const [upStatus, setUpStatus] = useState("idle");

  const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUpStatus("busy");
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ name: file.name, type: file.type, base64: base64 })
        });
        const out = await res.json();
        setUpStatus(out.status === 'success' ? "done" : "error");
      } catch (err) { setUpStatus("error"); }
    };
  };

  return (
    <div className="sec" style={{maxWidth:600, margin:"0 auto"}}>
      <div style={{fontSize:18, fontWeight:700, marginBottom:10}}>Matchstatistieken Invoer</div>
      <div className="upload-box">
        {upStatus === "idle" && (
          <>
            <input type="file" id="pdf-up" onChange={handleUpload} style={{display:"none"}} accept="application/pdf,image/*" />
            <label htmlFor="pdf-up" className="btn-up">Upload PDF / Screenshot</label>
            <div style={{fontSize:11, marginTop:10, color:"var(--muted)"}}>Bestand gaat direct naar de map "Matchstatistieken"</div>
          </>
        )}
        {upStatus === "busy" && <div>Bezig met uploaden...</div>}
        {upStatus === "done" && <div style={{color:"green"}}>✓ Opgeslagen in Drive. Gemini verwerkt de data.</div>}
        {upStatus === "error" && <div style={{color:"red"}}>Fout bij upload.</div>}
      </div>
      <p style={{fontSize:13, color:"var(--muted)"}}>Gebruik dit dashboard om PDF's of screenshots van wedstrijdformulieren direct in de wachtrij van je Google Sheet te plaatsen.</p>
    </div>
  );
}

// SpelerDetail, WedstrijdDetail en ClubPagina behouden hun uitgebreide logica...
function SpelerDetail({speler}) {
  return (
    <div className="sec">
      <div style={{fontSize:24, fontWeight:700}}><Vlag code={speler.land_code}/>{speler.naam}</div>
      <div style={{color:"var(--accent)", fontWeight:600}}>{speler.club} — #{speler.rugnummer}</div>
      {/* Hier kunnen we later de volledige stats weer toevoegen */}
    </div>
  );
}

function App() {
  const [geslacht,setGeslacht]=useState("heren");
  const [page,setPage]=useState("dashboard");
  const [pageId,setPageId]=useState(null);
  const [stand,setStand]=useState([]);
  const [programma,setProgramma]=useState([]);
  const [spelers,setSpelers]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    setLoading(true);
    Promise.all([
      fetch(`competities/${geslacht}/standen.json`).then(r=>r.json()).catch(()=>null),
      fetch(`competities/${geslacht}/programma.json`).then(r=>r.json()).catch(()=>null),
      fetch("spelers/index.json").then(r=>r.json()).catch(()=>null)
    ]).then(([sd,pd,sp])=>{
      setStand(sd?.stand||[]);
      setProgramma(pd?.wedstrijden||[]);
      setSpelers((sp?.spelers||[]).filter(s=>s.geslacht===geslacht));
      setLoading(false);
    });
  },[geslacht]);

  const nav=(p,id=null)=>{setPage(p);setPageId(id);window.scrollTo(0,0);};

  return (
    <>
      <style>{CSS}</style>
      <header className="hdr">
        <button className="logo" onClick={()=>nav("dashboard")}>🏑 Hockey DB</button>
        <nav className="nav">
          <button className={`nb ${page==='dashboard'?'on':''}`} onClick={()=>nav("dashboard")}>Stand</button>
          <button className={`nb ${page==='spelers'?'on':''}`} onClick={()=>nav("spelers")}>Spelers</button>
          <button className={`nb ${page==='invoer'?'on':''}`} onClick={()=>nav("invoer")}>+ Invoer</button>
        </nav>
        <div className="gt">
          <button className={`gb ${geslacht==='heren'?'on':''}`} onClick={()=>setGeslacht("heren")}>H</button>
          <button className={`gb ${geslacht==='dames'?'on':''}`} onClick={()=>setGeslacht("dames")}>D</button>
        </div>
      </header>
      {page==="dashboard"&&<Dashboard geslacht={geslacht} nav={nav} stand={stand} programma={programma} loading={loading}/>}
      {page==="spelers"&&<SpelersOverzicht spelers={spelers} nav={nav}/>}
      {page==="invoer"&&<InvoerPagina />}
      {page==="speler"&&<SpelerDetail speler={pageId}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
