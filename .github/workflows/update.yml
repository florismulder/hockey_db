name: Hockey DB updater

on:
  schedule:
    - cron: '0 7 * * *'    # Elke dag 07:00 UTC — nieuws ophalen
    - cron: '0 8 * * 1'    # Maandag 08:00 UTC — volledige update
    - cron: '0 8 * * 5'    # Vrijdag 08:00 UTC — stand check
    - cron: '0 6 * * 0'    # Zondag 06:00 UTC — stand check
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Volledige update (maandag/vrijdag/zondag of handmatig)
        if: >
          github.event.schedule == '0 8 * * 1' ||
          github.event.schedule == '0 8 * * 5' ||
          github.event.schedule == '0 6 * * 0' ||
          github.event_name == 'workflow_dispatch'
        run: python scripts/update_db.py || true

      - name: Alleen nieuws (dagelijks)
        if: github.event.schedule == '0 7 * * *'
        run: python scripts/update_db.py --rss || true

      - name: Wijzigingen committen en pushen
        run: |
          git config user.name "hockey-bot"
          git config user.email "bot@users.noreply.github.com"
          git add competities/ nieuws/ spelers/
          if git diff --staged --quiet; then
            echo "Geen wijzigingen"
          else
            git commit -m "data: update $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main
          fi
