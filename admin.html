        onClick={()=>setPagina("club_"+key)}
        onMouseEnter={e=>e.currentTarget.style.transform="translateY(-1px)"}
        onMouseLeave={e=>e.currentTarget.style.transform=""}>
        <div className="card-body">
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{club}</div>
          {info.opgericht && <div style={{fontSize:11,color:"var(--muted)"}}>Opgericht: {info.opgericht}</div>}
          {info.stadion   && <div style={{fontSize:11,color:"var(--muted)"}}>{info.stadion}</div>}
          {!info.opgericht && !info.stadion &&
            <div style={{fontSize:11,color:"var(--border2)",fontStyle:"italic"}}>Nog geen info ingevoerd</div>}
        </div>
      </div>
    );
  };

  return (
    <div className="fade">
      <div className="topbar">
        <div><div className="topbar-title">Clubs</div></div>
      </div>
      <div className="content">
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Heren — Tulp Hoofdklasse</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10,marginBottom:24}}>
          {herenClubs.map(c=><ClubKaart key={c} club={c}/>)}
        </div>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Dames — Tulp Hoofdklasse</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
          {damesClubs.map(c=><ClubKaart key={c} club={c}/>)}
        </div>
      </div>
    </div>
  );
}

// ── Club detail ───────────────────────────────────────────────
function ClubDetail({clubKey, data, toast, onRefresh, setPagina}) {
  const clubsInfo   = data.clubsInfo || {};
  const [velden, setVelden] = useState({});
  const [busy, setBusy] = useState(false);

  const clubNaam = useMemo(() => {
    const info = clubsInfo[clubKey];
    if (info?.club) return info.club;
    // Reconstrueer naam uit key
    return clubKey.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());
  }, [clubKey, clubsInfo]);

  useEffect(() => {
    setVelden({...(clubsInfo[clubKey]||{club:clubNaam})});
  }, [clubKey, clubsInfo]);

  const set = (k,v) => setVelden(f=>({...f,[k]:v}));

  const opslaan = async () => {
    setBusy(true);
    try {
      const res = await apiCall("updateClubInfo", {clubKey: clubKey||slugify(clubNaam), velden});
      if (!res.ok && !res.success) throw new Error(res.fout||res.error||"Onbekende fout");
      toast("✅ Clubinfo opgeslagen");
      onRefresh();
    } catch(e) { toast(e.message,"error"); }
    finally { setBusy(false); }
  };

  // Successen als gestructureerd object
  const successen = velden.successen || {};
  const setSucces = (trofee, jaren) =>
    setVelden(f=>({...f, successen:{...(f.successen||{}), [trofee]:jaren}}));
  const verwijderSucces = (trofee) => {
    const {[trofee]:_, ...rest} = velden.successen||{};
    setVelden(f=>({...f, successen:rest}));
  };
  const [nieuweTrofee, setNieuweTrofee] = useState("");

  return (
    <div className="fade">
      <div className="topbar">
        <div>
          <div className="breadcrumb">
            <a onClick={()=>setPagina("clubs")}>Clubs</a>
            <span>/</span>
            <span>{clubNaam}</span>
          </div>
        </div>
        <div className="topbar-actions">
          <button className="btn btn-secondary btn-sm" style={{marginRight:4}}
            onClick={()=>toast("📄 Upload de Wikipedia PDF naar de map 'ClubInfo' in Google Drive, dan verwerkt het systeem hem automatisch.","info")}>
            📄 Via Drive (ClubInfo map)
          </button>
          <button className="btn btn-primary btn-sm" onClick={opslaan} disabled={busy}>
            {busy?<span className="spinner"/>:null} Opslaan
          </button>
        </div>
      </div>
      <div className="content">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>
          <div className="card">
            <div className="card-header"><div className="card-title">Basisinfo</div></div>
            <div className="card-body">
              <div className="form-group">
                <label className="form-label">Clubnaam</label>
                <input className="form-input" value={velden.club||clubNaam}
                  onChange={e=>set("club",e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">Opgericht</label>
                <input className="form-input" placeholder="bijv. 1908"
                  value={velden.opgericht||""} onChange={e=>set("opgericht",e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">Stadion / accommodatie</label>
                <input className="form-input" placeholder="bijv. Wagener Stadion"
                  value={velden.stadion||""} onChange={e=>set("stadion",e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">Website</label>
                <input className="form-input" placeholder="https://…"
                  value={velden.website||""} onChange={e=>set("website",e.target.value)}/>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-header"><div className="card-title">🏆 Historische successen</div></div>
            <div className="card-body">
              <div className="form-hint" style={{marginBottom:12}}>
                Per trofee een kommalijst van jaren, bijv. "1987, 1992, 2003"
              </div>
              {Object.entries(successen).map(([trofee,jaren])=>(
                <div key={trofee} className="form-group" style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                  <div style={{flex:"0 0 140px"}}>
                    <label className="form-label">{trofee}</label>
                    <input className="form-input" value={jaren||""}
                      onChange={e=>setSucces(trofee,e.target.value)}
                      placeholder="1987, 1992, 2003"/>
                  </div>
                  <button className="btn btn-danger btn-sm" style={{marginBottom:1}}
                    onClick={()=>verwijderSucces(trofee)}>✕</button>
                </div>
              ))}
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <input className="filter-input" placeholder="Nieuwe trofee (bijv. Kampioen, EHL, Beker)"
                  value={nieuweTrofee} onChange={e=>setNieuweTrofee(e.target.value)}
                  style={{flex:1}} onKeyDown={e=>{
                    if(e.key==="Enter"&&nieuweTrofee.trim()){
                      setSucces(nieuweTrofee.trim(),"");
                      setNieuweTrofee("");
                    }
                  }}/>
                <button className="btn btn-secondary btn-sm" onClick={()=>{
                  if(nieuweTrofee.trim()){setSucces(nieuweTrofee.trim(),"");setNieuweTrofee("");}
                }}>+ Toevoegen</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Teamnieuws beheer ─────────────────────────────────────────
function TeamBulletRij({bullet, bi, verborgen, onToggle, onBewerk}) {
  const [editModus, setEditModus] = useState(false);
  const [editTekst, setEditTekst] = useState(bullet||"");
  return (
    <li style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:4}}>
      {editModus ? (
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:4}}>
          <textarea
            style={{width:"100%",padding:"5px 8px",border:"1px solid var(--accent)",borderRadius:5,
              fontSize:12,fontFamily:"inherit",resize:"vertical",background:"var(--accent-light)",outline:"none"}}
            rows={2} value={editTekst} autoFocus
            onChange={e=>setEditTekst(e.target.value)}/>
          <div style={{display:"flex",gap:4}}>
            <button className="btn btn-success btn-sm"
              onClick={()=>{onBewerk(editTekst);setEditModus(false);}}>✓</button>
            <button className="btn btn-secondary btn-sm"
              onClick={()=>{setEditModus(false);setEditTekst(bullet||"");}}>✗</button>
          </div>
        </div>
      ) : (
        <>
          <span style={{flex:1,fontSize:12,color:verborgen?"var(--muted)":"var(--text)",
            textDecoration:verborgen?"line-through":"none"}}>{bullet}</span>
          <button onClick={()=>{setEditModus(true);setEditTekst(bullet||"");}}
            style={{background:"none",border:"none",cursor:"pointer",fontSize:11,padding:0,flexShrink:0,opacity:.5}}>✏</button>
          <button onClick={onToggle}
            style={{background:"none",border:"none",cursor:"pointer",fontSize:12,padding:0,flexShrink:0,opacity:.6}}>
            {verborgen?"👁":"🙈"}
          </button>
        </>
      )}
    </li>
  );
}

function TeamNieuwsBeheer({data, toast, onRefresh}) {
  const CLUBS = ["Amsterdam","Bloemendaal","Den Bosch","HDM","HGC","Hurley","Kampong",
    "Klein Zwitserland","Laren","Oranje-Rood","Pinoké","Rotterdam","SCHC",
    "Schaerweijde","Tilburg"].sort();

  const [nieuwsData, setNieuwsData] = useState({});
  const [laden, setLaden] = useState(false);
  const [bezig, setBezig] = useState(false);
  const [zoek, setZoek] = useState("");
  const [filterBron, setFilterBron] = useState("alle");
  const [herschrijven, setHerschrijven] = useState(false);

  const herschrijfBullets = async () => {
    if (!confirm("Dit herschrijft alle bullets zonder expliciet subject via Gemini. Dit kan enkele minuten duren. Doorgaan?")) return;
    setHerschrijven(true);
    try {
      const club = filterBron !== "alle" ? filterBron : null;
      const actie = club ? "herschrijfBulletsClub" : "herschrijfAlleBullets";
      const params = club ? {club} : {};
      const res = await apiCall(actie, params);
      if (res.ok) {
        toast("✅ " + (res.aangepast||0) + " bullets herschreven — pagina herladen...");
        setTimeout(() => { setLaden(true); fetch("https://florismulder.github.io/hockey_db/nieuws/teamnieuws.json?t="+Date.now()).then(r=>r.json()).then(d=>{ setNieuwsData(d); setLaden(false); }); }, 2000);
      } else throw new Error(res.fout||"Fout");
    } catch(e) { toast("❌ "+e.message, "error"); }
    finally { setHerschrijven(false); }
  };

  const setBulkGeslacht = (bronClub, geslacht) => {
    setNieuwsData(huidig => {
      const nieuw = JSON.parse(JSON.stringify(huidig));
      const items = nieuw[bronClub]||[];
      items.forEach((item, idx) => {
        const sleutel = (item.titel||"")+("|")+(item.datum||"");
        propageerNaarAlleKopieen(nieuw, sleutel, {geslacht});
      });
      return nieuw;
    });
  };

  useEffect(() => {
    setLaden(true);
    fetch("https://florismulder.github.io/hockey_db/nieuws/teamnieuws.json?t="+Date.now())
      .then(r=>r.json()).then(d=>{ setNieuwsData(d); setLaden(false); })
      .catch(()=>setLaden(false));
  }, []);

  // Verzamel alle unieke berichten over alle clubs heen
  const alleItems = useMemo(() => {
    const map = new Map();
    Object.entries(nieuwsData).forEach(([club, items]) => {
      (items||[]).forEach(item => {
        const sleutel = (item.titel||"")+"|"+(item.datum||"");
        if (!map.has(sleutel)) {
          // Zorg dat bronclub altijd in clubs array staat
          const bestaandeClubs = item.clubs || [];
          const clubs_met_bron = bestaandeClubs.length > 0
            ? [...new Set([...bestaandeClubs])]
            : [club];
          map.set(sleutel, {...item, _bronClub: club, _sleutel: sleutel,
            clubs: clubs_met_bron});
        }
      });
    });
    return Array.from(map.values())
      .sort((a,b)=>(b.datum||"").localeCompare(a.datum||""));
  }, [nieuwsData]);

  const gefilterd = alleItems
    .filter(item => filterBron === "alle" || item._bronClub === filterBron)
    .filter(item => !zoek || (item.titel||"").toLowerCase().includes(zoek.toLowerCase()));

  // Helper: propageer veld naar ALLE kopieën van hetzelfde artikel (zelfde titel+datum)
  const propageerNaarAlleKopieen = (nieuw, sleutel, velden) => {
    Object.keys(nieuw).forEach(key => {
      const items = nieuw[key] || [];
      const idx = items.findIndex(item => (item.titel||"")+("|")+(item.datum||"") === sleutel);
      if (idx >= 0) items[idx] = {...items[idx], ...velden};
    });
  };

  const toggleClub = (sleutel, club, bronClub) => {
    setNieuwsData(huidig => {
      const nieuw = JSON.parse(JSON.stringify(huidig));
      const bronItems = nieuw[bronClub]||[];
      const itemIdx = bronItems.findIndex(item =>
        (item.titel||"")+("|")+(item.datum||"") === sleutel
      );
      if (itemIdx < 0) return huidig;
      const item = bronItems[itemIdx];
      const huidigeClubs = (item.clubs && item.clubs.length > 0) ? item.clubs : [bronClub];
      const nieuweClubs = huidigeClubs.includes(club)
        ? huidigeClubs.filter(c=>c!==club)
        : [...new Set([...huidigeClubs, club])];
      const definitiefClubs = nieuweClubs.length > 0 ? nieuweClubs : [bronClub];
      propageerNaarAlleKopieen(nieuw, sleutel, {clubs: definitiefClubs});
      return nieuw;
    });
  };

  const toggleVerborg = (sleutel, bronClub) => {
    setNieuwsData(huidig => {
      const nieuw = JSON.parse(JSON.stringify(huidig));
      const bronItems = nieuw[bronClub]||[];
      const itemIdx = bronItems.findIndex(item => (item.titel||"")+"|"+(item.datum||"") === sleutel);
      if (itemIdx < 0) return huidig;
      const nieuweWaarde = !bronItems[itemIdx].verborgen;
      propageerNaarAlleKopieen(nieuw, sleutel, {verborgen: nieuweWaarde});
      return nieuw;
    });
  };

  const toggleBullet = (sleutel, bronClub, bi) => {
    // Bullets zijn per bronclub uniek (verschillende Gemini extracties), NIET propageren
    setNieuwsData(huidig => {
      const nieuw = JSON.parse(JSON.stringify(huidig));
      const bronItems = nieuw[bronClub]||[];
      const itemIdx = bronItems.findIndex(item => (item.titel||"")+"|"+(item.datum||"") === sleutel);
      if (itemIdx < 0) return huidig;
      const item = bronItems[itemIdx];
      const huidigV = item.verborgen_bullets||[];
      bronItems[itemIdx] = {...item, verborgen_bullets:
        huidigV.includes(bi) ? huidigV.filter(x=>x!==bi) : [...huidigV, bi]};
      return nieuw;
    });
  };

  const setGeslacht = (sleutel, bronClub, geslacht) => {
    setNieuwsData(huidig => {
      const nieuw = JSON.parse(JSON.stringify(huidig));
      // Propageer geslacht naar ALLE kopieën (zelfde artikel, meerdere clubs)
      propageerNaarAlleKopieen(nieuw, sleutel, {geslacht});
      return nieuw;
    });
  };

  // Auto-detecteer clubs op basis van clubnamen in de bullets
  const ALLE_CLUBS = ["Amsterdam","Bloemendaal","Den Bosch","HDM","HGC","Hurley","Kampong",
    "Klein Zwitserland","Laren","Oranje-Rood","Pinoké","Rotterdam","SCHC",
    "Schaerweijde","Tilburg"];

  const autoDetecteerClubs = (sleutel, bronClub) => {
    setNieuwsData(huidig => {
      const nieuw = JSON.parse(JSON.stringify(huidig));
      const bronItems = nieuw[bronClub]||[];
      const idx = bronItems.findIndex(item => (item.titel||"")+("|")+(item.datum||"") === sleutel);
      if (idx < 0) return huidig;
      const item = bronItems[idx];
      // Scan titel + bullets op clubnamen
      const tekst = [item.titel||"", ...(item.bullets||[])].join(" ").toLowerCase();
      const gevonden = ALLE_CLUBS.filter(club => tekst.includes(club.toLowerCase()));
      // Voeg bronclub toe als die niet al gevonden is
      if (!gevonden.includes(bronClub)) gevonden.push(bronClub);
      propageerNaarAlleKopieen(nieuw, sleutel, {clubs: [...new Set(gevonden)]});
      return nieuw;
    });
  };

  const autoDetecteerAlleClubs = (bronClub) => {
    setNieuwsData(huidig => {
      const nieuw = JSON.parse(JSON.stringify(huidig));
      const items = bronClub === "alle"
        ? Object.entries(nieuw).flatMap(([club, arr]) => (arr||[]).map(i=>({...i,_bc:club})))
        : (nieuw[bronClub]||[]).map(i=>({...i,_bc:bronClub}));
      items.forEach(item => {
        const sleutel = (item.titel||"")+("|")+(item.datum||"");
        const bc = item._bc;
        const tekst = [item.titel||"", ...(item.bullets||[])].join(" ").toLowerCase();
        const gevonden = ALLE_CLUBS.filter(club => tekst.includes(club.toLowerCase()));
        if (!gevonden.includes(bc)) gevonden.push(bc);
        propageerNaarAlleKopieen(nieuw, sleutel, {clubs: [...new Set(gevonden)]});
      });
      return nieuw;
    });
  };

  const slaAllesOp = async () => {
    setBezig(true);
    try {
      const res = await apiCall("updateAlleTeamnieuws", {alleNieuws: nieuwsData});
      if (res.ok) { toast("✅ Teamnieuws opgeslagen"); onRefresh(); }
      else throw new Error(res.fout||res.error||"Fout");
    } catch(e) { toast("❌ "+e.message,"error"); }
    finally { setBezig(false); }
  };

  return (
    <div className="fade">
      <div className="topbar">
        <div>
          <div className="topbar-title">Teamnieuws toewijzen</div>
          <div className="topbar-sub">{alleItems.length} berichten</div>
        </div>
        <div className="topbar-actions" style={{gap:8}}>
          <button className="btn btn-sm" onClick={herschrijfBullets}
            disabled={bezig||laden||herschrijven}
            title="Herschrijft bullets zonder expliciet subject via Gemini">
            {herschrijven?<span className="spinner"/>:null} 🔄 Herschrijf subjects
          </button>
          <button className="btn btn-primary btn-sm" onClick={slaAllesOp} disabled={bezig||laden}>
            {bezig?<span className="spinner"/>:null} Alles opslaan
          </button>
        </div>
      </div>
      <div className="content">
        <input className="filter-input" placeholder="Zoek op titel…"
          value={zoek} onChange={e=>setZoek(e.target.value)} style={{marginBottom:16,width:"100%"}}/>
        {laden&&<div className="loading"><div className="spinner"/> Laden…</div>}
        {/* Bronclub filter + bulk geslacht */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
          <select className="form-select" value={filterBron}
            onChange={e=>setFilterBron(e.target.value)}
            style={{width:"auto",fontSize:12,padding:"4px 8px"}}>
            <option value="alle">Alle bronclubs ({alleItems.length})</option>
            {Object.keys(nieuwsData).sort().map(k=>
              <option key={k} value={k}>{k} ({(nieuwsData[k]||[]).length})</option>
            )}
          </select>
          {filterBron!=="alle"&&(
            <span style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:"var(--muted)"}}>Geslacht:</span>
              {[["heren","H 💙"],["dames","D 🩷"],[null,"H+D ⚪"]].map(([g,label])=>(
                <button key={String(g)} onClick={()=>setBulkGeslacht(filterBron,g)}
                  style={{fontSize:11,padding:"3px 10px",borderRadius:4,cursor:"pointer",
                    border:"1px solid var(--border)",background:"var(--surface2)",color:"var(--text)"}}>
                  {label}
                </button>
              ))}
              <span style={{width:1,background:"var(--border)",alignSelf:"stretch",margin:"0 4px"}}/>
              <button onClick={()=>autoDetecteerAlleClubs(filterBron)}
                title={"Scant alle bulletpoints op clubnamen en vult clubs-array automatisch in"}
                style={{fontSize:11,padding:"3px 10px",borderRadius:4,cursor:"pointer",
                  border:"1px solid var(--accent)",background:"rgba(99,102,241,.1)",color:"var(--accent)",fontWeight:600}}>
                🔍 Auto-detecteer clubs
              </button>
            </span>
          )}
          {filterBron==="alle"&&(
            <button onClick={()=>autoDetecteerAlleClubs("alle")}
              title={"Scant ALLE artikelen op clubnamen"}
              style={{fontSize:11,padding:"3px 10px",borderRadius:4,cursor:"pointer",
                border:"1px solid var(--accent)",background:"rgba(99,102,241,.1)",color:"var(--accent)",fontWeight:600}}>
              🔍 Auto-detecteer clubs (alles)
            </button>
          )}
        </div>
        {!laden&&gefilterd.length===0&&<div className="empty">Geen berichten gevonden.</div>}
        {!laden&&gefilterd.map((item)=>{
          // Bereken sleutel live consistent met alleItems
          const sleutel = (item.titel||"")+"|"+(item.datum||"");
          const bronClub = item._bronClub;
          // Lees altijd live uit nieuwsData
          const liveItem = (nieuwsData[bronClub]||[]).find(x=>
            (x.titel||"")+(x.datum||"")===(item.titel||"")+(item.datum||"")
          ) || item;
          // Als geen clubs array: bronclub is default aangevinkt
          const huidigeClubs = (liveItem.clubs && liveItem.clubs.length > 0)
            ? liveItem.clubs
            : [bronClub];
          const verborgen = liveItem.verborgen_bullets||[];
          const geslacht = liveItem.geslacht||null;
          const isVerborgen = liveItem.verborgen||false;
          return (
            <div key={sleutel} className="card" style={{marginBottom:10}}>
              <div className="card-body" style={{display:"flex",gap:16,alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <div style={{fontSize:10,color:"var(--muted)",fontFamily:"'JetBrains Mono',monospace",flex:1}}>
                      {formatDatum(item.datum)||"geen datum"} · <span style={{color:"var(--accent)"}}>{bronClub}</span>
                    </div>
                    <button onClick={async()=>{
                        try{
                          const res=await apiCall("updateTeamnieuws",{club:bronClub,items:nieuwsData[bronClub]||[]});
                          if(res.ok)toast("✅ "+bronClub+" opgeslagen");
                          else throw new Error(res.fout||"Fout");
                        }catch(e){toast("❌ "+e.message,"error");}
                      }}
                      style={{background:"var(--accent-light)",border:"1px solid var(--accent)",
                        borderRadius:5,padding:"2px 8px",fontSize:11,cursor:"pointer",
                        color:"var(--accent)",fontWeight:600,flexShrink:0}}>
                      💾 Opslaan
                    </button>
                    <button onClick={()=>toggleVerborg(sleutel,bronClub)}
                      title={isVerborgen?"Overal tonen":"Overal verbergen"}
                      style={{background:isVerborgen?"#fee2e2":"var(--surface2)",
                        border:"1px solid "+(isVerborgen?"#fca5a5":"var(--border)"),
                        borderRadius:5,padding:"2px 8px",fontSize:11,cursor:"pointer",
                        color:isVerborgen?"#dc2626":"var(--muted)",fontWeight:600,flexShrink:0}}>
                      {isVerborgen?"🚫 Verborgen":"👁 Zichtbaar"}
                    </button>
                  </div>
                  {item.titel&&<div style={{fontSize:12,fontWeight:600,marginBottom:6,
                    opacity:isVerborgen?.4:1}}>{item.titel.replace(/_/g," ")}</div>}
                  {item.bullets&&item.bullets.length>0&&(
                    <ul style={{margin:0,paddingLeft:14,listStyle:"none"}}>
                      {item.bullets.map((b,bi)=>(
                        <TeamBulletRij key={bi} bullet={b} bi={bi}
                          verborgen={verborgen.includes(bi)}
                          onToggle={()=>toggleBullet(sleutel,bronClub,bi)}
                          onBewerk={(t)=>{
                            setNieuwsData(huidig=>{
                              const nieuw=JSON.parse(JSON.stringify(huidig));
                              const items2=nieuw[bronClub]||[];
                              const idx2=items2.findIndex(x=>(x.titel||"")+(x.datum||"")===(item.titel||"")+(item.datum||""));
                              if(idx2>=0&&nieuw[bronClub][idx2].bullets) nieuw[bronClub][idx2].bullets[bi]=t;
                              return nieuw;
                            });
                          }}
                        />
                      ))}
                    </ul>
                  )}
                </div>
                <div style={{flexShrink:0,width:200}}>
                  <div style={{fontSize:11,fontWeight:600,color:"var(--muted)",marginBottom:4}}>Team</div>
                  <div style={{display:"flex",gap:8,marginBottom:10}}>
                    {[["heren","H"],["dames","D"],[null,"H+D"]].map(([g,label])=>(
                      <label key={String(g)} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,cursor:"pointer"}}>
                        <input type="radio" name={"g_"+sleutel} checked={geslacht===g}
                          onChange={()=>setGeslacht(sleutel,bronClub,g)}/>
                        {label}
                      </label>
                    ))}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--muted)"}}>Tonen bij</div>
                    <button onClick={()=>autoDetecteerClubs(sleutel,bronClub)}
                      title="Detecteer clubs automatisch uit bulletpoints"
                      style={{fontSize:10,padding:"1px 6px",borderRadius:3,cursor:"pointer",
                        border:"1px solid var(--accent)",background:"none",color:"var(--accent)"}}>
                      🔍 auto
                    </button>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {CLUBS.map(club=>{
                      const aan = huidigeClubs.includes(club);
                      return (
                        <button key={club} onClick={()=>toggleClub(sleutel,club,bronClub)}
                          style={{fontSize:10,padding:"2px 7px",borderRadius:4,border:"1px solid",cursor:"pointer",
                            background:aan?"var(--accent)":"var(--surface2)",
                            color:aan?"white":"var(--muted)",
                            borderColor:aan?"var(--accent)":"var(--border)"}}>
                          {club}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}


// ── Blessures overzicht ───────────────────────────────────────

// ── Wedstrijden Beheer ───────────────────────────────────────
function WedstrijdenBeheer({data, toast, onRefresh}) {
  const CLUBS_H = ["Amsterdam","Bloemendaal","Den Bosch","HDM","HGC","Hurley","Kampong",
    "Klein Zwitserland","Laren","Oranje-Rood","Pinoké","Rotterdam","SCHC","Schaerweijde","Tilburg"];
  const CLUBS_D = ["Amsterdam","Bloemendaal","Den Bosch","HDM","HGC","Hurley","Kampong",
    "Klein Zwitserland","Laren","Oranje-Rood","Pinoké","Rotterdam","SCHC","Schaerweijde","Tilburg"];

  const [geslacht, setGeslacht] = useState("heren");
  const [wedstrijden, setWedstrijden] = useState([]);
  const [laden, setLaden] = useState(false);
  const [geselecteerd, setGeselecteerd] = useState(null); // index
  const [edit, setEdit] = useState(null); // werkkopie van wedstrijd
  const [bezig, setBezig] = useState(false);
  const [filterTekst, setFilterTekst] = useState("");

  const CLUBS = geslacht === "heren" ? CLUBS_H : CLUBS_D;

  useEffect(() => {
    setLaden(true);
    setGeselecteerd(null);
    setEdit(null);
    fetch(`https://florismulder.github.io/hockey_db/competities/${geslacht}/programma.json?t=${Date.now()}`)
      .then(r => r.json())
      .then(d => {
        const gesorteerd = [...(d.wedstrijden||[])].sort((a,b) => (b.datum||"").localeCompare(a.datum||""));
        setWedstrijden(gesorteerd);
        setLaden(false);
      })
      .catch(() => setLaden(false));
  }, [geslacht]);

  const selecteer = (idx) => {
    setGeselecteerd(idx);
    setEdit(JSON.parse(JSON.stringify(wedstrijden[idx])));
  };

  const setVeld = (veld, val) => setEdit(e => ({...e, [veld]: val}));

  const addScorer = () => setEdit(e => ({...e,
    scorers: [...(e.scorers||[]), {naam:"", club: e.thuis+(geslacht==="heren"?" H1":" D1"), minuut:"", type:"veld"}]
  }));

  const setScorer = (i, veld, val) => setEdit(e => {
    const s = [...(e.scorers||[])];
    s[i] = {...s[i], [veld]: veld==="minuut" ? (val===""?val:parseInt(val)||val) : val};
    return {...e, scorers: s};
  });

  const verwijderScorer = (i) => setEdit(e => {
    const s = [...(e.scorers||[])];
    s.splice(i, 1);
    return {...e, scorers: s};
  });

  const addKaart = () => setEdit(e => ({...e,
    kaarten: [...(e.kaarten||[]), {naam:"", club: e.thuis+(geslacht==="heren"?" H1":" D1"), minuut:"", type:"groen"}]
  }));

  const setKaart = (i, veld, val) => setEdit(e => {
    const k = [...(e.kaarten||[])];
    k[i] = {...k[i], [veld]: veld==="minuut" ? (val===""?val:parseInt(val)||val) : val};
    return {...e, kaarten: k};
  });

  const verwijderKaart = (i) => setEdit(e => {
    const k = [...(e.kaarten||[])];
    k.splice(i, 1);
    return {...e, kaarten: k};
  });

  const opslaan = async () => {
    setBezig(true);
    try {
      // Bouw nieuwe wedstrijden-array: vervang de juiste wedstrijd
      const origDatum = wedstrijden[geselecteerd].datum;
      const origThuis = wedstrijden[geselecteerd].thuis;
      const origUit   = wedstrijden[geselecteerd].uit;

      // Haal originele (ongefilterde) volgorde op
      const resp = await fetch(`https://florismulder.github.io/hockey_db/competities/${geslacht}/programma.json?t=${Date.now()}`);
      const huidig = await resp.json();
      const idx = huidig.wedstrijden.findIndex(w =>
        w.datum === origDatum && w.thuis === origThuis && w.uit === origUit
      );
      if (idx < 0) throw new Error("Wedstrijd niet gevonden in origineel bestand");

      // Schoon edit op: minuten naar int
      const schoon = {...edit,
        score_thuis: edit.score_thuis === "" || edit.score_thuis === null ? null : parseInt(edit.score_thuis),
        score_uit:   edit.score_uit   === "" || edit.score_uit   === null ? null : parseInt(edit.score_uit),
        scorers: (edit.scorers||[]).map(s => ({...s, minuut: s.minuut === "" ? null : parseInt(s.minuut)||null})),
        kaarten: (edit.kaarten||[]).map(k => ({...k, minuut: k.minuut === "" ? null : parseInt(k.minuut)||null})),
        geverifieerd: edit.geverifieerd || false,
      };

      huidig.wedstrijden[idx] = schoon;

      const props = {geslacht, programma: huidig};
      const res = await apiCall("adminSlaWedstrijdOp", props);
      if (res.ok) {
        toast("✅ Wedstrijd opgeslagen");
        // Update lokale state
        const nieuw = [...wedstrijden];
        nieuw[geselecteerd] = schoon;
        setWedstrijden(nieuw);
        setEdit(JSON.parse(JSON.stringify(schoon)));
      } else throw new Error(res.fout||res.error||"Fout");
    } catch(e) { toast("❌ "+e.message, "error"); }
    finally { setBezig(false); }
  };

  // Detecteer mismatches: scorer/kaart club hoort bij thuis of uit
  const heeftFout = (w) => {
    if (!w.gespeeld) return false;
    if (w.geverifieerd) return false;
    const thuis = (w.thuis||"").toLowerCase();
    const uit = (w.uit||"").toLowerCase();
    const check = (items) => (items||[]).some(item => {
      const club = (item.club||"").toLowerCase()
        .replace(/ h1$| d1$| heren$| dames$/, "").trim();
      return club && !thuis.includes(club) && !club.includes(thuis) &&
                     !uit.includes(club)   && !club.includes(uit);
    });
    return check(w.scorers) || check(w.kaarten);
  };

  const foutDetails = (w) => {
    if (!w.gespeeld) return [];
    const thuis = (w.thuis||"").toLowerCase();
    const uit = (w.uit||"").toLowerCase();
    const fouten = [];
    [...(w.scorers||[]).map(s=>({...s,_type:"scorer"})),
     ...(w.kaarten||[]).map(k=>({...k,_type:"kaart"}))].forEach(item => {
      const club = (item.club||"").toLowerCase()
        .replace(/ h1$| d1$| heren$| dames$/, "").trim();
      if (club && !thuis.includes(club) && !club.includes(thuis) &&
                  !uit.includes(club)   && !club.includes(uit)) {
        fouten.push(item);
      }
    });
    return fouten;
  };

  const aantalFouten = wedstrijden.filter(heeftFout).length;

  const gefilterd = wedstrijden
    .map((w, origIdx) => ({w, origIdx}))
    .filter(({w}) => {
      if (!filterTekst) return true;
      if (filterTekst === "⚠") return heeftFout(w);
      const t = filterTekst.toLowerCase();
      return (w.thuis||"").toLowerCase().includes(t) || (w.uit||"").toLowerCase().includes(t) || (w.datum||"").includes(t);
    });

  const stijlRij = (origIdx) => ({
    padding: "8px 12px",
    cursor: "pointer",
    borderBottom: "1px solid var(--border)",
    background: geselecteerd === origIdx ? "var(--accent)" : "transparent",
    color: geselecteerd === origIdx ? "white" : "var(--text)",
    display: "flex",
    alignItems: "center",
    gap: 8,
    fontSize: 13,
  });

  return (
    <div className="fade" style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="topbar">
        <div>
          <div className="topbar-title">Wedstrijden</div>
          <div className="topbar-sub">{wedstrijden.length} wedstrijden geladen</div>
        </div>
        <div className="topbar-actions" style={{gap:8}}>
          {["heren","dames"].map(g => (
            <button key={g} onClick={()=>setGeslacht(g)}
              className={geslacht===g?"btn btn-primary btn-sm":"btn btn-sm"}>
              {g==="heren"?"💙 Heren":"🩷 Dames"}
            </button>
          ))}
        </div>
      </div>

      <div style={{display:"flex",flex:1,minHeight:0,overflow:"hidden"}}>
        {/* Linkerkolom: wedstrijdenlijst */}
        <div style={{width:320,flexShrink:0,borderRight:"1px solid var(--border)",
          display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"8px 12px",borderBottom:"1px solid var(--border)",display:"flex",flexDirection:"column",gap:6}}>
            <input className="filter-input" placeholder="Zoek club of datum…"
              value={filterTekst} onChange={e=>setFilterTekst(e.target.value)}
              style={{width:"100%",fontSize:12}}/>
            {aantalFouten > 0 && (
              <button onClick={()=>setFilterTekst("⚠")}
                style={{fontSize:11,padding:"3px 8px",borderRadius:4,cursor:"pointer",
                  border:"1px solid #ef4444",background:"rgba(239,68,68,.1)",
                  color:"#ef4444",fontWeight:600,textAlign:"left"}}>
                ⚠ {aantalFouten} wedstrijd{aantalFouten>1?"en":""} met verdachte data — klik om te filteren
              </button>
            )}
          </div>
          <div style={{overflowY:"auto",flex:1}}>
            {laden && <div className="loading"><div className="spinner"/> Laden…</div>}
            {!laden && gefilterd.map(({w, origIdx}) => (
              <div key={origIdx} style={stijlRij(origIdx)} onClick={()=>selecteer(origIdx)}>
                {(() => {
                  const fout = heeftFout(w);
                  return (
                    <div style={{width:22,height:22,borderRadius:4,flexShrink:0,fontSize:10,
                      fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",
                      background: geselecteerd===origIdx ? "rgba(255,255,255,.2)"
                        : fout ? "rgba(239,68,68,.15)"
                        : w.gespeeld ? "var(--surface2)" : "rgba(99,102,241,.15)",
                      color: geselecteerd===origIdx ? "white"
                        : fout ? "#ef4444"
                        : w.gespeeld ? "var(--muted)" : "var(--accent)"}}>
                      {fout ? "⚠" : w.gespeeld ? "✓" : "–"}
                    </div>
                  );
                })()}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,opacity:.7,marginBottom:1}}>{w.datum}</div>
                  <div style={{fontWeight:600,fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    {w.thuis} – {w.uit}
                  </div>
                  {w.gespeeld && (
                    <div style={{fontSize:11,opacity:.8}}>{w.score_thuis} – {w.score_uit}</div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Rechterkolom: editor */}
        <div style={{flex:1,overflowY:"auto",padding:24}}>
          {!edit && (
            <div className="empty" style={{marginTop:60}}>
              Selecteer een wedstrijd om te bewerken
            </div>
          )}
          {edit && (
            <div style={{maxWidth:640}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <h2 style={{margin:0,fontSize:18}}>{edit.thuis} – {edit.uit}</h2>
                <button className="btn btn-primary" onClick={opslaan} disabled={bezig}>
                  {bezig ? <span className="spinner"/> : null} Opslaan
                </button>
              </div>

              {/* Foutmelding bij verdachte data */}
              {heeftFout(edit) && (
                <div style={{background:"rgba(239,68,68,.08)",border:"1px solid #fca5a5",
                  borderRadius:8,padding:"12px 16px",marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{fontWeight:600,color:"#dc2626",fontSize:13}}>⚠ Verdachte clubkoppelingen</div>
                    <button className="btn btn-success btn-sm"
                      onClick={async()=>{
                        setBusy(true);
                        try{
                          const e2={...edit,geverifieerd:true};
                          const origDatum=wedstrijden[geselecteerd].datum;
                          const origThuis=wedstrijden[geselecteerd].thuis;
                          const origUit=wedstrijden[geselecteerd].uit;
                          const resp=await fetch(`https://florismulder.github.io/hockey_db/competities/${geslacht}/programma.json?t=${Date.now()}`);
                          const huidig=await resp.json();
                          const idx2=huidig.wedstrijden.findIndex(w=>w.datum===origDatum&&w.thuis===origThuis&&w.uit===origUit);
                          if(idx2>=0){
                            huidig.wedstrijden[idx2]={...huidig.wedstrijden[idx2],...e2,geverifieerd:true,
                              score_thuis:e2.score_thuis===""||e2.score_thuis===null?null:parseInt(e2.score_thuis),
                              score_uit:e2.score_uit===""||e2.score_uit===null?null:parseInt(e2.score_uit),
                              scorers:(e2.scorers||[]).map(s=>({...s,minuut:s.minuut===""?null:parseInt(s.minuut)||null})),
                              kaarten:(e2.kaarten||[]).map(k=>({...k,minuut:k.minuut===""?null:parseInt(k.minuut)||null}))};
                            const res=await apiCall("adminSlaWedstrijdOp",{geslacht,programma:huidig});
                            if(res.ok){
                              toast("✅ Geverifieerd — verdacht-markering verwijderd");
                              const n=[...wedstrijden]; n[geselecteerd]={...e2,geverifieerd:true};
                              setWedstrijden(n); setEdit({...e2,geverifieerd:true});
                            } else throw new Error(res.fout||"Fout");
                          }
                        }catch(err){toast("❌ "+err.message,"error");}
                        finally{setBusy(false);}
                      }}
                      disabled={bezig}>✓ Klopt toch</button>
                  </div>
                  <div style={{fontSize:12,color:"#dc2626",marginBottom:6}}>
                    Verwachte clubs: <strong>{edit.thuis}</strong> en <strong>{edit.uit}</strong>
                  </div>
                  {foutDetails(edit).map((item, i) => (
                    <div key={i} style={{fontSize:12,color:"#7f1d1d",padding:"2px 0"}}>
                      {item._type==="scorer"?"⚽":"🟨"} <strong>{item.naam}</strong> staat bij <strong>{item.club}</strong>
                    </div>
                  ))}
                </div>
              )}

              {/* Basisgegevens */}
              <div className="card" style={{marginBottom:16}}>
                <div className="card-body">
                  <div style={{fontWeight:600,marginBottom:12}}>Basisgegevens</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label className="form-label">Thuisploeg</label>
                      <select className="form-select" value={edit.thuis} onChange={e=>setVeld("thuis",e.target.value)}>
                        {CLUBS.map(c=><option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="form-label">Uitploeg</label>
                      <select className="form-select" value={edit.uit} onChange={e=>setVeld("uit",e.target.value)}>
                        {CLUBS.map(c=><option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="form-label">Datum</label>
                      <input className="form-input" type="date" value={edit.datum||""}
                        onChange={e=>setVeld("datum",e.target.value)}/>
                    </div>
                    <div>
                      <label className="form-label">Tijdstip</label>
                      <input className="form-input" type="time" value={edit.tijdstip||""}
                        onChange={e=>setVeld("tijdstip",e.target.value)}/>
                    </div>
                    <div>
                      <label className="form-label">Score thuis</label>
                      <input className="form-input" type="number" min="0" value={edit.score_thuis??""} 
                        onChange={e=>setVeld("score_thuis",e.target.value===""?null:parseInt(e.target.value))}/>
                    </div>
                    <div>
                      <label className="form-label">Score uit</label>
                      <input className="form-input" type="number" min="0" value={edit.score_uit??""} 
                        onChange={e=>setVeld("score_uit",e.target.value===""?null:parseInt(e.target.value))}/>
                    </div>
                  </div>
                  <div style={{marginTop:12,display:"flex",alignItems:"center",gap:8}}>
                    <input type="checkbox" id="gespeeld" checked={!!edit.gespeeld}
                      onChange={e=>setVeld("gespeeld",e.target.checked)}/>
                    <label htmlFor="gespeeld" style={{fontSize:13,cursor:"pointer"}}>Gespeeld</label>
                  </div>
                </div>
              </div>

              {/* Scorers */}
              <div className="card" style={{marginBottom:16}}>
                <div className="card-body">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div style={{fontWeight:600}}>Doelpunten ({(edit.scorers||[]).length})</div>
                    <button className="btn btn-sm" onClick={addScorer}>+ Toevoegen</button>
                  </div>
                  {(edit.scorers||[]).length === 0 && (
                    <div style={{color:"var(--muted)",fontSize:13}}>Geen scorers</div>
                  )}
                  {(edit.scorers||[]).map((s, i) => (
                    <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 60px 100px 32px",
                      gap:8,marginBottom:8,alignItems:"center"}}>
                      <input className="form-input" placeholder="Naam" value={s.naam||""}
                        onChange={e=>setScorer(i,"naam",e.target.value)}/>
                      <select className="form-select" value={s.club||""}
                        onChange={e=>setScorer(i,"club",e.target.value)}>
                        {CLUBS.map(c=>[c+" H1",c+" D1"]).flat().map(opt=>
                          <option key={opt} value={opt}>{opt}</option>
                        )}
                      </select>
                      <input className="form-input" placeholder="Min" type="number" min="1" max="70"
                        value={s.minuut??""} onChange={e=>setScorer(i,"minuut",e.target.value)}
                        style={{textAlign:"center"}}/>
                      <select className="form-select" value={s.type||"veld"}
                        onChange={e=>setScorer(i,"type",e.target.value)}>
                        <option value="veld">Veld</option>
                        <option value="strafcorner">Strafcorner</option>
                        <option value="strafbal">Strafbal</option>
                      </select>
                      <button onClick={()=>verwijderScorer(i)}
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:16,
                          color:"var(--muted)",padding:0,lineHeight:1}}>×</button>
                    </div>
                  ))}
                </div>
              </div>

              {/* Kaarten */}
              <div className="card" style={{marginBottom:16}}>
                <div className="card-body">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div style={{fontWeight:600}}>Kaarten ({(edit.kaarten||[]).length})</div>
                    <button className="btn btn-sm" onClick={addKaart}>+ Toevoegen</button>
                  </div>
                  {(edit.kaarten||[]).length === 0 && (
                    <div style={{color:"var(--muted)",fontSize:13}}>Geen kaarten</div>
                  )}
                  {(edit.kaarten||[]).map((k, i) => (
                    <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 60px 100px 32px",
                      gap:8,marginBottom:8,alignItems:"center"}}>
                      <input className="form-input" placeholder="Naam" value={k.naam||""}
                        onChange={e=>setKaart(i,"naam",e.target.value)}/>
                      <select className="form-select" value={k.club||""}
                        onChange={e=>setKaart(i,"club",e.target.value)}>
                        {CLUBS.map(cl=>[cl+" H1",cl+" D1"]).flat().map(opt=>
                          <option key={opt} value={opt}>{opt}</option>
                        )}
                      </select>
                      <input className="form-input" placeholder="Min" type="number" min="1" max="70"
                        value={k.minuut??""} onChange={e=>setKaart(i,"minuut",e.target.value)}
                        style={{textAlign:"center"}}/>
                      <select className="form-select" value={k.type||"groen"}
                        onChange={e=>setKaart(i,"type",e.target.value)}>
                        <option value="groen">Groen</option>
                        <option value="geel">Geel</option>
                        <option value="rood">Rood</option>
                      </select>
                      <button onClick={()=>verwijderKaart(i)}
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:16,
                          color:"var(--muted)",padding:0,lineHeight:1}}>×</button>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function BlessuresOverzicht({data, setPagina}) {
  const [toonHistorie, setToonHistorie] = useState(false);

  const blessures = useMemo(() => {
    const lijst = [];
    Object.entries(data.blessures||{}).forEach(([sid,bl]) => {
      const speler = (data.spelers||[]).find(s=>(s.id||slugify(s.naam))===sid);
      (bl||[]).forEach(b => lijst.push({...b, spelerId:sid, spelerNaam:speler?.naam||sid, club:speler?.club||""}));
    });
    return lijst.sort((a,b)=>String(b.datum_invoer||"").localeCompare(String(a.datum_invoer||"")));
  }, [data.blessures, data.spelers]);

  const actief   = blessures.filter(b=>b.actief);
  const historie = blessures.filter(b=>!b.actief);
  const toonLijst = toonHistorie ? historie : actief;

  return (
    <div className="fade">
      <div className="topbar">
        <div>
          <div className="topbar-title">🏥 Blessures</div>
          <div className="topbar-sub">{actief.length} actief · {historie.length} in de geschiedenis</div>
        </div>
        <div className="topbar-actions">
          <button className={`btn btn-sm ${toonHistorie?"btn-primary":"btn-secondary"}`}
            onClick={()=>setToonHistorie(t=>!t)}>
            {toonHistorie?"← Actief":"📚 Geschiedenis"}
          </button>
        </div>
      </div>
      <div className="content">
        {toonLijst.length === 0
          ? <div className="empty">{toonHistorie?"Geen blessuregeschiedenis.":"Geen actieve blessures."}</div>
          : (
          <div className="card">
            <table className="tbl">
              <thead>
                <tr>
                  <th>Speler</th>
                  <th>Club</th>
                  <th>Blessure</th>
                  <th>Sinds</th>
                  {toonHistorie && <th>Hersteld</th>}
                  <th>Uitleg</th>
                </tr>
              </thead>
              <tbody>
                {toonLijst.map((b,i)=>(
                  <tr key={i} onClick={()=>setPagina("speler_"+b.spelerId)}>
                    <td style={{fontWeight:600}}>{b.spelerNaam}</td>
                    <td style={{color:"var(--muted)"}}>{b.club}</td>
                    <td><span className="tag tag-blessure">{b.plek||"Blessure"}</span></td>
                    <td className="mono" style={{fontSize:12}}>{formatDatum(b.start)}</td>
                    {toonHistorie && <td className="mono" style={{fontSize:12}}>{formatDatum(b.eind)||"—"}</td>}
                    <td style={{fontSize:12,color:"var(--muted)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {b.uitleg||"—"}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Logboek ───────────────────────────────────────────────────
function Logboek({data, setPagina}) {
  const [zoek, setZoek] = useState("");
  const [pagina, setPag] = useState(0);
  const PER_PAG = 50;

  const gefilterd = useMemo(() => {
    const log = data.logboek || [];
    if (!zoek) return log;
    const z = zoek.toLowerCase();
    return log.filter(e =>
      (e.naam||"").toLowerCase().includes(z) ||
      (e.id||"").toLowerCase().includes(z) ||
      (e.email||"").toLowerCase().includes(z) ||
      (e.type||"").toLowerCase().includes(z)
    );
  }, [data.logboek, zoek]);

  const totaalPag = Math.ceil(gefilterd.length / PER_PAG);
  const pagLijst  = gefilterd.slice(pagina*PER_PAG, (pagina+1)*PER_PAG);

  return (
    <div className="fade">
      <div className="topbar">
        <div>
          <div className="topbar-title">📋 Logboek</div>
          <div className="topbar-sub">{gefilterd.length} wijzigingen</div>
        </div>
      </div>
      <div className="content">
        <div className="filter-bar">
          <input className="filter-input" placeholder="Zoek op naam, type, email…"
            value={zoek} onChange={e=>{setZoek(e.target.value);setPag(0)}}/>
        </div>
        <div className="card">
          {pagLijst.length === 0
            ? <div className="empty">Geen logboek-entries gevonden.</div>
            : pagLijst.map((e,i)=>{
              const veranderingen = Object.entries(e.velden||{});
              return (
                <div key={i} className="log-item">
                  <div className="log-datum">
                    {formatDatum(e.datum?.slice(0,10))} {e.datum?.slice(11,16)} · {e.email} · {e.type}
                  </div>
                  <div className="log-tekst">
                    <strong style={{cursor:"pointer",color:"var(--accent)"}}
                      onClick={()=>e.type==="speler"&&setPagina("speler_"+e.id)}>
                      {e.naam||e.id}
                    </strong>
                    {veranderingen.slice(0,3).map(([k,v],j)=>(
                      <span key={j}> · {k}: {e.oud&&e.oud[k]!==undefined&&
                        <span className="log-oud">{String(e.oud[k]??"—")}</span>} → <span className="log-nieuw">{String(v??"—")}</span>
                      </span>
                    ))}
                    {veranderingen.length>3 && <span style={{color:"var(--muted)"}}> +{veranderingen.length-3} meer</span>}
                  </div>
                </div>
              );
            })
          }
        </div>
        {totaalPag > 1 && (
          <div className="pager">
            <button className="pager-btn" disabled={pagina===0} onClick={()=>setPag(p=>p-1)}>← Vorige</button>
            <span>Pagina {pagina+1} van {totaalPag}</span>
            <button className="pager-btn" disabled={pagina>=totaalPag-1} onClick={()=>setPag(p=>p+1)}>Volgende →</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Hoofd App ─────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "null"); } catch { return null; }
  });
  const [pagina, setPaginaRaw] = useState("wachtrij");
  const [data, setData] = useState({spelers:[],logboek:[],blessures:{},voorstellen:[],clubsInfo:{},spelersNieuws:{},wachtrij_badge:0});
  const [wachtrij, setWachtrij] = useState({items:[],badge:0});
  const [loading, setLoading] = useState(false);
  const {toasts, show:toast} = useToast();

  // Navigatie-helper die ook naar detail-pagina's kan
  const setPagina = useCallback((p) => {
    setPaginaRaw(p);
    window.scrollTo(0,0);
  }, []);

  const laadData = useCallback(async () => {
    if (!user) return;
    setLoading(true);
    try {
      const res = await apiCall("haalAdminData");
      if (!res.success) throw new Error(res.error || "Data laden mislukt");
      setData(res);
    } catch(e) {
      toast("Data laden mislukt: " + e.message, "error");
    } finally {
      setLoading(false);
    }
  }, [user]);

  const laadWachtrij = useCallback(async () => {
    if (!user) return;
    try {
      const res = await apiCall("haalNieuwsWachtrij");
      if (res.success) { setWachtrij(res); setData(d=>({...d,wachtrij_badge:res.badge||0})); }
    } catch(e) {}
  }, [user]);

  useEffect(() => { if (user) { laadData(); laadWachtrij(); } }, [user]);

  // Auto-poll: alleen badge bijwerken, NIET als gebruiker op wachtrij-pagina zit
  // (anders worden selecties/vinkjes overschreven).
  useEffect(() => {
    if (!user) return;
    const interval = setInterval(async () => {
      if (pagina === "wachtrij") return;
      try {
        const res = await apiCall("haalNieuwsWachtrij");
        if (res.success) setData(d => ({...d, wachtrij_badge: res.badge || 0}));
      } catch(e) {}
    }, 30000);
    return () => clearInterval(interval);
  }, [user, pagina]);

  const uitloggen = () => {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(TOKEN_KEY);
    if (window.google) window.google.accounts.id.disableAutoSelect();
    setUser(null);
  };

  // Parseer de huidige pagina
  const paginaType = pagina.startsWith("speler_") ? "speler_detail"
    : pagina.startsWith("club_")   ? "club_detail"
    : pagina;

  const spelerId = pagina.startsWith("speler_") ? pagina.slice(7)  : null;
  const clubKey  = pagina.startsWith("club_")   ? pagina.slice(5)  : null;

  const aantalVoorstellen = (data.voorstellen||[]).length;
  const aantalWachtrij = data.wachtrij_badge||0;

  if (!user) return (
    <>
      <style>{css}</style>
      <style>{`
        body { background: linear-gradient(135deg,#f0ece4 0%,#e8e3da 50%,#ede8e0 100%) !important; }
        #root { width: 100% !important; min-height: 100vh !important; display: flex !important; align-items: center !important; justify-content: center !important; }
      `}</style>
      <LoginPagina onLogin={(u)=>setUser(u)}/>
    </>
  );

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <Sidebar
          pagina={paginaType==="speler_detail"?"spelers":paginaType==="club_detail"?"clubs":pagina}
          setPagina={setPagina}
          user={user}
          onLogout={uitloggen}
          aantalVoorstellen={aantalVoorstellen}
          aantalWachtrij={aantalWachtrij}
        />
        <div className="main">
          {loading && (
            <div style={{position:"fixed",top:0,left:"var(--sidebar-w)",right:0,height:3,
              background:"var(--accent)",zIndex:999,animation:"laadbar 1.5s ease infinite"}}/>
          )}
          {paginaType==="wachtrij" &&
            <WachterijPagina wachtrij={wachtrij} data={data} toast={toast} onRefresh={()=>{laadWachtrij();laadData();}} setPagina={setPagina}/>}
          {paginaType==="spelers" &&
            <SpelersOverzicht data={data} setPagina={setPagina} toast={toast} onRefresh={laadData}/>}
          {paginaType==="speler_detail" &&
            <SpelerDetail spelerId={spelerId} data={data} toast={toast} onRefresh={laadData} setPagina={setPagina}/>}
          {paginaType==="clubs" &&
            <ClubsOverzicht data={data} setPagina={setPagina}/>}
          {paginaType==="club_detail" &&
            <ClubDetail clubKey={clubKey} data={data} toast={toast} onRefresh={laadData} setPagina={setPagina}/>}
          {paginaType==="teamnieuws" &&
            <TeamNieuwsBeheer data={data} toast={toast} onRefresh={laadData}/>}
          {paginaType==="wedstrijden" &&
            <WedstrijdenBeheer data={data} toast={toast} onRefresh={laadData}/>}

          {paginaType==="logboek" &&
            <Logboek data={data} setPagina={setPagina}/>}
        </div>
        <ToastContainer toasts={toasts}/>
      </div>
      <style>{`
        @keyframes laadbar {
          0%{opacity:1} 50%{opacity:.4} 100%{opacity:1}
        }
      `}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
