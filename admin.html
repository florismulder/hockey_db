// ── API helper ────────────────────────────────────────────────
async function apiCall(actie, data = {}) {
  const token = localStorage.getItem(TOKEN_KEY);
  const email = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}").email || "";
  // Geen Content-Type header: Apps Script ondersteunt geen CORS preflight
  // text/plain (default) triggert geen preflight en Apps Script kan de body nog steeds parsen
  const resp = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ actie, data, token, email })
  });
  if (!resp.ok) throw new Error("Netwerk fout: " + resp.status);
  const text = await resp.text();
  try { return JSON.parse(text); }
  catch(e) { throw new Error("Ongeldig antwoord: " + text.slice(0,200)); }
}

// ── Helpers ───────────────────────────────────────────────────
function slugify(naam) {
  return (naam || "").toLowerCase()
    .replace(/[àáâä]/g,"a").replace(/[èéêë]/g,"e").replace(/[ìíîï]/g,"i")
    .replace(/[òóôö]/g,"o").replace(/[ùúûü]/g,"u").replace(/ñ/g,"n").replace(/ç/g,"c")
    .replace(/['']/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");
}

function normaliseerDatumISO(s) {
  if(!s) return "";
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[0];
  const m2 = String(s).match(/^(\d{2})-(\d{2})-(\d{4})/);
  if(m2) return `${m2[3]}-${m2[2]}-${m2[1]}`;
  const d = new Date(s);
  if(!isNaN(d)) return d.toISOString().slice(0,10);
  return "";
}
function normaliseerDatum(s) {
  if (!s) return "";
  const str = String(s);
  const m1 = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m1) return str.slice(0,10);
  const m2 = str.match(/^(\d{2})-(\d{2})-(\d{4})/);
  if (m2) return `${m2[3]}-${m2[2]}-${m2[1]}`;
  const parsed = new Date(str);
  if (!isNaN(parsed)) return parsed.toISOString().slice(0,10);
  return "";
}
function formatDatum(s) {
  if (!s) return "—";
  const norm = normaliseerDatum(s);
  if (!norm) return String(s).slice(0,10);
  const m = norm.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : norm;
}

function vandaag() {
  return new Date().toISOString().slice(0,10);
}

function tijdGeleden(iso) {
  if (!iso) return "";
  const diff = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diff/60000);
  if (min < 60) return `${min}m geleden`;
  const uur = Math.floor(min/60);
  if (uur < 24) return `${uur}u geleden`;
  return `${Math.floor(uur/24)}d geleden`;
}

// ── Toast notificaties ────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type="success") => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return {toasts, show};
}

function ToastContainer({toasts}) {
  if (!toasts.length) return null;
  return (
    <div style={{position:"fixed",bottom:24,right:24,display:"flex",flexDirection:"column",gap:8,zIndex:999}}>
      {toasts.map(t => (
        <div key={t.id} className={`alert alert-${t.type}`} style={{
          boxShadow:"0 4px 16px rgba(0,0,0,.12)",minWidth:260,animation:"fi .2s ease"
        }}>
          {t.type==="success"?"✅":t.type==="error"?"❌":t.type==="warn"?"⚠️":"ℹ️"} {t.msg}
        </div>
      ))}
    </div>
  );
}

function LoginPagina({onLogin}) {
  const [loading, setLoading] = useState(false);
  const [fout, setFout] = useState("");
  const [googleKlaar, setGoogleKlaar] = useState(!!window.google);
  const btnRef = useRef(null);

  // Wacht tot google GSI script geladen is (async defer)
  useEffect(() => {
    if (window.google) { setGoogleKlaar(true); return; }
    const interval = setInterval(() => {
      if (window.google) { setGoogleKlaar(true); clearInterval(interval); }
    }, 200);
    const timeout = setTimeout(() => {
      clearInterval(interval);
      setFout("Google Sign-In kon niet laden. Controleer je internetverbinding en herlaad de pagina.");
    }, 10000);
    return () => { clearInterval(interval); clearTimeout(timeout); };
  }, []);

  useEffect(() => {
    if (!googleKlaar || !btnRef.current) return;
    if (GOOGLE_CLIENT_ID === "JOUW_GOOGLE_CLIENT_ID_HIER.apps.googleusercontent.com") {
      setFout("Stel GOOGLE_CLIENT_ID in bovenaan admin.html");
      return;
    }
    window.google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: async (response) => {
        setLoading(true);
        setFout("");
        try {
          const payload = JSON.parse(atob(response.credential.split(".")[1]));
          localStorage.setItem(TOKEN_KEY, response.credential);
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            email: payload.email, name: payload.name, picture: payload.picture
          }));
          onLogin({email: payload.email, name: payload.name, picture: payload.picture});
        } catch(e) {
          setFout("Login mislukt: " + e.message);
        } finally { setLoading(false); }
      }
    });
    window.google.accounts.id.renderButton(btnRef.current, {
      theme: "outline", size: "large", width: "300", text: "signin_with"
    });
  }, [googleKlaar]);

  return (
    <div className="login-page">
      <div className="login-card fade">
        <div className="login-logo">
          <span style={{fontSize:28}}>🏑</span>
          <div>
            <div className="login-logo-txt">Hockey DB</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>Admin Beheerinterface</div>
          </div>
        </div>
        <div style={{fontSize:13,color:"var(--muted)",marginBottom:24}}>
          Log in met je Google account om toegang te krijgen tot het beheer.
        </div>
        {fout && <div className="alert alert-error" style={{marginBottom:16}}>{fout}</div>}
        {loading
          ? <div style={{textAlign:"center"}}><div className="spinner"/></div>
          : !googleKlaar && !fout
          ? <div style={{textAlign:"center",color:"var(--muted)",fontSize:12}}><div className="spinner" style={{display:"inline-block",marginRight:8}}/>Google laden…</div>
          : <div ref={btnRef}/>
        }
        <div style={{marginTop:20,fontSize:11,color:"var(--muted)"}}>
          Alleen geautoriseerde accounts hebben toegang.
        </div>
      </div>
    </div>
  );
}

    "Klein Zwitserland","Laren","Oranje-Rood","Pinoké","Rotterdam","Schaerweijde","SCHC","Tilburg"];

  const updateBullet = (artikelId, bulletId, velden) => {
    setItems(prev=>prev.map(art=>art.id!==artikelId?art:
      {...art,bullets:art.bullets.map(b=>b.id!==bulletId?b:{...b,...velden})}));
  };
  const updateArtikelMeta = (artikelId, velden) => {
    setItems(prev=>prev.map(art=>art.id!==artikelId?art:{...art,...velden}));
  };
  const alleGoedkeuren = (artikelId) => {
    setItems(prev=>prev.map(art=>art.id!==artikelId?art:
      {...art,bullets:art.bullets.map(b=>({...b,goedgekeurd:true}))}));
  };
  const opslaan = async (art) => {
    try {
      await apiCall("updateNieuwsWachtrij",{artikelId:art.id,bullets:art.bullets,
        geslacht:art.geslacht,competitie:art.competitie,titel:art.titel,datum:art.datum});
      const res = await apiCall("publiceerNieuws",{artikelId:art.id});
      if (!res.success) throw new Error(res.error||"Publiceren mislukt");
      toast(`✅ ${res.gepubliceerd} bullets gepubliceerd`);
      onRefresh();
    } catch(e) { toast(e.message,"error"); }
  };

  // 6. Dupliceer artikel voor andere club (reset bullet-selecties)
  const dupliceerArtikel = (artikelId) => {
    const art = items.find(a=>a.id===artikelId);
    if (!art) return;
    const kopie = {...art,
      id: "kopie_"+Date.now().toString(36),
      status: "wacht",
      bullets: art.bullets.map(b=>({...b,
        id: Date.now().toString(36)+Math.random().toString(36).slice(2),
        goedgekeurd: null
      })),
      _kopie: true
    };
    setItems(prev=>[...prev, kopie]);
    setOpenArtikel(kopie.id);
    toast("📋 Artikel gedupliceerd — pas bullets en club aan voor deze kopie");
  };

  // 7. Verwijder artikel uit wachtrij (markeer als verwerkt zonder publiceren)
  const verwijderArtikel = async (artikelId) => {
    try {
      await apiCall("updateNieuwsWachtrij",{artikelId,bullets:[],status:"verwerkt"});
      setItems(prev=>prev.filter(a=>a.id!==artikelId));
      toast("🗑 Artikel weggegooid");
    } catch(e) { toast(e.message,"error"); }
  };

  // Helper: datum naar ISO yyyy-mm-dd
  const normaliseerDatumISO = (s) => {
    if(!s) return "";
    const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(m) return m[0];
    const m2 = String(s).match(/^(\d{2})-(\d{2})-(\d{4})/);
    if(m2) return `${m2[3]}-${m2[2]}-${m2[1]}`;
    const d = new Date(s);
    if(!isNaN(d)) return d.toISOString().slice(0,10);
    return "";
  };
  const maakSpelerAan = async () => {
    try {
      const res = await apiCall("nieuweSpelerWachtrij",{speler:nieuwSpelerData,
        artikelId:nieuwSpelerModal.artikelId,bulletId:nieuwSpelerModal.bulletId});
      if (!res.success) throw new Error(res.error);
      toast("✅ Speler aangemaakt: "+nieuwSpelerData.naam);
      updateBullet(nieuwSpelerModal.artikelId,nieuwSpelerModal.bulletId,
        {speler_id:res.spelerId,speler_naam:nieuwSpelerData.naam,club:nieuwSpelerData.club,gekoppeld:true});
      setNieuwSpelerModal(null);
      setNieuwSpelerData({naam:"",club:"",geslacht:"heren"});
    } catch(e) { toast(e.message,"error"); }
  };

  const openItems = items.filter(a=>a.status!=="verwerkt");
  const aantalOpen = openItems.length;

  return (
    <div className="fade">
      <div className="topbar">
        <div>
          <div className="topbar-title">
            📥 Nieuws wachtrij
            {aantalOpen>0&&<span className="wq-badge" style={{marginLeft:8}}>{aantalOpen}</span>}
          </div>
          <div className="topbar-sub">Goedkeuren vóór publicatie</div>
        </div>
        <div className="topbar-actions">
          <button className="btn btn-secondary btn-sm" onClick={onRefresh}>↻ Vernieuwen</button>
        </div>
      </div>
      <div className="content">
        {aantalOpen===0&&(
          <div className="empty" style={{padding:"40px 0"}}>
            ✅ Wachtrij is leeg — alles is goedgekeurd of er zijn nog geen artikelen.
          </div>
        )}
        {openItems.map(art=>{
          const isOpen=openArtikel===art.id;
          const aantalOk=art.bullets.filter(b=>b.goedgekeurd===true).length;
          const aantalNee=art.bullets.filter(b=>b.goedgekeurd===false).length;
          const aantalOpen2=art.bullets.filter(b=>b.goedgekeurd===null).length;
          return (
            <div key={art.id} className="wq-artikel">
              <div className="wq-artikel-header">
                <div className="wq-meta" style={{flex:1,minWidth:0}}>

                  {/* 1. TITEL — inline editable */}
                  <ArtikelTitelEdit
                    titel={art.titel}
                    onChange={v=>updateArtikelMeta(art.id,{titel:v})}/>

                  {/* 2. DATUM — aanpasbaar */}
                  <div className="wq-sub" style={{flexWrap:"wrap",gap:6}}>
                    <input type="date" value={normaliseerDatumISO(art.datum)||""}
                      onChange={e=>updateArtikelMeta(art.id,{datum:e.target.value})}
                      style={{fontSize:11,padding:"1px 4px",border:"1px solid var(--border2)",
                        borderRadius:4,background:"var(--surface)",color:"var(--text)"}}
                      title="Publicatiedatum artikel"/>

                    {/* Geslacht */}
                    <select value={art.geslacht||"heren"}
                      onChange={e=>updateArtikelMeta(art.id,{geslacht:e.target.value})}
                      style={{fontSize:11,padding:"1px 4px",border:"1px solid var(--border2)",borderRadius:4,background:"var(--surface)"}}>
                      <option value="heren">Heren</option>
                      <option value="dames">Dames</option>
                    </select>

                    {/* Competitie */}
                    <select value={art.competitie||"onbekend"}
                      onChange={e=>updateArtikelMeta(art.id,{competitie:e.target.value})}
                      style={{fontSize:11,padding:"1px 4px",border:"1px solid var(--border2)",borderRadius:4,background:"var(--surface)"}}>
                      {["HK","EHL","EK","WK","OS","vriendschappelijk","onbekend"].map(c=>(
                        <option key={c} value={c}>{c}</option>
                      ))}
                    </select>

                    {/* Status tellers */}
                    <span style={{color:"var(--green)",fontWeight:600}}>{aantalOk}✓</span>
                    {aantalNee>0&&<span style={{color:"var(--red)",fontWeight:600}}>{aantalNee}✗</span>}
                    {aantalOpen2>0&&<span style={{color:"var(--muted)"}}>{aantalOpen2} open</span>}

                    {/* Bronlink */}
                    {art.bron_ref&&<a href={art.bron_ref} target="_blank" rel="noopener noreferrer"
                      style={{color:"var(--accent)",fontSize:11}} onClick={e=>e.stopPropagation()}>
                      {art.bron==="url"?"🔗 Artikel":"📄 PDF"}
                    </a>}
                  </div>

                  {/* 5. CLUBS koppelen op artikel-niveau */}
                  <ArtikelClubsEdit
                    clubs={art.artikelClubs||[]}
                    alleClubs={CLUBS}
                    onChange={v=>updateArtikelMeta(art.id,{artikelClubs:v})}/>
                </div>

                <div className="wq-acties" style={{flexShrink:0}}>
                  <button className="btn btn-secondary btn-sm" onClick={()=>alleGoedkeuren(art.id)}
                    title="Keur alle bullets goed">✓ Alles</button>
                  <button className="btn btn-secondary btn-sm"
                    onClick={()=>setItems(prev=>prev.map(a=>a.id!==art.id?a:
                      {...a,bullets:a.bullets.map(b=>({...b,goedgekeurd:null}))}))}
                    title="Deselecteer alle bullets">○ Niets</button>

                  {/* 6. DUPLICEER voor andere club */}
                  <button className="btn btn-secondary btn-sm"
                    onClick={()=>dupliceerArtikel(art.id)}
                    title="Kopieer artikel — voor andere club met eigen bullets-selectie">⎘</button>

                  {/* 7. VERWIJDER artikel */}
                  <button className="btn btn-danger btn-sm"
                    onClick={()=>{if(confirm("Artikel weggooien?")) verwijderArtikel(art.id);}}
                    title="Gooi dit artikel weg (niet publiceren)">🗑</button>

                  <button className="btn btn-success btn-sm" onClick={()=>opslaan(art)} disabled={aantalOk===0}>
                    Publiceer{aantalOk>0?` (${aantalOk})`:""}
                  </button>
                  <button className="btn btn-secondary btn-sm"
                    onClick={()=>setOpenArtikel(isOpen?null:art.id)}>
                    {isOpen?"▲":"▾"}
                  </button>
                </div>
              </div>

              {isOpen&&(
                <div className="wq-bullets">
                  {art.bullets.map(b=>(
                    <BulletRij key={b.id} bullet={b} spelerOpties={spelerOpties} clubs={CLUBS}
                      onChange={velden=>updateBullet(art.id,b.id,velden)}
                      onNieuweSpeler={()=>setNieuwSpelerModal({artikelId:art.id,bulletId:b.id})}/>
                  ))}

                  {/* 3. + BULLET TOEVOEGEN vanuit wachtrij */}
                  <NieuwBulletInline
                    artikelId={art.id}
                    art={art}
                    spelerOpties={spelerOpties}
                    clubs={CLUBS}
                    onToevoegen={bullet=>updateArtikelMeta(art.id,{
                      bullets:[...art.bullets, {
                        ...bullet,
                        id: Date.now().toString(36)+Math.random().toString(36).slice(2),
                        goedgekeurd: null, bewerkt: false, originele_bullet: null
                      }]
                    })}/>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {nieuwSpelerModal&&(
        <div className="modal-overlay" onClick={()=>setNieuwSpelerModal(null)}>
          <div className="modal fade" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">Nieuwe speler aanmaken</div>
              <button className="modal-close" onClick={()=>setNieuwSpelerModal(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Naam</label>
                <input className="form-input" value={nieuwSpelerData.naam}
                  onChange={e=>setNieuwSpelerData(d=>({...d,naam:e.target.value}))}/>
              </div>
              <div className="form-grid">
                <div className="form-group">
                  <label className="form-label">Club</label>
                  <select className="form-select" value={nieuwSpelerData.club}
                    onChange={e=>setNieuwSpelerData(d=>({...d,club:e.target.value}))}>
                    <option value="">— kies club —</option>
                    {CLUBS.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Geslacht</label>
                  <select className="form-select" value={nieuwSpelerData.geslacht}
                    onChange={e=>setNieuwSpelerData(d=>({...d,geslacht:e.target.value}))}>
                    <option value="heren">Heren</option>
                    <option value="dames">Dames</option>
                  </select>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setNieuwSpelerModal(null)}>Annuleren</button>
              <button className="btn btn-primary"
                disabled={!nieuwSpelerData.naam||!nieuwSpelerData.club}
                onClick={maakSpelerAan}>Aanmaken</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────
function Dashboard({data, setPagina, toast, onRefresh, loading}) {
  const actieveBlessures = useMemo(() => {
    if (!data.blessures) return [];
    return Object.entries(data.blessures).flatMap(([sid, lijst]) =>
      (lijst||[]).filter(b=>b.actief).map(b=>({...b, spelerId:sid}))
    );
  }, [data.blessures]);

  const voorstellen = data.voorstellen || [];
  const spelersCount = (data.spelers||[]).length;

  return (
    <div className="fade">
      <div className="topbar">
        <div>
          <div className="topbar-title">Dashboard</div>
          <div className="topbar-sub">Hockey DB beheer — {vandaag()}</div>
        </div>
        <div className="topbar-actions">
          <button className="btn btn-secondary btn-sm" onClick={onRefresh} disabled={loading}>
            {loading ? <span className="spinner"/> : "↻"} Vernieuwen
          </button>
        </div>
      </div>
      <div className="content">
        {/* Stats */}
        <div className="stat-grid">
          <div className="stat-card">
            <div className="stat-val">{spelersCount}</div>
            <div className="stat-lbl">Spelers</div>
          </div>
          <div className="stat-card">
            <div className="stat-val" style={{color:"var(--red)"}}>{actieveBlessures.length}</div>
            <div className="stat-lbl">Blessures actief</div>
          </div>
          <div className="stat-card">
            <div className="stat-val" style={{color:"var(--yellow)"}}>{voorstellen.length}</div>
            <div className="stat-lbl">Gemini voorstellen</div>
          </div>
          <div className="stat-card">
            <div className="stat-val" style={{color:"var(--green)"}}>{(data.logboek||[]).length}</div>
            <div className="stat-lbl">Wijzigingen (log)</div>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"}}>

          {/* Gemini Inbox */}
          <div className="card">
            <div className="card-header">
              <div className="card-title">📥 Gemini voorstellen</div>
              {voorstellen.length > 0 &&
                <span className="tag tag-voorstel">{voorstellen.length} nieuw</span>}
            </div>
            {voorstellen.length === 0
              ? <div className="empty" style={{padding:"20px"}}>Geen openstaande voorstellen.</div>
              : voorstellen.slice(0,5).map((v,i) => (
                <VoorstelItem key={v.id||i} voorstel={v} data={data} toast={toast} onRefresh={onRefresh}/>
              ))
            }
            {voorstellen.length > 5 &&
              <div style={{padding:"10px 16px",borderTop:"1px solid var(--border)"}}>
                <button className="btn btn-secondary btn-sm" onClick={()=>setPagina("dashboard_inbox")}>
                  Bekijk alle {voorstellen.length} voorstellen
                </button>
              </div>}
          </div>

          {/* Actieve blessures */}
          <div className="card">
            <div className="card-header">
              <div className="card-title">🏥 Actieve blessures</div>
              {actieveBlessures.length > 0 &&
                <span className="tag tag-blessure">{actieveBlessures.length}</span>}
            </div>
            {actieveBlessures.length === 0
              ? <div className="empty" style={{padding:"20px"}}>Geen actieve blessures.</div>
              : actieveBlessures.slice(0,6).map((b,i) => {
                  const speler = (data.spelers||[]).find(s=>(s.id||slugify(s.naam))===b.spelerId);
                  return (
                    <div key={i} className="inbox-item" style={{cursor:"pointer"}}
                      onClick={()=>setPagina("speler_" + b.spelerId)}>
                      <span className="inbox-icon">🏥</span>
                      <div className="inbox-body">
                        <div className="inbox-title">{speler?.naam || b.spelerId}</div>
                        <div className="inbox-sub">
                          {b.plek||"Blessure"} · Sinds {formatDatum(b.start)}
                          {b.uitleg && ` · ${b.uitleg.slice(0,40)}${b.uitleg.length>40?"…":""}`}
                        </div>
                      </div>
                    </div>
                  );
                })
            }
            {actieveBlessures.length > 6 &&
              <div style={{padding:"10px 16px",borderTop:"1px solid var(--border)"}}>
                <button className="btn btn-secondary btn-sm" onClick={()=>setPagina("blessures")}>
                  Bekijk alle {actieveBlessures.length}
                </button>
              </div>}
          </div>

          {/* Recente logboek */}
          <div className="card" style={{gridColumn:"1/-1"}}>
            <div className="card-header">
              <div className="card-title">📋 Recente wijzigingen</div>
              <button className="btn btn-secondary btn-sm" onClick={()=>setPagina("logboek")}>
                Volledig logboek
              </button>
            </div>
            {(data.logboek||[]).length === 0
              ? <div className="empty" style={{padding:"20px"}}>Nog geen wijzigingen gelogd.</div>
              : (data.logboek||[]).slice(0,8).map((e,i) => <LogItem key={i} entry={e}/>)
            }
          </div>
        </div>
      </div>
    </div>
  );
}

function VoorstelItem({voorstel, data, toast, onRefresh}) {
  const [busy, setBusy] = useState(false);
  const speler = (data.spelers||[]).find(s=>(s.id||slugify(s.naam))===voorstel.spelerId);

  const handle = async (bevestigd) => {
    setBusy(true);
    try {
      await apiCall("bevestigVoorstel", {voorstelId:voorstel.id, bevestigd});
      toast(bevestigd ? "Voorstel toegepast" : "Voorstel afgewezen");
      onRefresh();
    } catch(e) { toast(e.message, "error"); }
    finally { setBusy(false); }
  };

  const TypeIcon = voorstel.type==="blessure"?"🏥":voorstel.type==="club_wijziging"?"🔄":"📌";
  return (
    <div className="inbox-item">
      <span className="inbox-icon">{TypeIcon}</span>
      <div className="inbox-body">
        <div className="inbox-title">
          {speler?.naam || voorstel.spelerId}
          <span className="tag tag-voorstel" style={{marginLeft:8,verticalAlign:"middle"}}>
            {voorstel.type==="blessure"?"Blessure":voorstel.type==="club_wijziging"?"Club":"Voorstel"}
          </span>
        </div>
        <div className="inbox-sub">
          {voorstel.type==="blessure" && voorstel.data &&
            `${voorstel.data.plek||""} · ${voorstel.data.uitleg||""}`.trim()}
          {voorstel.type==="club_wijziging" && voorstel.data &&
            `${speler?.club||"?"} → ${voorstel.data.nieuweClub}`}
          {voorstel.bron && ` · Bron: ${voorstel.bron.slice(0,40)}${voorstel.bron.length>40?"…":""}`}
        </div>
        <div className="inbox-actions">
          <button className="btn btn-success btn-sm" onClick={()=>handle(true)} disabled={busy}>
            ✓ Bevestigen
          </button>
          <button className="btn btn-danger btn-sm" onClick={()=>handle(false)} disabled={busy}>
            ✗ Afwijzen
          </button>
        </div>
      </div>
    </div>
  );
}

function LogItem({entry}) {
  const velden = entry.velden || {};
  const oud    = entry.oud    || {};
  const veranderingen = Object.keys(velden).map(k => ({k, oud:oud[k], nieuw:velden[k]}));
  return (
    <div className="log-item">
      <div className="log-datum">{tijdGeleden(entry.datum)} · {entry.email}</div>
      <div className="log-tekst">
        <strong>{entry.naam || entry.id}</strong>
        {veranderingen.slice(0,2).map((v,i) => (
          <span key={i}> · {v.k}: {v.oud!==undefined&&<span className="log-oud">{String(v.oud||"—")}</span>} → <span className="log-nieuw">{String(v.nieuw||"—")}</span></span>
        ))}
      </div>
    </div>
  );
}

// ── Spelers overzicht ─────────────────────────────────────────

function NieuweSpelerModal({data, toast, onClose, onRefresh}) {
  const HEREN_CLUBS = ["Amsterdam","Bloemendaal","Den Bosch","HDM","Hurley","Kampong","Klein Zwitserland","Laren","Oranje-Rood","Pinoké","Rotterdam","Schaerweijde"];
  const DAMES_CLUBS = ["Amsterdam","Bloemendaal","Den Bosch","HDM","HGC","Hurley","Kampong","Oranje-Rood","Pinoké","Rotterdam","SCHC","Tilburg"];
  const POSITIES = ["keeper","verdediger","middenvelder","aanvaller"];

  const [form, setForm] = useState({
    naam:"", geslacht:"heren", club:"Amsterdam", rugnummer:"",
    positie:"", geboortedatum:"", nationaliteit:"Nederland", gestopt:false
  });
  const [bezig, setBezig] = useState(false);

  const clubs = form.geslacht==="heren" ? HEREN_CLUBS : DAMES_CLUBS;

  const set = (k,v) => setForm(f=>({...f,[k]:v,
    ...(k==="geslacht"?{club:v==="heren"?HEREN_CLUBS[0]:DAMES_CLUBS[0]}:{})
  }));

  const sla = async () => {
    if (!form.naam.trim()) { toast("❌ Naam is verplicht","error"); return; }
    if (!form.club) { toast("❌ Club is verplicht","error"); return; }
    setBezig(true);
    try {
      const d = await apiCall("nieuweSpeler", {speler: {
        naam: form.naam.trim(),
        geslacht: form.geslacht,
        club: form.club,
        rugnummer: form.rugnummer ? parseInt(form.rugnummer) : null,
        positie: form.positie || null,
        geboortedatum: form.geboortedatum || null,
        nationaliteit: form.nationaliteit || "Nederland",
        gestopt: form.gestopt
      }});
      if (d.ok) {
        toast("✅ " + form.naam + " toegevoegd","success");
        onRefresh();
        onClose();
      } else { toast("❌ " + (d.fout||"Onbekende fout"),"error"); }
    } catch(e) { toast("❌ " + e.message,"error"); }
    finally { setBezig(false); }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Nieuwe speler toevoegen</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body" style={{display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <label className="form-label">Naam *</label>
            <input className="form-input" value={form.naam} onChange={e=>set("naam",e.target.value)} placeholder="Voornaam Achternaam"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label className="form-label">Geslacht *</label>
              <select className="form-select" value={form.geslacht} onChange={e=>set("geslacht",e.target.value)}>
                <option value="heren">Heren</option>
                <option value="dames">Dames</option>
              </select>
            </div>
            <div>
              <label className="form-label">Club *</label>
              <select className="form-select" value={form.club} onChange={e=>set("club",e.target.value)}>
                {clubs.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label className="form-label">Rugnummer</label>
              <input className="form-input" type="number" value={form.rugnummer} onChange={e=>set("rugnummer",e.target.value)} placeholder="bijv. 9"/>
            </div>
            <div>
              <label className="form-label">Positie</label>
              <select className="form-select" value={form.positie} onChange={e=>set("positie",e.target.value)}>
                <option value="">— onbekend —</option>
                {POSITIES.map(p=><option key={p} value={p}>{p.charAt(0).toUpperCase()+p.slice(1)}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label className="form-label">Geboortedatum</label>
              <input className="form-input" type="date" value={form.geboortedatum} onChange={e=>set("geboortedatum",e.target.value)}/>
            </div>
            <div>
              <label className="form-label">Nationaliteit</label>
              <input className="form-input" value={form.nationaliteit} onChange={e=>set("nationaliteit",e.target.value)}/>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input type="checkbox" id="gestopt" checked={form.gestopt} onChange={e=>set("gestopt",e.target.checked)}/>
            <label htmlFor="gestopt" style={{fontSize:13}}>Speler is gestopt / niet meer actief</label>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Annuleer</button>
          <button className="btn btn-primary" onClick={sla} disabled={bezig}>
            {bezig?"Bezig...":"Speler toevoegen"}
          </button>
        </div>
      </div>
    </div>
  );
}

function SpelersOverzicht({data, setPagina, toast, onRefresh}) {
  const [zoek, setZoek] = useState("");
  const [toontNieuweSpeler, setToontNieuweSpeler] = useState(false);
  const [filterClub, setFilterClub] = useState("alle");
  const [filterGeslacht, setFilterGeslacht] = useState("alle");
  const [filterOranje, setFilterOranje] = useState("alle");
  const [filterBlessure, setFilterBlessure] = useState("alle");
  const [sorteer, setSorteer] = useState("naam");
  const [sortDir, setSortDir] = useState(1);
  const [pagina, setPag] = useState(0);
  const PER_PAG = 50;

  const actieveBlessures = useMemo(() => {
    const set = new Set();
    Object.entries(data.blessures||{}).forEach(([sid,lijst]) => {
      if ((lijst||[]).some(b=>b.actief)) set.add(sid);
    });
    return set;
  }, [data.blessures]);

  const clubs = useMemo(() => {
    const s = new Set((data.spelers||[]).map(x=>x.club).filter(Boolean));
    return ["alle",...Array.from(s).sort()];
  }, [data.spelers]);

  const gefilterd = useMemo(() => {
    let lijst = data.spelers || [];
    if (zoek) {
      const z = zoek.toLowerCase();
      lijst = lijst.filter(s =>
        (s.naam||"").toLowerCase().includes(z) ||
        (s.club||"").toLowerCase().includes(z) ||
        String(s.rugnummer||"").includes(z)
      );
    }
    if (filterClub !== "alle") lijst = lijst.filter(s => s.club === filterClub);
    if (filterGeslacht !== "alle") lijst = lijst.filter(s => s.geslacht === filterGeslacht);
    if (filterOranje !== "alle") {
      if (filterOranje === "ja") lijst = lijst.filter(s => s.oranje);
      else lijst = lijst.filter(s => !s.oranje);
    }
    if (filterBlessure === "ja") lijst = lijst.filter(s => actieveBlessures.has(s.id||slugify(s.naam)));
    if (filterBlessure === "nee") lijst = lijst.filter(s => !actieveBlessures.has(s.id||slugify(s.naam)));

    lijst = [...lijst].sort((a,b) => {
      let va = a[sorteer]??a.naam??"", vb = b[sorteer]??b.naam??"";
      if (sorteer==="rugnummer"||sorteer==="doelpunten_seizoen") {
        va = parseInt(va)||0; vb = parseInt(vb)||0;
        return (va-vb)*sortDir;
      }
      return String(va).localeCompare(String(vb))*sortDir;
    });
    return lijst;
  }, [data.spelers, zoek, filterClub, filterGeslacht, filterOranje, filterBlessure, sorteer, sortDir, actieveBlessures]);

  const totaalPag = Math.ceil(gefilterd.length / PER_PAG);
  const paginaSpelers = gefilterd.slice(pagina*PER_PAG, (pagina+1)*PER_PAG);

  const toggleSort = (veld) => {
    if (sorteer===veld) setSortDir(d=>-d);
    else { setSorteer(veld); setSortDir(1); }
    setPag(0);
  };

  const SortHdr = ({veld, children}) => (
    <th onClick={()=>toggleSort(veld)} style={{cursor:"pointer",userSelect:"none"}}>
      {children}{sorteer===veld?(sortDir>0?" ↑":" ↓"):""}
    </th>
  );

  return (
    <div className="fade">
      <div className="topbar">
        <div>
          <div className="topbar-title">Spelers</div>
          <div className="topbar-sub">{gefilterd.length} van {(data.spelers||[]).length} spelers</div>
        </div>
        <div className="topbar-actions">
          <button className="btn btn-primary" onClick={()=>setToontNieuweSpeler(true)}>+ Nieuwe speler</button>
        </div>
      </div>
      {toontNieuweSpeler&&<NieuweSpelerModal
        data={data} toast={toast} onClose={()=>setToontNieuweSpeler(false)} onRefresh={onRefresh}/>}
      <div className="content">
        <div className="filter-bar">
          <input className="filter-input" placeholder="Zoek op naam, club, rugnummer…"
            value={zoek} onChange={e=>{setZoek(e.target.value);setPag(0)}}/>
          <select className="filter-select" value={filterClub} onChange={e=>{setFilterClub(e.target.value);setPag(0)}}>
            {clubs.map(c=><option key={c} value={c}>{c==="alle"?"Alle clubs":c}</option>)}
          </select>
          <select className="filter-select" value={filterGeslacht} onChange={e=>{setFilterGeslacht(e.target.value);setPag(0)}}>
            <option value="alle">H + D</option>
            <option value="heren">Heren</option>
            <option value="dames">Dames</option>
          </select>
          <select className="filter-select" value={filterOranje} onChange={e=>{setFilterOranje(e.target.value);setPag(0)}}>
            <option value="alle">Alle (Oranje)</option>
            <option value="ja">In Oranje</option>
            <option value="nee">Niet in Oranje</option>
          </select>
          <select className="filter-select" value={filterBlessure} onChange={e=>{setFilterBlessure(e.target.value);setPag(0)}}>
            <option value="alle">Alle (Blessure)</option>
            <option value="ja">Geblesseerd</option>
            <option value="nee">Fit</option>
          </select>
        </div>

        <div className="card">
          <table className="tbl">
            <thead>
              <tr>
                <SortHdr veld="rugnummer">#</SortHdr>
                <SortHdr veld="naam">Naam</SortHdr>
                <SortHdr veld="club">Club</SortHdr>
                <SortHdr veld="geslacht">G</SortHdr>
                <th>Status</th>
                <SortHdr veld="doelpunten_seizoen">Goals</SortHdr>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {paginaSpelers.map(s => {
                const sid = s.id || slugify(s.naam);
                const heeftBlessure = actieveBlessures.has(sid);
                return (
                  <tr key={sid} onClick={()=>setPagina("speler_"+sid)}>
                    <td className="mono" style={{color:"var(--accent)",fontWeight:700,width:40}}>{s.rugnummer||"—"}</td>
                    <td style={{fontWeight:600}}>
                      {s.naam}
                      {s.keeper && <span className="tag tag-keeper" style={{marginLeft:6}}>K</span>}
                    </td>
                    <td style={{color:"var(--muted)"}}>{s.club}</td>
                    <td style={{color:"var(--muted)",fontSize:11}}>{s.geslacht==="heren"?"H":"D"}</td>
                    <td>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {heeftBlessure && <span className="tag tag-blessure">🏥</span>}
                        {s.oranje && <span className="tag tag-oranje">🦁 {s.oranje}</span>}
                        {s.gestopt && <span className="tag tag-gestopt">Gestopt</span>}
                      </div>
                    </td>
                    <td style={{textAlign:"right",color:"var(--accent)",fontWeight:700}}>
                      {s.doelpunten_seizoen>0?s.doelpunten_seizoen:""}
                    </td>
                    <td style={{textAlign:"right"}} onClick={e=>e.stopPropagation()}>
                      <button className="btn btn-icon btn-sm" onClick={()=>setPagina("speler_"+sid)}>✏️</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {paginaSpelers.length===0 && <div className="empty">Geen spelers gevonden.</div>}
        </div>

        {totaalPag > 1 && (
          <div className="pager">
            <button className="pager-btn" disabled={pagina===0} onClick={()=>setPag(p=>p-1)}>← Vorige</button>
            <span>Pagina {pagina+1} van {totaalPag}</span>
            <button className="pager-btn" disabled={pagina>=totaalPag-1} onClick={()=>setPag(p=>p+1)}>Volgende →</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── SpelerNieuwsTab ───────────────────────────────────────────
function SpelerNieuwsTab({spelerId, spelers, spelersNieuws, setSpelersNieuws, ladtNieuws, toast}) {
  const [nieuwsModal, setNieuwsModal] = useState(false);
  const [koppelModal, setKoppelModal] = useState(null);
  const [busy, setBusy] = useState({});
  const [editBullet, setEditBullet] = useState(null);
  const [nieuwBullet, setNieuwBullet] = useState(null);
  const [nieuwBulletTekst, setNieuwBulletTekst] = useState("");

  const groepen = useMemo(() => {
    if (!spelersNieuws) return [];
    const map = {};
    const volgorde = [];
    spelersNieuws.forEach((item, idx) => {
      const link  = item.link || item.artikel_link || "";
      const titel = item.titel || item.artikel_titel || "";
      const key   = link || titel || item.datum || String(idx);
      if (!map[key]) {
        map[key] = { key, link, titel, datum: item.datum, competitie: item.competitie, bullets: [], alleVerborgen: true };
        volgorde.push(key);
      }
      map[key].bullets.push({ ...item, _idx: idx });
      if (!item.verborgen) map[key].alleVerborgen = false;
    });
    return volgorde.map(k => map[k]).sort((a,b) => normaliseerDatum(b.datum).localeCompare(normaliseerDatum(a.datum)));
  }, [spelersNieuws]);

  const herlaad = async (directeItems) => {
    if (directeItems && Array.isArray(directeItems)) {
      setSpelersNieuws(directeItems); return;
    }
    // Wacht even op GitHub Pages cache
    await new Promise(r=>setTimeout(r,4000));
    const d = await fetch("nieuws/spelersnieuws.json?t=" + Date.now()).then(r=>r.json()).catch(()=>({}));
    setSpelersNieuws(d[spelerId] || []);
  };

  const setBusyKey = (k, val) => setBusy(b => ({...b, [k]: val}));

  const toggleBullet = async (bulletSleutel, verborgen) => {
    setBusyKey("b"+bulletSleutel, true);
    // Optimistische update — direct in UI, geen wachten op GitHub cache
    setSpelersNieuws(prev => (prev||[]).map(item => {
      const sleutel = (item.link||item.artikel_link||"") + "||" + (item.bullet||"");
      return sleutel === bulletSleutel ? {...item, verborgen} : item;
    }));
    try {
      const res = await apiCall("verbergBullet", {spelerId, bulletSleutel, verborgen});
      if (!res.success) throw new Error(res.error);
      toast(verborgen ? "🙈 Verborgen — live na ~1 min" : "👁 Zichtbaar gemaakt");
    } catch(e) {
      // Rollback bij fout
      setSpelersNieuws(prev => (prev||[]).map(item => {
        const sleutel = (item.link||item.artikel_link||"") + "||" + (item.bullet||"");
        return sleutel === bulletSleutel ? {...item, verborgen: !verborgen} : item;
      }));
      toast(e.message, "error");
    }
    finally { setBusyKey("b"+bulletSleutel, false); }
  };

  const toggleArtikel = async (link, verborgen) => {
    setBusyKey("a"+link, true);
    try {
      const res = await apiCall("verbergArtikel", {spelerId, artikelLink: link, verborgen});
      if (!res.success) throw new Error(res.error);
      toast(verborgen ? "🙈 Verborgen" : "👁 Zichtbaar");
      await new Promise(r => setTimeout(r, 3000));
      await herlaad();
    } catch(e) { toast(e.message, "error"); }
    finally { setBusyKey("a"+link, false); }
  };

  const slaEditOp = async (bulletSleutel, oudeBullet, nieuweTekst, groep) => {
    if (!nieuweTekst.trim() || nieuweTekst === oudeBullet) { setEditBullet(null); return; }
    setBusyKey("edit"+bulletSleutel, true);
    try {
      await apiCall("voegNieuwsToe", {targetId: spelerId, targetType: "speler", nieuwsItem: {
        datum: groep.datum, titel: groep.titel, link: groep.link,
        bullet: nieuweTekst.trim(), competitie: groep.competitie || "onbekend"
      }});
      const verbergRes = await apiCall("verbergBullet", {spelerId, bulletSleutel, verborgen: true});
      toast("✅ Bullet bewerkt");
      setEditBullet(null);
      // Directe state update: voeg nieuw toe, verberg oud
      setSpelersNieuws(prev => {
        const nieuw = {datum:groep.datum,titel:groep.titel,link:groep.link,
          bullet:nieuweTekst.trim(),competitie:groep.competitie||"onbekend",handmatig:true,verborgen:false};
        const updated = (prev||[]).map(item => {
          const s = (item.link||item.artikel_link||"")+"||"+(item.bullet||"");
          return s === bulletSleutel ? {...item, verborgen:true} : item;
        });
        return [nieuw, ...updated];
      });
    } catch(e) { toast(e.message, "error"); }
    finally { setBusyKey("edit"+bulletSleutel, false); }
  };

  const voegBulletToe = async () => {
    if (!nieuwBulletTekst.trim()) return;
    setBusyKey("nieuw", true);
    try {
      await apiCall("voegNieuwsToe", {targetId: spelerId, targetType: "speler", nieuwsItem: {
        datum: nieuwBullet.datum, titel: nieuwBullet.titel, link: nieuwBullet.link,
        bullet: nieuwBulletTekst.trim(), competitie: nieuwBullet.competitie || "onbekend"
      }});
      toast("✅ Bullet toegevoegd");
      // Directe state update zonder GitHub fetch
      const nieuwItem = {datum:nieuwBullet.datum,titel:nieuwBullet.titel,link:nieuwBullet.link,
        bullet:nieuwBulletTekst.trim(),competitie:nieuwBullet.competitie||"onbekend",handmatig:true,verborgen:false};
      setSpelersNieuws(prev => [nieuwItem, ...(prev||[])]);
      setNieuwBullet(null); setNieuwBulletTekst("");
    } catch(e) { toast(e.message, "error"); }
    finally { setBusyKey("nieuw", false); }
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700}}>Nieuws ({(spelersNieuws||[]).length} bullets)</div>
        <button className="btn btn-primary btn-sm" onClick={()=>setNieuwsModal(true)}>+ Nieuws toevoegen</button>
      </div>
      {ladtNieuws && <div className="loading"><div className="spinner"/> Nieuws laden…</div>}
      {!ladtNieuws && (!spelersNieuws || spelersNieuws.length === 0) &&
        <div className="empty">Geen nieuws beschikbaar voor deze speler.</div>}
      {!ladtNieuws && groepen.map((groep, gi) => {
        const alleVerborgen = groep.alleVerborgen;
        const busyArtikel = busy["a" + groep.link];
        return (
          <div key={gi} style={{
            background: alleVerborgen ? "var(--surface2)" : "var(--surface)",
            border: "1px solid " + (alleVerborgen ? "var(--border)" : "var(--border2)"),
            borderRadius: 8, marginBottom: 10, overflow: "hidden",
            opacity: alleVerborgen ? 0.6 : 1
          }}>
            <div style={{padding:"10px 12px",borderBottom:"1px solid var(--border)",
              display:"flex",alignItems:"center",gap:8,
              background:alleVerborgen?"var(--surface3)":"var(--surface2)"}}>
              <span className="mono" style={{fontSize:10,color:"var(--muted)",flexShrink:0}}>{formatDatum(groep.datum)}</span>
              {groep.link
                ? <a href={groep.link} target="_blank" rel="noopener noreferrer"
                    style={{fontSize:12,fontWeight:600,flex:1,color:"var(--accent)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {groep.titel||groep.link} ›
                  </a>
                : <span style={{fontSize:12,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {groep.titel||"Handmatig toegevoegd"}
                  </span>}
              {groep.competitie && groep.competitie !== "onbekend" &&
                <span className="tag" style={{background:"var(--surface)",border:"1px solid var(--border2)",color:"var(--muted)",flexShrink:0}}>{groep.competitie}</span>}
              <button className="btn btn-secondary btn-sm" style={{flexShrink:0,fontSize:11}}
                onClick={()=>{setNieuwBullet(groep);setNieuwBulletTekst("");}}>+ bullet</button>
              <button className={`btn btn-sm ${alleVerborgen?"btn-success":"btn-secondary"}`}
                onClick={()=>toggleArtikel(groep.link,!alleVerborgen)}
                disabled={!!busyArtikel} style={{flexShrink:0}}>
                {busyArtikel?<span className="spinner"/>:alleVerborgen?"👁":"🙈"}
              </button>
            </div>
            {groep.bullets.map((bullet, bi) => {
              const bulletSleutel = (groep.link||"") + "||" + (bullet.bullet||"");
              const busyBullet = busy["b"+bulletSleutel];
              const isEdit = editBullet?.sleutel === bulletSleutel;
              return (
                <div key={bi} style={{
                  padding:"8px 12px",
                  borderBottom:bi<groep.bullets.length-1?"1px solid var(--border)":"none",
                  background:bullet.verborgen?"var(--surface3)":"transparent"
                }}>
                  {isEdit ? (
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      <textarea style={{width:"100%",padding:"6px 10px",border:"1px solid var(--accent)",
                        borderRadius:6,fontSize:13,fontFamily:"inherit",resize:"vertical",
                        background:"var(--accent-light)",outline:"none"}}
                        rows={2} value={editBullet.tekst} autoFocus
                        onChange={e=>setEditBullet(b=>({...b,tekst:e.target.value}))}/>
                      <div style={{display:"flex",gap:6}}>
                        <button className="btn btn-success btn-sm"
                          disabled={!!busy["edit"+bulletSleutel]}
                          onClick={()=>slaEditOp(bulletSleutel,bullet.bullet,editBullet.tekst,groep)}>
                          {busy["edit"+bulletSleutel]?<span className="spinner"/>:"✓ Opslaan"}
                        </button>
                        <button className="btn btn-secondary btn-sm"
                          onClick={()=>setEditBullet(null)}>Annuleren</button>
                      </div>
                    </div>
                  ) : (
                    <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                      <span style={{fontSize:11,marginTop:2,flexShrink:0,
                        color:bullet.verborgen?"var(--border2)":"var(--accent)",fontWeight:700}}>•</span>
                      <span style={{flex:1,fontSize:13,
                        color:bullet.verborgen?"var(--muted)":"var(--text)",
                        textDecoration:bullet.verborgen?"line-through":"none"}}>
                        {bullet.bullet}
                        {bullet.verborgen&&<span style={{fontSize:10,color:"var(--muted)",marginLeft:8}}>(verborgen)</span>}
                        {bullet.handmatig&&<span style={{fontSize:10,color:"var(--green)",marginLeft:8}}>handmatig</span>}
                      </span>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        <button className="btn btn-secondary btn-sm"
                          onClick={()=>setEditBullet({sleutel:bulletSleutel,tekst:bullet.bullet||""})}>✏</button>
                        <button className={`btn btn-sm ${bullet.verborgen?"btn-success":"btn-danger"}`}
                          onClick={()=>toggleBullet(bulletSleutel,!bullet.verborgen)}
                          disabled={!!busyBullet}>
                          {busyBullet?<span className="spinner"/>:bullet.verborgen?"👁":"🙈"}
                        </button>
                        <button className="btn btn-secondary btn-sm"
                          onClick={()=>setKoppelModal({bulletSleutel,bullet:bullet.bullet,
                            titel:groep.titel,link:groep.link,datum:groep.datum})}>↗</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            {nieuwBullet?.key === groep.key && (
              <div style={{padding:"10px 12px",borderTop:"1px solid var(--border)",background:"var(--surface2)"}}>
                <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>
                  Nieuwe bullet aan "{groep.titel||"dit artikel"}"
                </div>
                <div style={{display:"flex",gap:6}}>
                  <textarea style={{flex:1,padding:"6px 10px",border:"1px solid var(--accent)",
                    borderRadius:6,fontSize:13,fontFamily:"inherit",resize:"none",
                    background:"var(--accent-light)",outline:"none"}}
                    rows={2} placeholder="Begin met naam speler…"
                    value={nieuwBulletTekst}
                    onChange={e=>setNieuwBulletTekst(e.target.value)} autoFocus/>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    <button className="btn btn-success btn-sm"
                      disabled={!nieuwBulletTekst.trim()||!!busy.nieuw}
                      onClick={voegBulletToe}>
                      {busy.nieuw?<span className="spinner"/>:"✓"}
                    </button>
                    <button className="btn btn-secondary btn-sm"
                      onClick={()=>setNieuwBullet(null)}>✗</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      })}
      {nieuwsModal && (
        <NieuwsToevoegenModal spelerId={spelerId} targetType="speler" toast={toast}
          onClose={()=>setNieuwsModal(false)} onOpgeslagen={herlaad}/>
      )}
      {koppelModal && (
        <KoppelNieuwsModal bronSpelerId={spelerId} bulletSleutel={koppelModal.bulletSleutel}
          bullet={koppelModal.bullet} spelers={spelers} toast={toast}
          onClose={()=>setKoppelModal(null)} onOpgeslagen={herlaad}/>
      )}
    </div>
  );
}

// ── NieuwsToevoegenModal ──────────────────────────────────────
function NieuwsToevoegenModal({spelerId, targetType, toast, onClose, onOpgeslagen}) {
  const [form, setForm] = useState({datum:vandaag(), titel:"", link:"", bullet:"", competitie:"HK"});
  const [busy, setBusy] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const opslaan = async () => {
    if (!form.bullet.trim()) { toast("Vul een bullet in","warn"); return; }
    setBusy(true);
    try {
      const res = await apiCall("voegNieuwsToe", {targetId:spelerId, targetType, nieuwsItem:form});
      if (!res.success) throw new Error(res.error);
      toast("✅ Nieuws toegevoegd");
      onOpgeslagen(res.nieuws || []);
      onClose();
    } catch(e) { toast(e.message,"error"); }
    finally { setBusy(false); }
  };

  return (
    <div className="modal-overlay">
      <div className="modal fade">
        <div className="modal-header">

// ── KoppelNieuwsModal ─────────────────────────────────────────
function KoppelNieuwsModal({bronSpelerId, bulletSleutel, bullet, spelers, toast, onClose, onOpgeslagen}) {
  const [targetType, setTargetType] = useState("speler");
  const [targetId, setTargetId] = useState("");
  const [busy, setBusy] = useState(false);

  const herenClubs = ["Amsterdam","Bloemendaal","Den Bosch","HDM","Hurley","Kampong","Klein Zwitserland","Laren","Oranje-Rood","Pinoké","Rotterdam","Schaerweijde"];
  const damesClubs = ["Amsterdam","Bloemendaal","Den Bosch","HDM","HGC","Hurley","Kampong","Oranje-Rood","Pinoké","Rotterdam","SCHC","Tilburg"];
  const alleClubs  = [...new Set([...herenClubs,...damesClubs])].sort();

  const koppel = async () => {
    if (!targetId) { toast("Kies een speler of club","warn"); return; }
    setBusy(true);
    try {
      const res = await apiCall("koppelNieuwsAan", {bronSpelerId, bulletSleutel, targetId, targetType});
      if (!res.success) throw new Error(res.error);
      toast("✅ Nieuws gekoppeld aan " + targetId);
      onOpgeslagen();
      onClose();
    } catch(e) { toast(e.message,"error"); }
    finally { setBusy(false); }
  };

  return (
    <div className="modal-overlay">
      <div className="modal fade">
        <div className="modal-header">
          <div className="modal-title">↗ Ook tonen bij…</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div style={{padding:"10px 12px",background:"var(--surface2)",borderRadius:7,fontSize:13,marginBottom:16,borderLeft:"3px solid var(--accent)"}}>
            "{bullet}"
          </div>
          <div className="form-group">
            <label className="form-label">Type</label>
            <div style={{display:"flex",gap:8}}>
              {["speler","club"].map(t=>(
                <button key={t} onClick={()=>{setTargetType(t);setTargetId("");}}
                  className={`btn btn-sm ${targetType===t?"btn-primary":"btn-secondary"}`}>
                  {t==="speler"?"👤 Speler":"🏒 Club"}
                </button>
              ))}
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">{targetType==="speler"?"Speler":"Club"}</label>
            {targetType==="speler" ? (
              <select className="form-select" value={targetId} onChange={e=>setTargetId(e.target.value)}>
                <option value="">Kies speler…</option>
                {(spelers||[]).filter(s=>(s.id||slugify(s.naam))!==bronSpelerId).map(s=>(
                  <option key={s.id||slugify(s.naam)} value={s.id||slugify(s.naam)}>
                    {s.naam} ({s.club})
                  </option>
                ))}
              </select>
            ) : (
              <select className="form-select" value={targetId} onChange={e=>setTargetId(e.target.value)}>
                <option value="">Kies club…</option>
                {alleClubs.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            )}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Annuleren</button>
          <button className="btn btn-primary" onClick={koppel} disabled={busy||!targetId}>
            {busy?<span className="spinner"/>:null} Koppelen
          </button>
        </div>
      </div>
    </div>
  );
}

function SpelerDetail({spelerId, data, toast, onRefresh, setPagina}) {
  const speler = useMemo(() =>
    (data.spelers||[]).find(s=>(s.id||slugify(s.naam))===spelerId),
    [data.spelers, spelerId]
  );
  const [velden, setVelden] = useState({});
  const [busy, setBusy] = useState(false);
  const [tab, setTab] = useState("profiel");
  const [blessureModal, setBlessureModal] = useState(false);
  const [spelersNieuws, setSpelersNieuws] = useState(null);
  const [ladtNieuws, setLadtNieuws] = useState(false);

  const blessureLijst = useMemo(() =>
    (data.blessures||{})[spelerId] || [],
    [data.blessures, spelerId]
  );

  useEffect(() => {
    if (speler) setVelden({...speler});
  }, [speler]);

  useEffect(() => {
    if (tab === "nieuws" && spelersNieuws === null) {
      setLadtNieuws(true);
      // Haal direct van GitHub op — publiek bestand, geen API-call nodig
      fetch("nieuws/spelersnieuws.json?t=" + Date.now())
        .then(r => r.json())
        .then(d => setSpelersNieuws(d[spelerId] || []))
        .catch(() => setSpelersNieuws([]))
        .finally(() => setLadtNieuws(false));
    }
  }, [tab, spelerId]);

  if (!speler) return <div className="loading">Speler niet gevonden: {spelerId}</div>;

  const set = (k, v) => setVelden(f=>({...f,[k]:v}));

  const opslaan = async (extraVelden={}) => {
    setBusy(true);
    try {
      const teWijzigen = {...velden, ...extraVelden};
      // Verwijder read-only velden
      const {id:_id, naam:_naam, ...rest} = teWijzigen;
      const res = await apiCall("updateSpeler", {spelerId, velden:rest});
      if (!res.success) throw new Error(res.error);
      toast("✅ Speler opgeslagen");
      onRefresh();
    } catch(e) { toast(e.message, "error"); }
    finally { setBusy(false); }
  };

  const verbergNieuws = async (artikelLink, verborgen) => {
    try {
      const res = await apiCall("verbergNieuws", {spelerId, artikelLink, verborgen});
      if (!res.success) throw new Error(res.error);
      // Herladen van GitHub zodat lokale state altijd synchroon is met wat publiek te zien is
      const vers = await fetch("nieuws/spelersnieuws.json").then(r=>r.json());
      setSpelersNieuws(vers[spelerId] || []);
      toast(verborgen ? "🙈 Nieuws verborgen op publieke site" : "👁 Nieuws weer zichtbaar");
    } catch(e) { toast(e.message, "error"); }
  };

  const heeftBlessure = velden.blessure?.actief;
  const tabs = ["profiel","blessures","nieuws"];

  return (
    <div className="fade">
      <div className="topbar">
        <div>
          <div className="breadcrumb">
            <a onClick={()=>setPagina("spelers")}>Spelers</a>
            <span>/</span>
            <span>{speler.naam}</span>
          </div>
        </div>
        <div className="topbar-actions">
          <a className="btn btn-secondary btn-sm"
            href={`${HOOFD_SITE_URL}/index.html#speler/${spelerId}`} target="_blank">
            🌐 Bekijk op site
          </a>
          <button className="btn btn-primary btn-sm" onClick={()=>opslaan()} disabled={busy}>
            {busy ? <span className="spinner"/> : null} Opslaan
          </button>
        </div>
      </div>

      <div className="detail-header">
        <div className="detail-name">{speler.naam}</div>
        <div className="detail-sub">
          <span>#{speler.rugnummer || "—"}</span>
          <span>·</span>
          <span>{speler.club}</span>
          <span>·</span>
          <span>{speler.geslacht}</span>
        </div>
        <div className="detail-tags">
          {speler.keeper && <span className="tag tag-keeper">Keeper</span>}
          {speler.aanvoerder && <span className="tag tag-green">Aanvoerder</span>}
          {speler.oranje && <span className="tag tag-oranje">🦁 {speler.oranje}</span>}
          {heeftBlessure && <span className="tag tag-blessure">🏥 Geblesseerd</span>}
          {speler.gestopt && <span className="tag tag-gestopt">Gestopt</span>}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,padding:"12px 24px",borderBottom:"1px solid var(--border)",background:"var(--surface)"}}>
        {tabs.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{
            padding:"6px 14px",borderRadius:6,border:"1px solid",fontSize:12,fontWeight:600,cursor:"pointer",
            background:tab===t?"var(--accent)":"var(--surface2)",
            color:tab===t?"white":"var(--muted)",
            borderColor:tab===t?"var(--accent)":"var(--border)"
          }}>
            {t==="profiel"?"👤 Profiel":t==="blessures"?"🏥 Blessures":"📰 Nieuws"}
            {t==="blessures"&&blessureLijst.filter(b=>b.actief).length>0&&
              <span style={{marginLeft:6,background:"var(--red)",color:"#fff",borderRadius:10,padding:"1px 5px",fontSize:10}}>
                {blessureLijst.filter(b=>b.actief).length}
              </span>}
          </button>
        ))}
      </div>

      <div className="content">
        {tab === "profiel" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>
            {/* Basisinfo */}
            <div className="card">
              <div className="card-header"><div className="card-title">Basisinfo</div></div>
              <div className="card-body">
                <div className="form-group">
                  <label className="form-label">ID (read-only)</label>
                  <input className="form-input mono" value={spelerId} disabled/>
                </div>
                <div className="form-group">
                  <label className="form-label">Naam (read-only)</label>
                  <input className="form-input" value={velden.naam||""} disabled/>
                </div>
                <div className="form-group">
                  <label className="form-label">Geboortedatum</label>
                  <input className="form-input" type="date" value={velden.geboortedatum||""}
                    onChange={e=>set("geboortedatum",e.target.value)}/>
                </div>
                <div className="form-grid">
                  <div className="form-group">
                    <label className="form-label">Nationaliteit</label>
                    <input className="form-input" value={velden.nationaliteit||""}
                      onChange={e=>set("nationaliteit",e.target.value)}/>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Land code</label>
                    <input className="form-input" placeholder="NL, BE, DE…" value={velden.land_code||""}
                      onChange={e=>set("land_code",e.target.value.toUpperCase())} maxLength={6}/>
                  </div>
                </div>
              </div>
            </div>

            {/* Club & status */}
            <div className="card">
              <div className="card-header"><div className="card-title">Club & status</div></div>
              <div className="card-body">
                <div className="form-group">
                  <label className="form-label">Club</label>
                  <input className="form-input" value={velden.club||""}
                    onChange={e=>set("club",e.target.value)}/>
                  <div className="form-hint">Exacte naam, bijv. "Oranje-Rood"</div>
                </div>
                <div className="form-grid">
                  <div className="form-group">
                    <label className="form-label">Geslacht</label>
                    <select className="form-select" value={velden.geslacht||""}
                      onChange={e=>set("geslacht",e.target.value)}>
                      <option value="heren">Heren</option>
                      <option value="dames">Dames</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Rugnummer</label>
                    <input className="form-input" type="number" value={velden.rugnummer||""}
                      onChange={e=>set("rugnummer",e.target.value?parseInt(e.target.value):"")}/>
                  </div>
                </div>
                <div style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:4}}>
                  <label className="form-check">
                    <input type="checkbox" checked={!!velden.keeper}
                      onChange={e=>set("keeper",e.target.checked)}/>
                    Keeper
                  </label>
                  <label className="form-check">
                    <input type="checkbox" checked={!!velden.aanvoerder}
                      onChange={e=>set("aanvoerder",e.target.checked)}/>
                    Aanvoerder
                  </label>
                  <label className="form-check">
                    <input type="checkbox" checked={!!velden.gestopt}
                      onChange={e=>set("gestopt",e.target.checked)}/>
                    Gestopt
                  </label>
                </div>
                {velden.gestopt && (
                  <div className="form-group" style={{marginTop:10}}>
                    <label className="form-label">Stopdatum</label>
                    <input className="form-input" type="date" value={velden.gestopt_datum||""}
                      onChange={e=>set("gestopt_datum",e.target.value)}/>
                  </div>
                )}
              </div>
            </div>

            {/* Oranje */}
            <div className="card">
              <div className="card-header"><div className="card-title">🦁 Oranje selectie</div></div>
              <div className="card-body">
                <div className="form-group">
                  <label className="form-label">Categorie</label>
                  <select className="form-select" value={velden.oranje||""}
                    onChange={e=>set("oranje",e.target.value)}>
                    <option value="">Niet geselecteerd</option>
                    <option value="senior">Senior Oranje</option>
                    <option value="jong">Jong Oranje</option>
                    <option value="u18">U18</option>
                    <option value="u16">U16</option>
                  </select>
                </div>
                {velden.oranje && (
                  <div className="alert alert-info" style={{fontSize:12}}>
                    Publiceer daarna ook via 🦁 Oranje selecties → Koppel badges in het hoofdmenu.
                  </div>
                )}
              </div>
            </div>

            {/* Stats */}
            <div className="card">
              <div className="card-header"><div className="card-title">Statistieken</div></div>
              <div className="card-body">
                <div className="form-hint" style={{marginBottom:12}}>
                  Stats worden automatisch bijgewerkt via de topscorers-pipeline.
                </div>
                <div className="form-grid">
                  {[["doelpunten_seizoen","Goals"],["vd","Velddoelpunten"],["sc","Strafcorners"],["sb","Strafballen"]].map(([k,l])=>(

                      <label className="form-label">{l}</label>
                      <input className="form-input" type="number" value={velden[k]??0}

        {tab === "blessures" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

        {tab === "nieuws" && (
          <SpelerNieuwsTab
            spelerId={spelerId}

            spelersNieuws={spelersNieuws}

function BlessureCard({blessure, spelerId, toast, onRefresh}) {
  const [sluitModal, setSluitModal] = useState(false);

  const sluit = async (einddatum) => {
    try {
      const res = await apiCall("sluitBlessure", {spelerId, blessureId:blessure.id, einddatum});
      if (!res.success) throw new Error(res.error);
      toast("Blessure afgesloten");
      onRefresh();
    } catch(e) { toast(e.message, "error"); }
    setSluitModal(false);
  };

  return (
    <div className={`blessure-card ${!blessure.actief?"gesloten":""}`}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div>
          <span style={{fontWeight:700,fontSize:14}}>{blessure.plek||"Blessure"}</span>
          {blessure.actief
            ? <span className="tag tag-blessure" style={{marginLeft:8}}>Actief</span>
            : <span className="tag tag-gestopt" style={{marginLeft:8}}>Gesloten</span>}
        </div>
        {blessure.actief && (
          <button className="btn btn-success btn-sm" onClick={()=>setSluitModal(true)}>
            ✓ Markeer hersteld
          </button>
        )}
      </div>
      <div style={{fontSize:12,color:"var(--muted)",display:"flex",gap:12,flexWrap:"wrap"}}>
        {blessure.start && <span>Sinds: {formatDatum(blessure.start)}</span>}
        {blessure.eind  && <span>Hersteld: {formatDatum(blessure.eind)}</span>}
        {blessure.ingevoerd_door && <span>Ingevoerd door: {blessure.ingevoerd_door}</span>}
      </div>
      {blessure.uitleg && (
        <div style={{fontSize:13,marginTop:8,padding:"8px 12px",background:"rgba(255,255,255,.6)",borderRadius:6}}>
          {blessure.uitleg}
        </div>
      )}
      {sluitModal && (
        <SluitBlessureModal onBevestig={sluit} onAnnuleer={()=>setSluitModal(false)}/>
      )}
    </div>
  );
}

              <label className="form-label">Verwacht herstel</label>

  const ClubKaart = ({club}) => {
